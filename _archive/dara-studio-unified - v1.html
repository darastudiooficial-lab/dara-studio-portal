<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DARA Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#090910;font-family:'DM Sans',sans-serif;color:#f0eff8}
#react-root{width:100%;min-height:100vh;display:block}
#admin-frame{width:100%;height:100vh;border:none;position:fixed;inset:0;z-index:999;display:none}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#090910;--bg1:#0f0f1a;--bg2:#14141f;--bg3:#1a1a28;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --a:#6366f1;--a-dim:rgba(99,102,241,.18);--a-glow:rgba(99,102,241,.35);
  --tx:#f0eff8;--mu:#9896b8;--dm:#5c5a7a;
  --gn:#10b981;--am:#f59e0b;--rd:#ef4444;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:14px;--r-sm:8px;
}
html,body,#root{min-height:100vh;background:var(--bg0);font-family:var(--sans);color:var(--tx)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Inputs ── */
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--tx);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .18s,box-shadow .18s}
.inp::placeholder{color:var(--dm)}
.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-dim)}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
textarea.inp{min-height:100px;resize:vertical;line-height:1.6}

/* ── Cards ── */
.card{padding:16px 20px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;user-select:none}
.card:hover{border-color:var(--border2);background:var(--bg2)}
.card.on{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a),0 0 20px var(--a-glow)}
.toggle{flex:1;padding:28px 24px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .22s;text-align:center;user-select:none}
.toggle:hover{border-color:var(--border2);transform:translateY(-2px)}
.toggle.on{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a),0 0 32px var(--a-glow);transform:translateY(-3px)}

/* ── Buttons ── */
.btn{padding:12px 28px;border-radius:var(--r-sm);background:var(--a);border:none;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 8px 24px var(--a-glow)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-o{padding:12px 28px;border-radius:var(--r-sm);background:transparent;border:1.5px solid var(--border2);color:var(--mu);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s}
.btn-o:hover{border-color:var(--a);color:var(--tx)}

/* ── Counter ── */
.ctr{display:flex;align-items:center;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.ctr-btn{width:36px;height:36px;border:none;background:transparent;color:var(--mu);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ctr-btn:hover{background:var(--bg2);color:var(--tx)}
.ctr-val{min-width:42px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--tx);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0 8px}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;width:100%}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--mono);transition:all .25s;flex-shrink:0}
.step-dot.done{background:var(--a);color:#fff}
.step-dot.active{background:var(--a);color:#fff;box-shadow:0 0 0 4px var(--a-dim),0 0 16px var(--a-glow)}
.step-dot.future{background:var(--bg3);border:1.5px solid var(--border);color:var(--dm)}
.step-line{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden}
.step-fill{position:absolute;left:0;top:0;bottom:0;background:var(--a);transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ── Sidebar ── */
.sidebar{position:sticky;top:24px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:20px}
.conf-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,.68,0,1.15)}

/* ── Drop zone ── */
.drop{border:2px dashed var(--border2);border-radius:var(--r);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.drop:hover,.drop.drag{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a)}

/* ── Map ── */
.map-box{width:100%;height:180px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.map-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 40%,rgba(99,102,241,.12) 0%,transparent 65%)}

/* ── Review row ── */
.rev-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rev-row:last-child{border-bottom:none}


/* ── Step 1 validation ── */
.inp-err{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.15)!important}
.err-msg{font-size:10px;color:#ef4444;margin-top:4px;display:flex;align-items:center;gap:4px}
/* ── Google Maps confirm bar ── */
.map-confirm-bar{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.map-confirm-btn{padding:7px 16px;border-radius:var(--r-sm);background:var(--a);border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:background .18s}
.map-confirm-btn:hover{background:#4f46e5}
.map-confirmed{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);font-size:11px;font-weight:600;color:#10b981}

.edit-ico{color:rgba(99,102,241,.3);transition:color .15s}
div:hover>.edit-ico,div:hover .edit-ico{color:rgba(99,102,241,.65)}
/* ── Animation ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}
@keyframes addrIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.addr-anim{animation:addrIn .35s cubic-bezier(.22,.68,0,1.15) both}

/* ── Landing ── */
.lp-root{min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden}
.lp-root::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(99,102,241,.10) 0%,transparent 55%);pointer-events:none;z-index:0}
.lp-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);pointer-events:none;z-index:0;top:50%;left:50%;transform:translate(-50%,-50%);animation:breathe 8s ease-in-out infinite}

@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:.9}100%{transform:translateY(160px) rotate(360deg);opacity:0}}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
@keyframes lp-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lp-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--a);background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:5px 14px;margin-bottom:28px;animation:lp-up .6s .1s both}
.lp-h1{font-family:var(--serif);font-size:clamp(38px,7vw,76px);font-weight:400;line-height:1.08;letter-spacing:-.02em;color:var(--tx);margin-bottom:22px;max-width:820px;animation:lp-up .6s .2s both}
.lp-h1 em{font-style:italic;color:#a5b4fc}
.lp-sub{font-size:16px;color:var(--mu);line-height:1.65;max-width:460px;margin-bottom:44px;font-weight:300;animation:lp-up .6s .3s both}
.lp-ctas{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;animation:lp-up .6s .4s both}
.lp-btn{display:inline-flex;align-items:center;gap:9px;padding:15px 32px;background:var(--a);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.lp-btn:hover{background:#4f46e5;transform:translateY(-2px);box-shadow:0 12px 36px rgba(99,102,241,.45)}
.lp-btn-o{display:inline-flex;align-items:center;gap:9px;padding:15px 32px;background:transparent;border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#c4c2dc;font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.lp-btn-o:hover{border-color:rgba(99,102,241,.4);color:var(--tx);background:rgba(99,102,241,.07);transform:translateY(-2px)}
.lp-proof{display:flex;align-items:center;justify-content:center;gap:20px;padding:18px 24px 40px;flex-wrap:wrap;animation:lp-up .6s .55s both}
.lp-proof-item{font-size:12px;color:var(--dm);display:flex;align-items:center;gap:6px}
.lp-services{border-top:1px solid rgba(255,255,255,.05);padding:24px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;animation:lp-up .6s .65s both}
.lp-svc{padding:8px 18px;font-size:11px;color:var(--dm);letter-spacing:.04em;text-transform:uppercase;font-weight:500;border-right:1px solid rgba(255,255,255,.06)}
.lp-svc:last-child{border-right:none}

/* ── Portal placeholder ── */
.portal-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg0)}

/* ── Grid helpers ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}
@media(max-width:700px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr}}
.f{display:flex;flex-direction:column;gap:6px}
.row{display:flex;gap:12px;align-items:center}

</style>
</head>

  const fmtEx=function(n){return sym+n.toLocaleString(isUS?"en-US":"pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});};

  /* ── Collect per-service areas from d.dims + d.dimExtras ── */
  const SVC_LABELS={new_construction:"New Construction",addition:"Addition",second_story:"Second Story",
    garage_only:"Garage",garage_conversion:"Garage Conversion",basement_finishing:"Basement Finishing",
    deck_covered:"Covered Deck",deck_open:"Open Deck",porch_covered:"Covered Porch",porch_open:"Open Porch",
    renovation:"Renovation",kitchen_remodel:"Kitchen Remodel",bath_remodel:"Bath Remodel",
    open_concept:"Open Concept Conversion"};
  const dims=d.dims||{};
  const dimExtras=d.dimExtras||[];
  const services=d.services||{};
  const selectedSvcs=Object.keys(services).filter(function(k){return !!services[k]&&SVC_LABELS[k];});

  /* Services that don't multiply by upper floors (deck/porch are single-level) */
  const NO_FLOOR_MULT=["deck_covered","deck_open","porch_covered","porch_open"];

  /* Build area blocks [{label, area, noMult}] */
  var areaBlocks=[];
  selectedSvcs.forEach(function(svcId){
    var dim=dims[svcId]||{};
    var wi=_pd(dim.w||""),li=_pd(dim.l||"");
    var a=isUS?(wi*li/144):(wi*li);
    if(a>0) areaBlocks.push({label:SVC_LABELS[svcId],area:a,noMult:NO_FLOOR_MULT.indexOf(svcId)>=0});
  });
  dimExtras.forEach(function(ex){
    var wi=_pd(ex.w||""),li=_pd(ex.l||"");
    var a=isUS?(wi*li/144):(wi*li);
    if(a>0) areaBlocks.push({label:ex.label||"Custom Area",area:a,noMult:false});
  });

  /* Fallback to d.width/d.length if no per-service dims */
  if(areaBlocks.length===0){
    var w0=_pd(d.width),l0=_pd(d.length);
    var a0=isUS?(w0*l0/144):(w0*l0);
    if(a0>0) areaBlocks.push({label:"Project Area",area:a0,noMult:false});
  }

  const totalBaseArea=areaBlocks.reduce(function(s,b){return s+b.area;},0);
  const lv=d.levels||{};
  /* Main floors: ground + 2nd double the primary area */
  const mainFloors=(lv.ground?1:0)+(lv.second?1:0);
  const mainFactor=mainFloors>0?mainFloors:1;
  /* Total including addons for display */
  const lvFactor=mainFactor+(lv.basement?1:0)+(lv.attic?1:0);
  const totalArea=totalBaseArea*lvFactor;

  const pkg=d.deliveryPkg||"";
  const extras=d.pkgExtras||{};

  const conf=Math.min(
    20+(d.region?10:0)+(totalBaseArea>0?20:0)+(d.role?10:0)+(d.propertyType?5:0)+(pkg?15:0)+(d.rush?10:0),
    100
  );

  /* No package → show "--" */
  if(!pkg||totalBaseArea<=0){
    var bd0=[];
    if(totalBaseArea>0) bd0.push({l:"Total Area",v:Math.round(totalArea).toLocaleString()+" "+(isUS?"sqft":"m\u00b2")});
    var PROP_SHORT0={single_family:"Single Family",multi_family:"Multi-Family",adu:"ADU"};
  var primarySvc0=Object.keys(services).filter(function(k){return !!services[k]&&SVC_LABELS[k];}).map(function(k){return SVC_LABELS[k];})[0]||"";
  var propShort0=PROP_SHORT0[d.propertyType]||d.propertyType||"";
  var projectTitle0=primarySvc0&&propShort0?primarySvc0+" \u2014 "+propShort0:primarySvc0||propShort0||"";
  return{lo:"--",hi:"--",conf,bd:bd0,totalArea,baseArea:totalBaseArea,noPkg:true,areaBlocks,projectTitle:projectTitle0};
  }

  var cost=0;
  const bd=[];
  var pkgName="";

  if(pkg==="full_construction"||pkg==="floor_plans_only"){
    pkgName=pkg==="full_construction"?"As-Built Drawings":"Floor Plans Only";
    const mult=pkg==="floor_plans_only"?0.60:1.00;
    const rateGround=RATES.ground*(isUS?1:BRL)*mult;
    const rateSecond=RATES.second*(isUS?1:BRL)*mult;

    /* Per-area × per-level breakdown */
    areaBlocks.forEach(function(blk){
      if(blk.noMult){
        /* Deck/porch: ground only */
        var blkCost=blk.area*rateGround;
        cost+=blkCost;
        bd.push({l:blk.label+": Ground Floor ("+Math.round(blk.area)+" sqft)",v:fmt(blkCost),block:"arch"});
      } else {
        if(lv.ground){
          var gCost=blk.area*rateGround;
          cost+=gCost;
          bd.push({l:blk.label+": Ground Floor ("+Math.round(blk.area)+" sqft)",v:fmt(gCost),block:"arch"});
        }
        if(lv.second){
          var sCost=blk.area*rateSecond;
          cost+=sCost;
          bd.push({l:blk.label+": 2nd Floor ("+Math.round(blk.area)+" sqft)",v:fmt(sCost),block:"arch"});
        }
      }
    });
    /* Basement and Attic add-ons on total base area */
    if(lv.basement){
      var basCost=totalBaseArea*RATES.basement*(isUS?1:BRL)*mult;
      cost+=basCost;
      bd.push({l:"Basement ("+Math.round(totalBaseArea)+" sqft)",v:fmt(basCost),block:"arch"});
    }
    if(lv.attic){
      var attCost=totalBaseArea*RATES.attic*(isUS?1:BRL)*mult;
      cost+=attCost;
      bd.push({l:"Attic ("+Math.round(totalBaseArea)+" sqft)",v:fmt(attCost),block:"arch"});
    }
    if(pkg==="floor_plans_only") bd.push({l:"Floor Plans Only (60% rate applied)",v:"x0.60",block:"svc"});
    if(pkg==="full_construction"){
      /* Design Extras: show only actively selected items */
      if(extras["inc_arch_design"])  bd.push({l:"Architectural Design",v:"Selected",block:"extra"});
      if(extras["inc_space_plan"])   bd.push({l:"Space Planning",v:"Selected",block:"extra"});
      if(extras["inc_interior_lay"]) bd.push({l:"Interior Layout",v:"Selected",block:"extra"});
      /* Optional 3D room extras */
      if(extras["fc_ext"])    {bd.push({l:"3D Exterior Rendering",v:"Included — FREE",block:"extra",free:true});}
      if(extras["fc_kitchen"]){cost+=180;bd.push({l:"3D Kitchen Design",v:"+"+fmt(180),block:"extra"});}
      if(extras["fc_bath"])   {cost+=180;bd.push({l:"3D Bathroom Design",v:"+"+fmt(180),block:"extra"});}
      if(extras["fc_laundry"]){cost+=180;bd.push({l:"3D Laundry Design",v:"+"+fmt(180),block:"extra"});}
    }

  } else if(pkg==="pdf_to_cad"){
    pkgName="PDF to CAD Conversion";
    const rate=isUS?0.80:0.80*BRL;
    areaBlocks.forEach(function(blk){
      var effectiveFactor=blk.noMult?1:mainFactor;
      var blkCost=blk.area*effectiveFactor*rate;
      cost+=blkCost;
      bd.push({l:blk.label+" ("+Math.round(blk.area*effectiveFactor)+" "+(isUS?"sqft":"m\u00b2")+")",v:fmt(blkCost),block:"arch"});
    });

  } else if(pkg==="3d_rendering"){
    pkgName="3D Realistic Rendering";
    const items=[
      {k:"3d_ext",    label:"3D Exterior Rendering", price:600},
      {k:"3d_kitchen",label:"3D Kitchen Design",     price:180},
      {k:"3d_bath",   label:"3D Bathroom Design",    price:180},
      {k:"3d_laundry",label:"3D Laundry Design",     price:180},
    ];
    items.forEach(function(it){
      if(extras[it.k]){cost+=it.price;bd.push({l:it.label,v:fmt(it.price),block:"extra"});}
    });
    if(bd.length===0) bd.push({l:"Select items in the panel below",v:"--",block:"svc"});
  }

  var baseCostBeforeRush=cost;
  if(d.rush==="rush"){
    var rushFee=cost*0.4;
    cost+=rushFee;
    bd.push({l:"Rush Delivery Fee (+40%)",v:"+"+fmt(rushFee),highlight:true});
  } else if(d.rush==="express"){
    var expFee=cost*0.6;
    cost+=expFee;
    bd.push({l:"Express Delivery Fee (+60%)",v:"+"+fmt(expFee),highlight:true});
  }

  const lo=cost,hi=cost*1.06;
  /* Build selected services label list */
  var selectedSvcNames=Object.keys(services).filter(function(k){return !!services[k]&&SVC_LABELS[k];}).map(function(k){return SVC_LABELS[k];});
  /* Level summary string */
  var lvNames=[];
  if(lv.ground) lvNames.push("Ground Floor");
  if(lv.second) lvNames.push("2nd Floor");
  if(lv.basement) lvNames.push("Basement");
  if(lv.attic) lvNames.push("Attic");
  /* ── Smart project title ── */
  var PROP_SHORT={single_family:"Single Family",multi_family:"Multi-Family",adu:"ADU"};
  var primarySvc=selectedSvcNames.length>0?selectedSvcNames[0]:"";
  var propShort=PROP_SHORT[d.propertyType]||d.propertyType||"";
  var projectTitle=primarySvc&&propShort?primarySvc+" — "+propShort:primarySvc||propShort||"";
  return{lo:fmtEx(lo),hi:fmtEx(hi),conf,bd,totalArea,baseArea:totalBaseArea,noPkg:false,pkgName,areaBlocks,selectedSvcNames,lvNames,projectTitle};
}

      )

  );

function formatPhone(val,isUS){
  var d=val.replace(/[^0-9]/g,"");
  if(isUS){
    if(d.length&&d[0]==="1")d=d.slice(1);
    d=d.slice(0,10);
    if(!d.length)return"";
    if(d.length<=3)return"+1 ("+d;
    if(d.length<=6)return"+1 ("+d.slice(0,3)+") "+d.slice(3);
    return"+1 ("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);
  }
  if(d.slice(0,2)==="55")d=d.slice(2);
  d=d.slice(0,11);
  if(!d.length)return"";
  if(d.length<=2)return"+55 ("+d;
  if(d.length<=7)return"+55 ("+d.slice(0,2)+") "+d.slice(2);
  return"+55 ("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}

    var m1=s.match(/^(\d+)['’]\s*-?\s*(\d+(?:\.\d+)?)(?:\s*(\d+)\/(\d+))?["”]?$/);
    if(m1){

      var inch=parseFloat(m1[2]||0);
      if(m1[3]&&m1[4])inch+=parseInt(m1[3],10)/parseInt(m1[4],10);
      return ft*12+inch;

    /* e.g. 10'6 (no quote) */
    var m2=s.match(/^(\d+)['’]\s*(\d+(?:\.\d+)?)?$/);
    if(m2){return parseInt(m2[1],10)*12+(parseFloat(m2[2]||0));}
    /* fraction only: 1/2 */
    var m3=s.match(/^(\d+)\/(\d+)$/);

    /* number + fraction: 15 1/2 */

    if(m4){return parseInt(m4[1],10)+parseInt(m4[2],10)/parseInt(m4[3],10);}

/* ═══ STEP 7: FILES ═══ */
function S7({d,up}){
  /* Each category stored as d.uploads.{catId}: [{name,size,type,dataUrl}] */
  const cats=[
    {id:"inspiration",label:"Inspiration Images",icon:"\uD83D\uDDBC\uFE0F",accept:".jpg,.jpeg,.png,.webp,.gif",acceptDesc:"JPG · PNG · GIF · WEBP",color:"#6366f1"},
    {id:"videos",     label:"Videos",             icon:"\uD83C\uDFA5",    accept:".mp4,.mov,.webm",          acceptDesc:"MP4 · MOV · WEBM",      color:"#ec4899"},
    {id:"documents",  label:"Technical Documents", icon:"\uD83D\uDCCB",    accept:".pdf,.doc,.docx,.dwg,.dxf",acceptDesc:"PDF · DOC · DWG · DXF",  color:"#f59e0b"},
    {id:"other",      label:"Other Files",          icon:"\uD83D\uDCCE",   accept:"*",                        acceptDesc:"Any file type",           color:"#10b981"},
  ];
  const MAX_MB=100;
  const uploads=d.uploads||{};
  const [dragOn,setDragOn]=useState({});

  function getFiles(catId){return uploads[catId]||[];}
  function setFiles(catId,arr){up("uploads",Object.assign({},uploads,{[catId]:arr}));}

  function processFiles(catId,fileList){
    var existing=getFiles(catId);
    var added=[];
    Array.from(fileList).forEach(function(f){
      if(f.size>MAX_MB*1024*1024){alert(f.name+" exceeds "+MAX_MB+"MB limit.");return;}
      var entry={name:f.name,size:f.size,type:f.type};
      /* Read image preview */
      if(f.type.startsWith("image/")){
        var reader=new FileReader();
        reader.onload=function(ev){
          entry.dataUrl=ev.target.result;
          setFiles(catId,getFiles(catId).concat([entry]));
        };
        reader.readAsDataURL(f);
        return; /* async — don't push yet */
      }
      added.push(entry);
    });
    if(added.length>0) setFiles(catId,existing.concat(added));
  }

  function rmFile(catId,idx){
    setFiles(catId,getFiles(catId).filter(function(_,i){return i!==idx;}));
  }

  function fmtSize(bytes){
    if(bytes<1024) return bytes+"B";
    if(bytes<1024*1024) return Math.round(bytes/1024)+"KB";
    return (bytes/(1024*1024)).toFixed(1)+"MB";
  }

  function fileIcon(f){
    if(f.type&&f.type.startsWith("image/"))return null; /* thumbnail shown */
    if(f.type&&f.type.includes("pdf"))return "\uD83D\uDCC4";
    if(f.type&&f.type.includes("video"))return "\uD83C\uDFA5";
    if(f.type&&(f.type.includes("word")||f.name.endsWith(".doc")||f.name.endsWith(".docx")))return "\uD83D\uDCDD";
    if(f.name.endsWith(".dwg")||f.name.endsWith(".dxf"))return "\uD83D\uDCD0";
    return "\uD83D\uDCCE";
  }

  var totalFiles=cats.reduce(function(s,cat){return s+getFiles(cat.id).length;},0);

  return h("div",{className:"anim"},
    h(Title,{label:"Upload Reference Files",sub:"Upload by category — up to 100MB per file."}),

    h("div",{style:{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"flex-start",gap:12}},
      h("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"var(--a)",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round",style:{flexShrink:0,marginTop:1}},h("circle",{cx:"12",cy:"12",r:"10"}),h("line",{x1:"12",y1:"8",x2:"12",y2:"12"}),h("line",{x1:"12",y1:"16",x2:"12.01",y2:"16"})),
      h("p",{style:{fontSize:12,color:"var(--mu)",lineHeight:1.7}},"Please upload any relevant documents such as: Existing Floor Plans, Site Surveys, sketches, or photos of the property. ",h("strong",{style:{color:"var(--tx)"}},"Clear documentation helps us provide a more accurate and faster design service."))
    ),

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
      cats.map(function(cat){
        var catFiles=getFiles(cat.id);
        var isDrag=!!dragOn[cat.id];
        return h("div",{key:cat.id,style:{borderRadius:"var(--r)",border:"1.5px solid "+(isDrag?cat.color:"var(--border)"),background:"var(--bg3)",overflow:"hidden",transition:"border-color .2s"}},
          /* Category header */
          h("div",{style:{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,background:"var(--bg2)"}},
            h("span",{style:{fontSize:20}},cat.icon),
            h("div",{style:{flex:1}},
              h("p",{style:{fontSize:12,fontWeight:700,color:"var(--tx)"}}),cat.label,
              h("p",{style:{fontSize:9,color:"var(--dm)",marginTop:1}},cat.acceptDesc+" · max "+MAX_MB+"MB")
            ),
            catFiles.length>0&&h("span",{style:{fontSize:10,fontWeight:700,background:cat.color+"22",color:cat.color,padding:"2px 8px",borderRadius:10}},catFiles.length+" file"+(catFiles.length>1?"s":""))
          ),
          /* Drop zone */
          h("label",{style:{display:"block",cursor:"pointer",padding:"16px",textAlign:"center",background:isDrag?"rgba(99,102,241,.06)":"transparent",transition:"background .2s"},
            onDragOver:function(e){e.preventDefault();setDragOn(function(p){var n=Object.assign({},p);n[cat.id]=true;return n;});},
            onDragLeave:function(){setDragOn(function(p){var n=Object.assign({},p);n[cat.id]=false;return n;});},
            onDrop:function(e){e.preventDefault();setDragOn(function(p){var n=Object.assign({},p);n[cat.id]=false;return n;});processFiles(cat.id,e.dataTransfer.files);}
          },
            h("input",{type:"file",multiple:true,accept:cat.accept,style:{display:"none"},onChange:function(e){processFiles(cat.id,e.target.files);}}),
            h("div",{style:{border:"1.5px dashed "+(isDrag?cat.color:"var(--border2)"),borderRadius:"var(--r-sm)",padding:"14px 10px",transition:"border-color .2s"}},
              h("p",{style:{fontSize:22,marginBottom:6}},"☁️"),
              h("p",{style:{fontSize:11,fontWeight:600,color:isDrag?cat.color:"var(--mu)"}},"Drop here or ",h("span",{style:{color:cat.color}},"browse"))
            )
          ),
          /* File list */
          catFiles.length>0&&h("div",{style:{borderTop:"1px solid var(--border)",padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}},
            catFiles.map(function(f,fi){
              return h("div",{key:fi,style:{display:"flex",alignItems:"center",gap:8,background:"var(--bg2)",borderRadius:"var(--r-sm)",padding:"6px 10px"}},
                /* Thumbnail or icon */
                f.dataUrl

                  h("p",{style:{fontSize:9,color:"var(--dm)"}},fmtSize(f.size))
                ),
                h("button",{onClick:function(){rmFile(cat.id,fi);},style:{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:16,padding:"0 2px",lineHeight:1}},"\xd7")
              );
            })
          )
        );
      })
    ),

    totalFiles>0&&h("div",{style:{marginTop:16,padding:"10px 16px",background:"var(--a-dim)",border:"1px solid var(--a)",borderRadius:"var(--r-sm)",display:"flex",alignItems:"center",gap:8}},
      h("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:"none",stroke:"var(--a)",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M22 11.08V12a10 10 0 1 1-5.93-9.14"}),h("polyline",{points:"22 4 12 14.01 9 11.01"})),
      h("p",{style:{fontSize:12,color:"var(--a)",fontWeight:600}},totalFiles+" file"+(totalFiles>1?"s":"")+" ready to submit")
    )
  );
}

/* ═══ WIZARD WRAPPER ═══ */
function Wizard({setPage}){
  const [step,setStep]=useState(0);
  const [d,setD]=useState({region:"US",levels:{},rooms:Object.assign({},ROOM_DEF)});
  const topRef=useRef(null);
  const up=useCallback((k,v)=>setD(prev=>Object.assign({},prev,{[k]:v})),[]);
  const est=calcEst(d);
  const showSb=step>=1;
  const canGo=()=>{
    if(step===0)return!!(d.region&&d.street&&d.city&&d.state&&d.zip&&d.mapConfirmed);
    if(step===1){
      var base=!!(d.name&&d.email&&d.phone&&d.role);
      if(!base)return false;
      if(d.role!=='homeowner'){
        return!!(d.companyName&&d.bizAddress&&d.bizCity&&d.bizState&&d.bizZip&&d.bizEmail&&d.bizPhone);
      }
      return true;
    }
    if(step===2)return!!(d.levels&&(d.levels.ground||d.levels.second||d.levels.basement||d.levels.attic));
    return true;
  };
  const go=dir=>{
    const ns=step+dir;
    if(ns>=0&&ns<STEPS.length&&(dir<0||canGo())){
      setStep(ns);
      setTimeout(()=>topRef.current&&topRef.current.scrollIntoView({behavior:"smooth"}),50);
    }
  };
  /* Allow S9 rows to jump back to any step */
  window.__daraGoStep=function(n){
    if(typeof n==="number"&&n>=0&&n<STEPS.length){
      setStep(n);
      setTimeout(function(){topRef.current&&topRef.current.scrollIntoView({behavior:"smooth"});},50);
    }
  };
  const stepLabel=["Location","About You","Project","Scope","Program","Files","Rush","Review"][step];

  return h("div",{style:{minHeight:"100vh",background:"var(--bg0)",fontFamily:"var(--sans)"}},
    /* Top bar */
    h("div",{ref:topRef,style:{borderBottom:"1px solid var(--border)",padding:"16px 0",background:"var(--bg1)",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}},
      h("div",{style:{maxWidth:1100,margin:"0 auto",padding:"0 24px"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,cursor:"pointer"},onClick:()=>setPage("landing")},
            h("div",{style:{width:32,height:32,borderRadius:8,background:"var(--a)",display:"flex",alignItems:"center",justifyContent:"center"}},
              h("span",{style:{fontFamily:"var(--serif)",fontSize:14,color:"#fff",fontStyle:"italic"}},"D")
            ),
            h("span",{style:{fontFamily:"var(--serif)",fontSize:15,fontStyle:"italic",color:"var(--tx)"}},"DARA Studio")
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("span",{style:{fontSize:11,color:"var(--dm)"}},"Step "+(step+1)+" of "+STEPS.length),
            h("span",{style:{fontSize:11,fontWeight:600,color:"var(--a)"}},"— "+stepLabel)
          )
        ),
        h(Stepper,{cur:step})
      )
    ),
    /* Content */
    h("div",{style:{maxWidth:1100,margin:"0 auto",padding:"36px 24px 80px"}},
      h("div",{style:{display:showSb?"grid":"block",gridTemplateColumns:showSb?"1fr 320px":"1fr",gap:28,alignItems:"start"}},
        h("div",{style:{maxWidth:showSb?"none":660,margin:showSb?0:"0 auto"}},
          step===0&&h(S1,{d,up}),
          step===1&&h(S2,{d,up}),
          step===2&&h(S3,{d,up}),
          step===3&&h(S4,{d,up,est}),
          step===4&&h(S6,{d,up}),
          step===5&&h(S7,{d,up}),
          step===6&&h(S8,{d,up}),
          step===7&&h(S9,{d,est,setPage}),
          step<9&&h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:36,paddingTop:24,borderTop:"1px solid var(--border)"}},
            /* Left side: "Back to Site" on step 0, "Back" to prev step otherwise */
            step===0
              ?h("button",{
                  className:"btn-o",
                  style:{fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"10px 18px",color:"var(--dm)",borderColor:"var(--border)"},
                  onClick:()=>setPage("landing")
                },
                h("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"},
                  h("path",{d:"M19 12H5M12 19l-7-7 7-7"})
                ),
                "Back to Site"
              )
              :h("button",{className:"btn-o",onClick:()=>go(-1)},"← Back"),
            step<7&&h("button",{className:"btn",onClick:()=>go(1),disabled:!canGo()},"Continue →")
          )
        ),
        showSb&&h("div",null,h(Sidebar,{est}))
      )
    )
  );
}

/* ═══ ROOT APP ═══ */
function App(){
  const [page,setPage]=useState("landing");
  if(page==="landing") return h(Landing,{setPage});
  if(page==="wizard")  return h(Wizard,{setPage});
  if(page==="portal")  return h(Portal,{setPage});
  return h(Landing,{setPage});
}

let __reactSetPage=null;
function AppWrapper(){
  const[page,setPage]=useState(window.__daraInitPage||"landing");
  __reactSetPage=setPage;
  const nav=(pg)=>{if(pg==="admin"){window.__daraGoAdmin();}else{setPage(pg);}};
  if(page==="landing")return h(Landing,{setPage:nav});
  if(page==="wizard") return h(Wizard, {setPage:nav});
  if(page==="portal") return h(Portal, {setPage:nav});
  return h(Landing,{setPage:nav});
}
ReactDOM.createRoot(document.getElementById("react-root")).render(h(AppWrapper));
