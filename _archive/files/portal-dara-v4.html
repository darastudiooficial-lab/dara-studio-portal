/* ══ BIND ══ */
function bind(){
  const root=document.getElementById('root');
  root.addEventListener('click',handleClick);
  const ei=document.getElementById('em-i');
  if(ei){ei.addEventListener('input',e=>{S.em=e.target.value});ei.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})}
  const pi=document.getElementById('pw-i');
  if(pi){pi.addEventListener('input',e=>{S.pw=e.target.value});pi.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})}
  const ci=document.getElementById('ci');
  if(ci){ci.addEventListener('input',e=>{S.cmsg=e.target.value});ci.addEventListener('keydown',e=>{if(e.key==='Enter')doSend()})}
  document.querySelectorAll('[data-a="proof"]').forEach(inp=>{inp.addEventListener('change',e=>{const f=e.target.files?.[0];if(f){S.proofs[e.target.dataset.ph]=f.name;render()}})});
  const cfu=document.getElementById('chat-file-input');
  if(cfu){cfu.addEventListener('change',e=>{const f=e.target.files?.[0];if(f){S.msgs.push({id:Date.now(),from:'client',name:USERS_MAP[S.role].name.split(' ')[0],text:`📎 Arquivo anexado: ${f.name}`,time:'agora'});render()}})}
  const cb=document.getElementById('cb');if(cb)cb.scrollTop=9999;
  /* Company logo upload (settings) */
  const coLogoInp=document.querySelector('[data-a="upload-company-logo"]');
  if(coLogoInp){
    coLogoInp.addEventListener('change',e=>{
      const f=e.target.files?.[0];
      if(f){S.settings.company.logo=URL.createObjectURL(f);render();}
    });
  }
  /* Drawings/Files upload */
  document.querySelectorAll('[data-a="dfile-upload"]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const files=Array.from(e.target.files||[]);
      const pid=inp.dataset.pid;
      if(!S.projFiles[pid]) S.projFiles[pid]=[];
      const rev = 'REV 00'; /* default to current active rev */
      files.forEach(f=>{
        const ext=f.name.split('.').pop().toLowerCase();
        const type=/jpe?g|png|webp/.test(ext)?'img':/pdf/.test(ext)?'pdf':/zip|rar/.test(ext)?'zip':'dwg';
        S.projFiles[pid].push({
          id:'f'+Date.now()+Math.random().toString(36).slice(2,5),
          rev,name:f.name,
          size:f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB',
          type,
          postedAt:new Date().toLocaleDateString('pt-BR'),
          viewedAt:null,
          phase:'preview',
        });
      });
      render();
      const t=document.createElement('div');
      t.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both';
      t.textContent='✓ '+files.length+' arquivo(s) adicionado(s)';
      document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
    });
  });
  /* ══ handleUploadReceipt — bind for phase receipt upload ══ */
  document.querySelectorAll('[data-a="receipt-upload"]').forEach(function(inp){
    inp.addEventListener('change',function(ev){
      var f=ev.target.files&&ev.target.files[0];
      if(!f) return;
      var pid7=inp.getAttribute('data-pid');
      var phid7=inp.getAttribute('data-phid');
      if(!S.projReceipts) S.projReceipts={};
      /* Store receipt object keyed by pid_phid */
      S.projReceipts[pid7+'_'+phid7]={
        name:f.name,
        size:(f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(Math.round(f.size/1024))+' KB'),
        uploadedAt:new Date().toLocaleString('pt-BR',{
          day:'2-digit',month:'2-digit',year:'numeric',
          hour:'2-digit',minute:'2-digit'
        }).replace(',',''),
      };
      /* Also update S.proofs for backwards compatibility */
      if(!S.proofs) S.proofs={};
      S.proofs[phid7]=f.name;
      render();
      /* Toast */
      var t4=document.createElement('div');
      t4.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both;display:flex;align-items:center;gap:8px';
      t4.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>Comprovante anexado com sucesso</span>';
      document.body.appendChild(t4);setTimeout(function(){t4.remove();},2600);
    });
  });

  /* Document slots — directed upload */
  document.querySelectorAll('[data-a="doc-slot-upload"]').forEach(function(inp){
    inp.addEventListener('change',function(ev){
      var f=ev.target.files&&ev.target.files[0];
      if(!f) return;
      var pid5=inp.getAttribute('data-pid');
      var slotId=inp.getAttribute('data-slotid');
      if(!S.projDocs[pid5]) return;
      var slot=S.projDocs[pid5].find(function(s){return s.id===slotId;});
      if(slot){
        slot.file=f.name;
        slot.size=(f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(Math.round(f.size/1024))+' KB');
        slot.postedAt=new Date().toLocaleDateString('pt-BR');
        slot.viewedAt=null;
        render();
        var t3=document.createElement('div');
        t3.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both';
        t3.textContent='Arquivo vinculado ao slot: '+slot.label;
        document.body.appendChild(t3);setTimeout(function(){t3.remove();},2600);
      }
    });
  });
  /* Document extras (Outros group) */
  document.querySelectorAll('[data-a="doc-extra-upload"]').forEach(function(inp){
    inp.addEventListener('change',function(ev){
      var files=Array.from(ev.target.files||[]);
      if(!files.length) return;
      var pid6=inp.getAttribute('data-pid');
      if(!S.projDocsExtra) S.projDocsExtra={};
      if(!S.projDocsExtra[pid6]) S.projDocsExtra[pid6]=[];
      files.forEach(function(f){
        S.projDocsExtra[pid6].push({
          name:f.name,
          size:(f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(Math.round(f.size/1024))+' KB'),
          postedAt:new Date().toLocaleDateString('pt-BR'),
        });
      });
      render();
    });
  });
  /* Internal Notes — live field sync via bind */
  document.querySelectorAll('[data-a="note-text"],[data-a="note-date"],[data-a="note-vis"]').forEach(function(el2){
    var ev = el2.tagName==='TEXTAREA'||el2.type==='date' ? 'input' : 'change';
    el2.addEventListener(ev,function(){
      var pid_b=el2.getAttribute('data-pid'), nid_b=el2.getAttribute('data-nid');
      var note_b=S.projNotes&&S.projNotes[pid_b]&&S.projNotes[pid_b].find(function(n){return n.id===nid_b;});
      if(!note_b) return;
      var act=el2.getAttribute('data-a');
      if(act==='note-text') note_b.text=el2.value;
      if(act==='note-date') note_b.date=el2.value;
      if(act==='note-vis'){note_b.vis=el2.value;el2.className='iln-vis-select '+el2.value;}
    });
  });
  /* Review feedback inputs — live buffer */
  document.querySelectorAll('[data-a="rev-fb-input"]').forEach(function(inp){
    inp.addEventListener('input',function(){
      if(!S.revFeedbackText) S.revFeedbackText={};
      S.revFeedbackText[inp.getAttribute('data-pid')+'_'+inp.getAttribute('data-revid')]=inp.value;
    });
  });
  /* Step date pickers */
  document.querySelectorAll('.rm-date-input').forEach(function(inp){
    inp.addEventListener('change',function(){
      var p2=this.getAttribute('data-pid'),s2=this.getAttribute('data-sid');
      if(!p2||!s2) return;
      if(!S.stepDates) S.stepDates={};
      S.stepDates[p2+'_'+s2]=this.value;
      render();
    });
  });
  /* Roadmap delivery upload */
  /* ══ REV-UPLOAD bind — handleUploadPreview automation ══ */
  document.querySelectorAll('[data-a="rev-upload"]').forEach(function(inp){
    inp.addEventListener('change',function(e){
      var f=e.target.files&&e.target.files[0];
      if(!f) return;
      var pid4=inp.getAttribute('data-pid');
      var revId=inp.getAttribute('data-revid');
      var nowStr=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',','');
      var nowISO=new Date().toISOString().slice(0,10);

      /* ── WRITE 1: Update Reviews tab ── */
      if(!S.projReviews[pid4]) S.projReviews[pid4]=[];
      var rev=S.projReviews[pid4].find(function(r){return r.revId===revId;});
      if(rev){
        rev.file=f.name;
        rev.uploadedAt=nowStr;
        rev.status='completed';
        rev.comments.push({
          id:'c'+Date.now(),author:'DARA Studio',role:'admin',type:'info',
          type:'info',resolved:false,text:'Arquivo "'+f.name+'" enviado para revisao do cliente.',ts:nowStr,
        });
        /* Activate next review */
        var idx=S.projReviews[pid4].findIndex(function(r){return r.revId===revId;});
        if(idx>=0&&idx+1<S.projReviews[pid4].length){
          S.projReviews[pid4][idx+1].status='active';
        }
      }

      /* ── WRITE 2: Update Timeline — mark "REV XX Preview Sent" as done ── */
      if(S.projTimelines&&S.projTimelines[pid4]){
        var nodes=S.projTimelines[pid4];
        /* Find the matching timeline node (rev00 -> rev00, rev01 -> rev01, etc) */
        var tlNode=nodes.find(function(n){return n.id===revId;});
        if(tlNode){
          /* Mark "Preview Sent" step as done */
          tlNode.steps.forEach(function(s){
            if(s.lbl.toLowerCase().indexOf('preview sent')>=0||s.lbl.toLowerCase().indexOf('preview')>=0){
              s.done=true;
              s.date=nowISO;
              if(!S.stepDates) S.stepDates={};
              S.stepDates[pid4+'_'+s.id]=nowISO;
            }
          });
          /* Mark node file + deliveredAt */
          tlNode.file=f.name;
          tlNode.deliveredAt=nowStr;
          /* If all steps of this node done -> set completed */
          var allDone=tlNode.steps.every(function(s){return s.done;});
          if(allDone){
            tlNode.status='completed';
            var nextPending=nodes.find(function(n){return n.status==='pending';});
            if(nextPending) nextPending.status='active';
          }
          /* Stage upload */
          if(!S.projUploads) S.projUploads={};
          S.projUploads[pid4+'_'+revId]=f.name;
        }
      }

      render();
      /* Notify */
      alert('Upload realizado: '+f.name+'. Timeline e Revisoes atualizadas automaticamente.');
    });
  });

  document.querySelectorAll('[data-a="road-upload"]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const f=e.target.files?.[0];
      if(!f) return;
      const pid=inp.dataset.pid, nid=inp.dataset.nid;
      const key=pid+'_'+nid;
      /* Stage the file name */
      S.projUploads[key]=f.name;
      /* Mark the node as delivered */
      const nodes=S.projTimelines[pid];
      if(nodes){
        const node=nodes.find(n=>n.id===nid);
        if(node){
          node.file=f.name;
          node.status='completed';
          node.deliveredAt=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',','');
          /* Activate next pending node */
          const nextPending=nodes.find(n=>n.status==='pending');
          if(nextPending) nextPending.status='active';
        }
      }
      render();
      /* Notify client */
      alert('Notificacao enviada ao cliente: Nova revisao disponivel! Arquivo: '+f.name);
    });
  });
  /* Admin file inputs */
  const contInp=document.querySelector('[data-a="upload-contract"]');
  if(contInp)contInp.addEventListener('change',e=>{const f=e.target.files?.[0];if(f){S.contract=f.name;render()}});
  const photoInp=document.querySelector('[data-a="upload-photos"]');
  if(photoInp){
    photoInp.addEventListener('change',e=>{
      const files=Array.from(e.target.files||[]);
      const mapped=files.map(f=>{
        const ext=f.name.split('.').pop().toLowerCase();
        const type=/jpe?g|png|webp|gif/.test(ext)?'image':/pdf/.test(ext)?'pdf':/mp4|mov|webm/.test(ext)?'video':'other';
        /* Para imagens: gera URL temporária para thumbnail real */
        const url=type==='image'?URL.createObjectURL(f):null;
        return {name:f.name,type,url};
      });
      S.updatePhotos=[...S.updatePhotos,...mapped];
      render();
    });
  }
  document.querySelectorAll('[data-a="attach-tkt-file"]').forEach(inp=>{
    inp.addEventListener('change',e=>{

      if(f){const tkt=S.tickets.find(t=>t.id===inp.dataset.id);if(tkt){tkt.attachment=f.name;render();}}
    });
  });

  /* ── Foto de perfil do usuário ── */
  /* Intercepta: data-a="profile-photo" */
  const profPhotoInp=document.querySelector('[data-a="profile-photo"]');
  if(profPhotoInp){
    profPhotoInp.addEventListener('change',e=>{

  /* Intercepta: data-a="proj-photo" + data-pid */
  document.querySelectorAll('[data-a="proj-photo"]').forEach(inp=>{

      if(f){
        const pid=inp.dataset.pid;

        render();
      }
    });
  });
}

    if(rev_r){
      var c_r=rev_r.comments.find(function(c){return c.id===cid_r;});
      if(c_r) c_r.resolved=(a==='rev-resolve');
      render();
    }
  }

  /* Reviews: resolve ALL change-req + approved */
  else if(a==='rev-resolve-all'){
    var pid_ra=el.dataset.pid, rid_ra=el.dataset.revid;
    var rev_ra=S.projReviews[pid_ra]&&S.projReviews[pid_ra].find(function(r){return r.revId===rid_ra;});
    if(rev_ra){
      rev_ra.comments.forEach(function(c){
        if(c.type==='change-req'||c.type==='approved') c.resolved=true;
      });
      render();
      var toast2=document.createElement('div');
      toast2.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both';
      toast2.textContent='Todos os comentarios marcados como resolvidos';
      document.body.appendChild(toast2);setTimeout(function(){toast2.remove();},2400);
    }
  }

  /* Reviews: toggle hide-resolved */
  else if(a==='rev-hide-toggle'){
    var pid_ht=el.dataset.pid;
    if(!S.revHideResolved) S.revHideResolved={};
    S.revHideResolved[pid_ht]=!S.revHideResolved[pid_ht];
    render();
  }

  /* Reviews: switch active phase */
  else if(a==='rev-phase'){
    if(!S.revActivePhase) S.revActivePhase={};
    S.revActivePhase[el.dataset.pid]=el.dataset.revid;
    render();
  }

  /* Reviews: pin click (scroll to comment in sidebar) */
  else if(a==='rv-pin-click'){
    /* Highlight the corresponding task card */
    var cid_pin=el.dataset.cid;
    setTimeout(function(){
      var taskEl=document.querySelector('[data-cid="'+cid_pin+'"]');
      if(taskEl){
        taskEl.scrollIntoView({behavior:'smooth',block:'nearest'});
        taskEl.style.outline='2px solid var(--a)';
        setTimeout(function(){taskEl.style.outline='';},1200);
      }
    },50);
  }

  /* Reviews: approve */
  else if(a==='rev-approve'){
    const pid2=el.dataset.pid, rid=el.dataset.revid;
    const rev=S.projReviews[pid2]&&S.projReviews[pid2].find(function(r){return r.revId===rid;});
    if(rev){
      const fbKey=pid2+'_'+rid;
      const txt=(S.revFeedbackText&&S.revFeedbackText[fbKey])||'Aprovado sem ressalvas.';
      const u=USERS_MAP[S.role];
      rev.comments.push({
        id:'c'+Date.now(),author:u.name,role:S.role,
        type:'approved',resolved:false,text:txt||'Aprovado.',
        ts:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(',',''),
      });
      if(S.revFeedbackText) S.revFeedbackText[fbKey]='';
      render();
      /* Toast */
      const toast=document.createElement('div');
      toast.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both';
      toast.textContent='Revisao aprovada com sucesso';
      document.body.appendChild(toast);setTimeout(function(){toast.remove();},2400);
    }
  }

  /* Reviews: request change */
  else if(a==='rev-change-req'){
    const pid3=el.dataset.pid, rid2=el.dataset.revid;
    const rev2=S.projReviews[pid3]&&S.projReviews[pid3].find(function(r){return r.revId===rid2;});
    if(rev2){
      const fbKey2=pid3+'_'+rid2;
      const txt2=(S.revFeedbackText&&S.revFeedbackText[fbKey2])||'Por favor ajuste o arquivo.';
      const u2=USERS_MAP[S.role];
      rev2.comments.push({
        id:'c'+Date.now(),author:u2.name,role:S.role,
        type:'change-req',resolved:false,text:txt2,
        ts:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(',',''),
      });
      if(S.revFeedbackText) S.revFeedbackText[fbKey2]='';
      render();
    }
  }

  /* ── Scope tag toggle ── */
  else if(a==='scope-toggle'){
    var pid_sc=el.dataset.pid, tagId=el.dataset.tag;
    if(!S.projScope) S.projScope={};
    if(!S.projScope[pid_sc]) S.projScope[pid_sc]={};
    S.projScope[pid_sc][tagId]=!S.projScope[pid_sc][tagId];
    /* Optimistic DOM update (no full re-render for snappiness) */
    el.classList.toggle('on');
    el.classList.toggle('off');
    /* Update count badge without full render */
    var allTags=document.querySelectorAll('[data-a="scope-toggle"][data-pid="'+pid_sc+'"]');
    var activeCount=Array.from(allTags).filter(function(b){return b.classList.contains('on');}).length;
    var countEl=document.querySelector('.scope-count-active');
    if(countEl) countEl.textContent=activeCount;
  }

  /* ── Overview: toggle edit mode per section ── */
  else if(a==='ov-edit'){
    const pid=el.dataset.pid, sec=el.dataset.section;
    if(!S.projEditMode) S.projEditMode={};
    if(!S.projEditMode[pid]) S.projEditMode[pid]={};
    S.projEditMode[pid][sec]=!S.projEditMode[pid][sec];
    render();
  }
  /* ── Overview: save address ── */
  else if(a==='save-addr-data'){
    const pid=el.dataset.pid;
    if(!S.projAddress) S.projAddress={};
    S.projAddress[pid]={
      street:  document.getElementById('addr-street')?.value||'',
      city:    document.getElementById('addr-city')?.value||'',
      state:   document.getElementById('addr-state')?.value||'',
      zip:     document.getElementById('addr-zip')?.value||'',
      country: document.getElementById('addr-country')?.value||'',
    };
    if(!S.projEditMode[pid]) S.projEditMode[pid]={};
    S.projEditMode[pid].addr=false;
    render();
    const n=document.createElement('div');
    n.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both;box-shadow:0 4px 16px rgba(22,163,74,.3)';
    n.textContent='✓ Endereço salvo';document.body.appendChild(n);
    setTimeout(()=>n.remove(),2500);
  }
  /* ── Admin: save client data ── */
  else if(a==='save-client-data'){
    const pid=el.dataset.pid;
    S.projClientData[pid]={
      name:    document.getElementById('cd-name')?.value||'',
      company: document.getElementById('cd-company')?.value||'',
      email:   document.getElementById('cd-email')?.value||'',
      phone:   document.getElementById('cd-phone')?.value||'',
      country: document.getElementById('cd-country')?.value||'',
      language:document.getElementById('cd-lang')?.value||'',
    };
    if(!S.projEditMode[pid]) S.projEditMode[pid]={};
    S.projEditMode[pid].client=false;
    const n=document.createElement('div');
    n.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both;box-shadow:0 4px 16px rgba(22,163,74,.3)';
    n.textContent='✓ Dados do cliente salvos';document.body.appendChild(n);
    setTimeout(()=>n.remove(),2500);
  }
  /* ── Admin: save tech data ── */
  else if(a==='save-tech-data'){
    const pid=el.dataset.pid;
    S.projTechData[pid]={
      area:      document.getElementById('td-area')?.value||'',
      niveis:    document.getElementById('td-niveis')?.value||'',
      inicio:    document.getElementById('td-inicio')?.value||'',
      arq:       document.getElementById('td-arq')?.value||'',
      revisions: document.getElementById('td-rev')?.value||'0',
      /* stage now set via status bar */
    };
    if(!S.projEditMode) S.projEditMode={};
    if(!S.projEditMode[pid]) S.projEditMode[pid]={};
    S.projEditMode[pid].tech=false;
    const n=document.createElement('div');
    n.style='position:fixed;bottom:24px;right:24px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:fadeUp .3s both;box-shadow:0 4px 16px rgba(22,163,74,.3)';
    n.textContent='✓ Detalhes técnicos salvos';document.body.appendChild(n);
    setTimeout(()=>n.remove(),2500);
  }
  /* ── Admin: set project status ── */
  else if(a==='set-proj-status'){
    const pid=el.dataset.pid,v=el.dataset.v;
    S.projStatus[pid]=v;
    const proj=ALL_PROJECTS.find(p=>String(p.id)===pid);
    if(proj)proj.status=v;
    render();
  }
  /* ── Admin: add invoice ── */
  else if(a==='add-invoice'){
    const amt=parseFloat(document.getElementById('inv-amt')?.value||'0');
    const due=document.getElementById('inv-due')?.value||'';
    const proj=el.dataset.proj;
    if(amt>0&&due){
      const id='INV-2026-'+(String(S.adminInvoices.length+10).padStart(3,'0'));
      S.adminInvoices.unshift({id,project:proj,amount:amt,status:'pending',due:due.split('-').reverse().join('/'),client:'Jackson Da Silva'});
      S.newInvAmt='';S.newInvDue='';render();
    }
  }
  /* ── Admin: approve / reject proof ── */
  else if(a==='approve-proof'){
    if(!S.proofStatus)S.proofStatus={};
    S.proofStatus[el.dataset.ph]='approved';render();
  }
  else if(a==='reject-proof'){
    if(!S.proofStatus)S.proofStatus={};
    S.proofStatus[el.dataset.ph]='rejected';render();
  }
  /* ── Admin: contract ── */
  else if(a==='remove-contract'){S.contract=null;render()}
  /* ── Admin: ticket reply + status ── */
  else if(a==='set-tkt-status'){
    const tkt=S.tickets.find(t=>t.id===el.dataset.id);
    if(tkt){tkt.status=el.dataset.v;render();}
  }
  else if(a==='send-tkt-reply'){
    const id=el.dataset.id;
    const v=document.getElementById('tkt-reply-'+id)?.value.trim();
    const tkt=S.tickets.find(t=>t.id===id);
    if(tkt&&v){
      tkt.reply=v;
      tkt.replyDate=new Date().toLocaleDateString('pt-BR');
      tkt.status='Em Revisão';
      S.tktReply[id]='';
      render();
    }
  }
  /* ── Admin: update photos ── */
  else if(a==='remove-photo'){
    S.updatePhotos.splice(parseInt(el.dataset.i),1);render();
  }
  /* ── Admin: edit update ── */
  else if(a==='edit-update'){S.editingUpdate=parseInt(el.dataset.i);render()}
  else if(a==='cancel-edit-update'){S.editingUpdate=null;render()}
  else if(a==='save-update'){
    const i=parseInt(el.dataset.i);
    const v=document.getElementById('edit-ut')?.value.trim();
    if(v&&S.updates[i]){S.updates[i].text=v;S.editingUpdate=null;render();}
  }
  else if(a==='opntkt'){const v=document.getElementById('tt')?.value.trim();if(v){S.tickets.unshift({id:'TKT-'+String(S.tickets.length+1).padStart(3,'0'),desc:v,date:new Date().toLocaleDateString('pt-BR'),status:'Aberto'});S.ttxt='';render()}}
}

/* ── Step date picker global handler ── */
function setStepDate(input){
  const pid = input.getAttribute('data-pid');
  const sid = input.getAttribute('data-sid');
  if(!pid||!sid) return;
  if(!S.stepDates) S.stepDates={};
  S.stepDates[pid+'_'+sid] = input.value;
  render();
}

/* ── Redirect screen ── */
function showRedirectScreen(){
  const u = USERS_MAP[S.role];
  const roleLabel = {cliente:'Client Portal',freelancer:'Collaborator Area',admin:'Admin Panel'}[S.role]||'Portal';
  const first = u&&u.name ? u.name.split(' ')[0] : 'User';

  /* Build screen element */
  const screen = document.createElement('div');
  screen.id = 'redirect-screen';
  screen.innerHTML =
    '<div class="rd-ring">'+
      '<svg class="rd-check-svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">'+
        '<path d="M20 6L9 17l-5-5"/>'+
      '</svg>'+
    '</div>'+
    '<p class="rd-welcome">Welcome, '+first+'!</p>'+
    '<p class="rd-subtitle">'+roleLabel+' <em>/ Redirecting</em></p>'+
    '<div class="rd-dots-row">'+
      '<div class="rd-dot-bullet"></div>'+
      '<div class="rd-dot-bullet"></div>'+
      '<div class="rd-dot-bullet"></div>'+
    '</div>';

  document.body.appendChild(screen);

  /* After 2.6s: fade out -> enter dashboard */
  setTimeout(()=>{
    screen.classList.add('exiting');
    setTimeout(()=>{
      screen.remove();
      S.loggedIn=true;
      S.skeletonDone=false;
      render();
    },500);
  },2600);
}

function doLogin(){
  const CREDS={
    cliente:   {em:'joao@darastudio.com',pw:'teste123'},
    freelancer:{em:'freela@darastudio.com',pw:'freela123'},
    admin:     {em:'admin@darastudio.com',pw:'admin123'},
  };
  const em=S.em||(document.getElementById('em-i')?.value||'');
  const pw=S.pw||(document.getElementById('pw-i')?.value||'');
  if(!em||!pw){S.err='Preencha todos os campos.';render();return}
  S.err='';S.busy=true;render();
  setTimeout(()=>{
    S.busy=false;
    if(S.ltab==='in'){
      const valid=CREDS[S.role];
      if(em===valid.em&&pw===valid.pw){
        render(); /* clear busy state */
        showRedirectScreen(); /* show redirect → then enter dashboard */
      } else {
        S.err=`Credenciais inválidas para o perfil ${S.role}.`;render();
      }
    }else{
      if(pw.length<6){S.err='Senha: mínimo 6 caracteres.';render();return}
      S.ok='Conta criada! Verifique seu e-mail.';S.ltab='in';render();
    }
  },700);
}

function doSend(){
  const v=(S.cmsg||(document.getElementById('ci')?.value||'')).trim();
  if(!v) return;

  const ts = chatTimestamp();
  const senderName = USERS_MAP[S.role]&&USERS_MAP[S.role].name
    ? USERS_MAP[S.role].name.split(' ')[0] : 'Cliente';

  /* Add the user message */
  S.msgs.push({
    id:Date.now(), from:'client',
    name:senderName, text:v, time:ts,
  });
  S.cmsg='';

  /* ---- Business hours check ---- */
  if(!isBRT_BusinessHours()){
    /* 1. Create ticket automatically */
    const tktId = 'TKT-'+String(S.tickets.length+1).padStart(3,'0');
    const now   = new Date();
    const dateStr = now.toLocaleDateString('pt-BR');
    S.tickets.unshift({
      id: tktId,
      desc: v,
      date: dateStr,
      status: 'Aberto',
      origin: 'chat_auto',   /* flag: came from out-of-hours chat */
      reply: null,
    });

    /* 2. Bot auto-reply after short delay (feels natural) */
    setTimeout(()=>{
      S.msgs.push({
        id:Date.now()+1,
        from:'bot',
        name:'DARA Bot',
        text:'Voce enviou uma mensagem fora do nosso horario de atendimento '+
             '(Seg-Sex, 08:00-16:00 BRT). Para garantir que nada se perca, o '+
             'ticket '+tktId+' foi aberto automaticamente com a sua solicitacao. '+
             'Nossa equipe respondera assim que o expediente iniciar.',
        time:chatTimestamp(),
      });
      render();
      const cb=document.getElementById('cb');
      if(cb) cb.scrollTop=cb.scrollHeight;
    },800);
  }

  render();
  /* Scroll to bottom */
  requestAnimationFrame(()=>{
    const cb=document.getElementById('cb');
    if(cb) cb.scrollTop=cb.scrollHeight;
  });
}

render();
})();
</script>
