<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DARA Studio — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'%3E%3Canimate attributeName='stop-color' values='%236366f1;%23a78bfa;%236366f1' dur='3s' repeatCount='indefinite'/%3E%3C/stop%3E%3Cstop offset='100%25' stop-color='%23a78bfa'%3E%3Canimate attributeName='stop-color' values='%23a78bfa;%236366f1;%23a78bfa' dur='3s' repeatCount='indefinite'/%3E%3C/stop%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ TOKENS ══ */
:root{
  --a:#6366f1;--a2:#818cf8;--a3:#4f46e5;
  --as:rgba(99,102,241,.09);--ab:rgba(99,102,241,.18);
  --lav:#f3f2ff;--lav2:#eceaff;
  --bg:#f3f2ff;--bg2:#ffffff;--bg3:#eceaff;
  --tx:#1c1a2e;--mu:#6b6880;--dm:#9b99b0;
  --br:rgba(99,102,241,.15);--br2:rgba(99,102,241,.28);
  --cb:rgba(0,0,0,.07);
  --gn:#16a34a;--gnb:rgba(22,163,74,.08);
  --am:#d97706;--amb:rgba(217,119,6,.08);
  --rd:#dc2626;--rdb:rgba(220,38,38,.08);
  --bl:#2563eb;--blb:rgba(37,99,235,.08);
  --sbw:224px;--sbc:52px;
  --page-transition:.28s;
}

[data-theme=dark]{
  --bg:#0f0e1a;--bg2:#1a1828;--bg3:#241f38;
  --tx:#e8e6f0;--mu:#9b98b0;--dm:#6b6880;
  --br:rgba(99,102,241,.22);--br2:rgba(99,102,241,.35);
  --cb:rgba(255,255,255,.06);
  --lav:#1a1828;--lav2:#241f38;
  --gnb:rgba(22,163,74,.14);--amb:rgba(217,119,6,.14);
  --rdb:rgba(220,38,38,.14);--blb:rgba(37,99,235,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
#root{display:flex;flex-direction:column;min-height:100vh}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden}
#splash-bg{position:absolute;inset:0;background:#0d0a1e}
#splash-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 40%,rgba(99,102,241,.45) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 80% 60%,rgba(167,139,250,.35) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 50% 10%,rgba(79,70,229,.3) 0%,transparent 60%);animation:splashMesh 6s ease-in-out infinite alternate}
#splash-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 40% 40% at 70% 80%,rgba(139,92,246,.25) 0%,transparent 55%),radial-gradient(ellipse 30% 50% at 10% 70%,rgba(99,102,241,.2) 0%,transparent 55%);animation:splashMesh2 8s ease-in-out infinite alternate}
@keyframes splashMesh{0%{transform:scale(1) rotate(0)}50%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1.04) rotate(-1deg)}}
@keyframes splashMesh2{0%{transform:scale(1.05) rotate(-2deg)}100%{transform:scale(.97) rotate(3deg)}}
#splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center}
#sp-logo-wrap{display:flex;align-items:center;justify-content:center;animation:spLogoIn .7s cubic-bezier(.22,.68,0,1.3) both;margin-bottom:28px}
.sp-logo-d{width:72px;height:72px;background:linear-gradient(135deg,#6366f1,#a78bfa);border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:38px;color:#fff;animation:spLogoGlow 1.2s .6s cubic-bezier(.22,.68,0,1.15) forwards}
@keyframes spLogoIn{from{opacity:0;transform:scale(.5) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes spLogoGlow{0%{box-shadow:0 0 0 0 rgba(99,102,241,.6)}50%{box-shadow:0 0 0 22px rgba(99,102,241,.15),0 8px 40px rgba(99,102,241,.5)}100%{box-shadow:0 0 0 8px rgba(99,102,241,.08),0 8px 30px rgba(99,102,241,.35)}}
#sp-name-wrap{opacity:0;animation:spNameIn .6s 1s cubic-bezier(.22,.68,0,1.15) forwards;display:flex;flex-direction:column;align-items:center;gap:6px}
@keyframes spNameIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sp-name{font-family:'Instrument Serif',serif;font-size:36px;color:#fff;letter-spacing:.18em;background:linear-gradient(90deg,#fff 0%,#c4b5fd 50%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:spShimmer 2.5s 1.2s linear infinite}
@keyframes spShimmer{0%{background-position:0% center}100%{background-position:200% center}}
.sp-tagline{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.22em;font-weight:300;text-transform:uppercase;animation:spTagIn .5s 1.4s both}
@keyframes spTagIn{from{opacity:0;letter-spacing:.38em}to{opacity:1;letter-spacing:.22em}}
.sp-line{width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.7),transparent);margin:20px 0;animation:spLineGrow .5s 1.6s cubic-bezier(.22,.68,0,1.15) forwards}
@keyframes spLineGrow{to{width:120px}}
#sp-portal{opacity:0;animation:spPortalIn .55s 2s cubic-bezier(.22,.68,0,1.15) forwards;display:flex;flex-direction:column;align-items:center;gap:8px}
@keyframes spPortalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sp-portal-label{font-size:10px;color:rgba(99,102,241,.7);letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.sp-portal-title{font-family:'Instrument Serif',serif;font-size:20px;color:rgba(255,255,255,.6)}
.sp-bar-wrap{width:120px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:28px;overflow:hidden;animation:spBarWrapIn .3s 2.1s both}
@keyframes spBarWrapIn{from{opacity:0}to{opacity:1}}
.sp-bar{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#6366f1,#a78bfa);animation:spBarFill 1.5s 2.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spBarFill{to{width:100%}}
#splash.exiting{animation:spExit .65s cubic-bezier(.4,0,.2,1) forwards}
@keyframes spExit{0%{opacity:1;transform:scale(1)}40%{opacity:1;transform:scale(1.03)}100%{opacity:0;transform:scale(1.06)}}
#splash.gone{display:none}

/* ══ BG ORBS ══ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);will-change:transform}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);top:-100px;left:-100px;animation:orbFloat1 18s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,.12) 0%,transparent 70%);bottom:-80px;right:-80px;animation:orbFloat2 22s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);top:40%;left:60%;animation:orbFloat3 16s ease-in-out infinite}
@keyframes orbFloat1{0%{transform:translate(0,0) scale(1)}33%{transform:translate(80px,60px) scale(1.1)}66%{transform:translate(-40px,100px) scale(.95)}100%{transform:translate(0,0) scale(1)}}
@keyframes orbFloat2{0%{transform:translate(0,0) scale(1)}25%{transform:translate(-70px,-50px) scale(1.08)}60%{transform:translate(50px,-80px) scale(.92)}100%{transform:translate(0,0) scale(1)}}
@keyframes orbFloat3{0%{transform:translate(0,0) scale(1)}40%{transform:translate(-90px,50px) scale(1.12)}80%{transform:translate(60px,-40px) scale(.9)}100%{transform:translate(0,0) scale(1)}}

/* ══ KEYFRAMES ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes shimmerText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:.6em;transform:translateY(-6px)}60%{opacity:1;letter-spacing:.14em}100%{opacity:1;letter-spacing:.06em}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes navBarDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barFill{from{width:0}}
@keyframes navIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,.35)}50%{box-shadow:0 4px 30px rgba(99,102,241,.6)}}
@keyframes dropDown{from{opacity:0;transform:translateY(-6px) scaleY(.95)}to{opacity:1;transform:translateY(0) scaleY(1)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pageIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes notifPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.fa {animation:fadeUp .38s cubic-bezier(.22,.68,0,1.15) both}
.fa1{animation:fadeUp .38s .06s cubic-bezier(.22,.68,0,1.15) both}
.fa2{animation:fadeUp .38s .12s cubic-bezier(.22,.68,0,1.15) both}
.fa3{animation:fadeUp .38s .18s cubic-bezier(.22,.68,0,1.15) both}
.fa4{animation:fadeUp .38s .24s cubic-bezier(.22,.68,0,1.15) both}
.fa5{animation:fadeUp .38s .30s cubic-bezier(.22,.68,0,1.15) both}
.page-anim{animation:pageIn var(--page-transition) cubic-bezier(.22,.68,0,1.15) both}

/* ══ LAYOUT ══ */
#layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* ══ SIDEBAR ══ */
.sidebar{width:var(--sbw);background:var(--v1,#0d0a1e);flex-shrink:0;display:flex;flex-direction:column;transition:width .26s cubic-bezier(.4,0,.2,1);position:sticky;top:0;height:100vh;overflow:hidden;border-right:1px solid rgba(99,102,241,.12);animation:slideRight .4s cubic-bezier(.22,.68,0,1.15) both}
.sidebar.col{width:var(--sbc)}
.sb-head{padding:18px 14px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:10px;min-height:64px}
.sb-logo{width:30px;height:30px;flex-shrink:0;background:linear-gradient(135deg,var(--a),#818cf8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:16px;color:#fff;animation:glowPulse 3s infinite}
.sb-text{overflow:hidden;transition:all .25s;white-space:nowrap}
.sidebar.col .sb-text{opacity:0;width:0}
.sb-name{font-family:'Instrument Serif',serif;font-size:13px;color:#fff;animation:logoReveal .9s .3s cubic-bezier(.22,.68,0,1.15) both}
.sb-tag{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.08em;animation:fadeIn .6s .8s both}
.sb-toggle{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);padding:4px;display:flex;flex-shrink:0;border-radius:6px;transition:all .15s}
.sb-toggle:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.06)}
.sb-nav{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.sb-sect{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.12em;font-weight:700;padding:14px 12px 4px;white-space:nowrap;overflow:hidden;transition:opacity .2s}
.sidebar.col .sb-sect{opacity:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border:none;border-radius:9px;width:100%;text-align:left;cursor:pointer;background:none;color:rgba(255,255,255,.38);font-family:'DM Sans',inherit;font-size:13px;font-weight:400;transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;white-space:nowrap}
.nav-item::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;border-radius:2px;background:var(--a2,#818cf8);transform:scaleY(0);transition:transform .2s cubic-bezier(.4,0,.2,1)}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.72)}
.nav-item.act{background:rgba(99,102,241,.14);color:var(--a2,#818cf8);font-weight:500}
.nav-item.act::before{transform:scaleY(1)}
.nav-lbl{flex:1;overflow:hidden;transition:all .25s}
.sidebar.col .nav-lbl{opacity:0;width:0}
.nav-badge{background:var(--a);color:#fff;border-radius:10px;font-size:10px;font-weight:600;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px;transition:all .25s;flex-shrink:0}
.sidebar.col .nav-badge{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;min-width:unset;padding:0;font-size:0}
.nav-tip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:#0d0a1e;border:1px solid rgba(99,102,241,.25);color:rgba(255,255,255,.85);font-size:12px;padding:5px 11px;border-radius:7px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.sidebar.col .nav-item:hover .nav-tip{opacity:1}
.sb-div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:4px 8px}
.sb-bot{padding:4px 8px 16px}
.sb-role-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block}
.nav-item:nth-child(1){animation:navIn .26s .06s both}
.nav-item:nth-child(2){animation:navIn .26s .11s both}
.nav-item:nth-child(3){animation:navIn .26s .16s both}
.nav-item:nth-child(4){animation:navIn .26s .21s both}
.nav-item:nth-child(5){animation:navIn .26s .26s both}
.nav-item:nth-child(6){animation:navIn .26s .31s both}
.nav-item:nth-child(7){animation:navIn .26s .36s both}

/* ══ TOPBAR ══ */
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--br);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;animation:navBarDrop .35s cubic-bezier(.22,.68,0,1.15) both;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tb-brand{font-size:12px;color:var(--mu);display:flex;align-items:center;gap:6px}
.tb-brand strong{font-family:'Instrument Serif',serif;font-size:14px;background:linear-gradient(90deg,var(--a),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-right{display:flex;align-items:center;gap:8px;position:relative}
.tb-btn{background:none;border:none;cursor:pointer;padding:7px;color:var(--mu);display:flex;border-radius:9px;transition:background .15s}
.tb-btn:hover{background:var(--lav2)}
.tb-ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--a);animation:pulse 2.5s infinite;pointer-events:none}
.tb-ndot.pop{animation:notifPop .3s both}
.tb-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--a),#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:13px;color:#fff;cursor:pointer;box-shadow:0 2px 10px rgba(99,102,241,.3);transition:all .2s;border:none;font-family:'Instrument Serif',serif}
.tb-avatar:hover{transform:scale(1.06)}
.dark-toggle{background:var(--lav2);border:1.5px solid var(--br);border-radius:20px;width:40px;height:22px;cursor:pointer;position:relative;transition:all .25s;flex-shrink:0;display:flex;align-items:center}
.dark-toggle::after{content:'';position:absolute;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.4,0,.2,1)}
[data-theme=dark] .dark-toggle{background:var(--a);border-color:var(--a)}
[data-theme=dark] .dark-toggle::after{transform:translateX(18px)}

/* ══ NOTIF PANEL ══ */
.notif-panel{position:absolute;right:0;top:46px;width:300px;background:var(--bg2);border:1px solid var(--br2);border-radius:14px;z-index:50;box-shadow:0 12px 40px rgba(99,102,241,.12),0 2px 8px rgba(0,0,0,.08);overflow:hidden;animation:dropDown .22s cubic-bezier(.22,.68,0,1.15) both}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center}
.notif-head span{font-size:13px;font-weight:600;color:var(--tx)}
.notif-close{background:none;border:none;cursor:pointer;color:var(--dm);display:flex;border-radius:6px;padding:3px;transition:background .15s}
.notif-close:hover{background:var(--lav2)}
.notif-item{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.04);display:flex;gap:10px;align-items:flex-start;transition:background .15s;cursor:default}
.notif-item:hover{background:var(--lav)}
.notif-item.unread{background:var(--as)}
.notif-ico{width:28px;height:28px;border-radius:8px;background:var(--as);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--a);font-weight:700;border:1px solid var(--br)}
.notif-mark{font-size:10px;color:var(--a);background:none;border:none;cursor:pointer;padding:8px 16px;width:100%;text-align:center;font-family:inherit;font-weight:500;border-top:1px solid var(--br);transition:background .15s}
.notif-mark:hover{background:var(--lav)}

/* ══ MAIN ══ */
.main{flex:1;overflow:auto;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
.page{padding:24px 24px 60px;flex:1}
.page-title{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;margin-bottom:4px;color:var(--tx)}
.page-sub{font-size:12px;color:var(--mu);margin-bottom:22px}

/* ══ CARDS ══ */
.card{background:var(--bg2);border:1px solid var(--cb);border-radius:13px;padding:18px 22px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card:hover{border-color:rgba(99,102,241,.2);box-shadow:0 4px 16px rgba(99,102,241,.08)}
.card-click{cursor:pointer}
.card-click:hover{border-color:var(--a);transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.12)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1px solid var(--cb);border-radius:13px;padding:16px 18px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kpi:hover{border-color:var(--a);transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.13)}
.kpi-label{font-size:11px;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:500}
.kpi-val{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;line-height:1}
.kpi-delta{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:3px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;border-radius:20px;padding:2px 9px}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.prog{background:var(--lav2);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;animation:barFill .9s cubic-bezier(.22,.68,0,1.15) both}
.tab-bar{display:flex;border-bottom:1px solid var(--br);background:var(--bg2);overflow-x:auto;gap:0}
.tab-btn{background:none;border:none;padding:11px 16px;font-size:12px;font-weight:400;cursor:pointer;font-family:'DM Sans',inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;color:var(--dm)}
.tab-btn.act{color:var(--a);border-bottom-color:var(--a);font-weight:600}
.tab-btn:hover:not(.act){color:var(--mu);background:rgba(99,102,241,.05)}
.chip-row{display:flex;background:var(--lav2);border-radius:10px;padding:3px;gap:2px;width:fit-content}
.chip{padding:6px 14px;font-size:11px;font-family:'DM Sans',inherit;border:none;border-radius:8px;cursor:pointer;color:var(--mu);background:none;transition:all .18s;font-weight:500}
.chip.act{background:var(--bg2);color:var(--tx);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn-primary{background:var(--a);border:none;border-radius:9px;padding:9px 20px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s;box-shadow:0 2px 10px rgba(99,102,241,.28)}
.btn-primary:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 4px 18px rgba(99,102,241,.38)}
.btn-ghost{background:transparent;border:1.5px solid var(--br2);border-radius:9px;padding:9px 20px;font-size:12px;font-weight:500;color:var(--tx);cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s}
.btn-ghost:hover{background:var(--as);border-color:var(--a);color:var(--a)}
.btn-danger{background:var(--rdb);border:1px solid rgba(220,38,38,.25);border-radius:9px;padding:7px 14px;font-size:11px;font-weight:600;color:var(--rd);cursor:pointer;font-family:inherit;transition:all .2s}
.btn-danger:hover{background:rgba(220,38,38,.15)}
.form-lbl{font-size:10px;font-weight:600;color:var(--dm);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.form-inp{width:100%;border:1.5px solid var(--br);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--tx);background:var(--lav);font-family:'DM Sans',inherit;outline:none;transition:all .2s}
.form-inp:focus{border-color:var(--a);background:var(--bg2);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-ta{width:100%;border:1.5px solid var(--br);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--tx);background:var(--lav2);font-family:'DM Sans',inherit;outline:none;resize:vertical;min-height:74px;transition:all .2s;box-sizing:border-box}
.form-ta:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.prow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05)}
[data-theme=dark] .prow{border-bottom-color:rgba(255,255,255,.06)}
svg.ic{display:inline-block;vertical-align:middle;flex-shrink:0}
/* ── Avatar upload ── */
.av-upload-wrap{position:relative;width:58px;height:58px;flex-shrink:0;cursor:pointer}
.av-upload-wrap .profile-av{width:100%;height:100%;transition:filter .2s}
.av-upload-wrap:hover .profile-av{filter:brightness(.5)}
.av-upload-wrap .av-cam{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;
  font-size:16px;color:#fff;gap:2px;
}
.av-upload-wrap:hover .av-cam{opacity:1}
.av-upload-wrap .av-cam span{font-size:9px;font-weight:600;letter-spacing:.04em}

/* ── Project photo upload ── */
.proj-photo-wrap{
  width:120px;height:120px;flex-shrink:0;border-radius:12px;
  border:2px dashed var(--br2);background:var(--lav2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;overflow:hidden;position:relative;
}
.proj-photo-wrap:hover{border-color:var(--a);background:var(--as)}
.proj-photo-wrap.has-photo{border-style:solid;border-color:var(--br)}
.proj-photo-wrap .pph-label{font-size:10px;color:var(--dm);margin-top:6px;text-align:center;line-height:1.4;font-weight:500}
.proj-photo-wrap:hover .pph-label{color:var(--a)}
.proj-photo-wrap .pph-check{
  position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;
  background:var(--gn);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#fff;font-weight:700;
}


/* ── Update attachments thumbnails ── */
.att-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.att-thumb{
  width:64px;height:64px;border-radius:8px;overflow:hidden;
  border:1px solid var(--br);flex-shrink:0;position:relative;
  transition:transform .15s,box-shadow .15s;cursor:default;
}
.att-thumb:hover{transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.att-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.att-thumb-icon{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  background:var(--as);
}
.att-thumb-icon span{font-size:9px;font-weight:600;color:var(--a);letter-spacing:.03em;text-transform:uppercase}
.att-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--lav2);border:1px solid var(--br);border-radius:7px;
  padding:5px 10px;font-size:11px;color:var(--mu);
  transition:background .15s;
}
.att-chip:hover{background:var(--as);color:var(--a)}

/* ── Upload stage bar (pré-publicação) ── */
.upstage-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.upstage-chip{
  display:flex;align-items:center;gap:7px;
  background:var(--lav2);border:1px solid var(--br);border-radius:8px;
  padding:6px 10px;font-size:11px;color:var(--mu);max-width:200px;
}
.upstage-chip .chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px}
.upstage-chip button{background:none;border:none;cursor:pointer;color:var(--rd);padding:0;display:flex;flex-shrink:0}

/* ── Activity log ── */
.log-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--cb);
  transition:background .15s;
}
.log-row:last-child{border:none}
.log-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.log-line{flex:1;min-width:0}
.log-who{font-size:12px;font-weight:600;color:var(--tx)}
.log-desc{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.5}
.log-meta{display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap}
.log-proj{font-size:10px;color:var(--a);font-weight:500;display:flex;align-items:center;gap:4px}
.log-ts{font-size:10px;color:var(--dm)}
.log-role-pill{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}

/* ── User management cards ── */
.user-card{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  padding:18px;transition:all .22s cubic-bezier(.4,0,.2,1);
  display:flex;gap:14px;align-items:flex-start;
}
.user-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-2px);box-shadow:0 6px 22px rgba(99,102,241,.1)}
.user-logo{
  width:52px;height:52px;border-radius:10px;flex-shrink:0;
  object-fit:cover;border:1px solid var(--br);
}
.user-logo-placeholder{
  width:52px;height:52px;border-radius:10px;flex-shrink:0;
  background:var(--as);border:1px solid var(--br);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:18px;color:var(--a);
}
.user-card-body{flex:1;min-width:0}
.user-card-name{font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:7px}
.user-card-company{font-size:11px;color:var(--mu);margin-top:2px}
.user-card-spec{font-size:10px;color:var(--dm);margin-top:3px;display:flex;align-items:center;gap:5px}
.online-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.user-card-footer{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.user-stat{font-size:10px;color:var(--mu);background:var(--lav2);border-radius:5px;padding:2px 8px;display:flex;align-items:center;gap:4px}


/* ── Activity bar (nível freelancer) ── */
.act-bar-bg{height:5px;background:var(--lav2);border-radius:3px;overflow:hidden;margin-top:8px;margin-bottom:2px}
.act-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--a),#a78bfa);transition:width .8s cubic-bezier(.22,.68,0,1.15)}
.act-bar.high{background:linear-gradient(90deg,#16a34a,#4ade80)}
.act-bar.mid {background:linear-gradient(90deg,#d97706,#fbbf24)}

/* ── Log row hover highlight ── */
.log-row:hover{background:var(--as);border-radius:8px;padding-left:6px}

/* ── User section divider ── */
.users-section-title{
  font-size:10px;font-weight:700;color:var(--dm);
  text-transform:uppercase;letter-spacing:.12em;
  padding:14px 0 8px;display:flex;align-items:center;gap:8px;
}
.users-section-title::after{
  content:'';flex:1;height:1px;background:var(--br);
}

/* ── Nível badge ── */
.level-badge{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
  letter-spacing:.04em;text-transform:uppercase;
}
.level-senior{background:rgba(99,102,241,.12);color:#6366f1}
.level-pleno {background:rgba(217,119,6,.12);color:#d97706}
.level-junior{background:rgba(22,163,74,.12);color:#16a34a}

/* ── Log timeline connector ── */
.log-list{position:relative;padding-left:0}
/* ── Section header ── */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}


/* == CHAT BUSINESS HOURS == */
.wa-hours-banner{
  padding:8px 14px;
  background:rgba(99,102,241,.07);
  border-bottom:1px solid rgba(99,102,241,.12);
  font-size:11px;color:rgba(99,102,241,.85);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
[data-theme=dark] .wa-hours-banner{
  background:rgba(99,102,241,.12);
  color:rgba(165,162,255,.9);
}
.wa-bubble.bot{
  align-self:flex-start;max-width:85%;
  background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(99,102,241,.06));
  border:1px solid rgba(99,102,241,.2);border-top-left-radius:4px;
}
.wa-bubble.bot .wa-msg-txt{color:var(--tx);font-size:12px;line-height:1.6}
.wa-bubble.bot .wa-msg-meta{color:rgba(99,102,241,.6)}
.wa-bot-label{
  font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--a);margin-bottom:4px;display:block;
}

/* == FINANCE OVERVIEW == */
.fin-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.fin-kpi{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  padding:18px 20px;transition:all .2s;
}
.fin-kpi:hover{border-color:var(--br2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.fin-kpi-label{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fin-kpi-val{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;color:var(--tx);margin-bottom:4px}
.fin-kpi-sub{font-size:11px;color:var(--mu)}

/* Two-col analytics */
.fin-analytics{display:grid;grid-template-columns:1fr 1.8fr;gap:14px;margin-bottom:20px}
@media(max-width:700px){.fin-analytics{grid-template-columns:1fr}}

/* Forecast card */
.fin-forecast{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);border-radius:14px;padding:22px 24px;color:#fff;position:relative;overflow:hidden}
.fin-forecast::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.06)}
.fin-forecast::after{content:'';position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.04)}
.fin-forecast-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:6px}
.fin-forecast-val{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;color:#fff;margin-bottom:16px;position:relative}
.fin-forecast-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid rgba(255,255,255,.15)}
.fin-forecast-row-lbl{font-size:11px;color:rgba(255,255,255,.7)}
.fin-forecast-row-val{font-size:13px;font-weight:600;color:#fff}

/* Chart placeholder / bar chart */
.fin-chart-card{background:var(--bg2);border:1px solid var(--cb);border-radius:14px;padding:20px 22px}
.fin-chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px}
.fin-chart-sub{font-size:11px;color:var(--mu);margin-bottom:18px}
.fin-bar-group{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:10px}
.fin-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.fin-bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;justify-content:center}
.fin-bar{
  width:100%;border-radius:5px 5px 0 0;
  background:linear-gradient(to top,#6366f1,#818cf8);
  transition:height .6s cubic-bezier(.22,.68,0,1.15);
  position:relative;cursor:default;
}
.fin-bar.paid{background:linear-gradient(to top,#16a34a,#4ade80)}
.fin-bar:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1c1a2e;color:#fff;
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;
  white-space:nowrap;z-index:10;
}
.fin-bar-lbl{font-size:9px;color:var(--dm);font-weight:500;text-align:center}

/* Section headers */
.fin-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.fin-section-title{font-family:'Instrument Serif',serif;font-size:16px;font-weight:400;color:var(--tx);display:flex;align-items:center;gap:8px}
.fin-section-count{font-size:11px;color:var(--mu);background:var(--lav2);border-radius:10px;padding:2px 9px}

/* Table improvements */
.fin-table{width:100%;border-collapse:collapse;font-size:12px}
.fin-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--cb);white-space:nowrap}
.fin-table td{padding:12px 14px;border-bottom:1px solid var(--cb);vertical-align:middle}
.fin-table tr:last-child td{border-bottom:none}
.fin-table tr:hover td{background:var(--as)}
.fin-entry-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(99,102,241,.1);color:var(--a);white-space:nowrap}
.fin-balance-cell{font-weight:700;font-size:12px}
.fin-balance-cell.owed{color:#dc2626;background:rgba(220,38,38,.06);border-radius:6px;padding:3px 8px;display:inline-block}
.fin-balance-cell.clear{color:#16a34a}
.fin-action-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;border:1px solid var(--cb);background:var(--bg2);font-size:10px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .16s;font-family:'DM Sans',inherit;white-space:nowrap}
.fin-action-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}
.fin-action-btn.remind:hover{border-color:#d97706;color:#d97706;background:rgba(217,119,6,.06)}

/* == OVERVIEW READ-ONLY LIST == */
.ov-card{background:var(--bg2);border:1px solid var(--cb);border-radius:14px;padding:0;overflow:hidden}
.ov-card-head{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--cb)}
.ov-card-title{font-family:'Instrument Serif',serif;font-size:15px;color:var(--tx);flex:1}
.ov-card-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em}

/* Field row */
.ov-field{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 18px;border-bottom:1px solid var(--cb);transition:background .15s}
.ov-field:last-child{border-bottom:none}
.ov-field:hover{background:var(--as)}
.ov-label{font-size:11px;color:var(--dm);font-weight:500;flex-shrink:0;min-width:90px}
.ov-value{font-size:12px;color:var(--tx);text-align:right;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-value.muted{color:var(--mu)}
.ov-value a{color:var(--a);text-decoration:none}
.ov-value a:hover{text-decoration:underline}

/* Editable inline input */
.ov-inp{font-size:12px;color:var(--tx);background:transparent;border:none;border-bottom:1.5px dashed var(--br);outline:none;text-align:right;font-family:'DM Sans',inherit;width:160px;padding:1px 4px;transition:border-color .18s}
.ov-inp:focus{border-bottom-color:var(--a);background:var(--as);border-radius:4px 4px 0 0}
.ov-select{font-size:12px;color:var(--tx);background:var(--bg2);border:1px solid var(--br);border-radius:7px;padding:3px 8px;font-family:'DM Sans',inherit;outline:none;cursor:pointer}

/* Budget progress bar in header */
.ov-budget-bar{height:4px;background:var(--lav2);border-radius:2px;overflow:hidden;margin-top:8px}
.ov-budget-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a),#818cf8);transition:width .8s cubic-bezier(.22,.68,0,1.15)}

/* Address bar */
.ov-addr-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 18px;background:rgba(99,102,241,.05);border-top:1px solid rgba(99,102,241,.12)}
.ov-addr-text{font-size:11px;color:var(--a);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-maps-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.07);font-size:10px;font-weight:700;color:var(--a);cursor:pointer;white-space:nowrap;transition:all .17s;text-decoration:none;font-family:'DM Sans',inherit}
.ov-maps-btn:hover{background:rgba(99,102,241,.14);border-color:var(--a)}

/* Status selector grid */
.ov-status-grid{display:flex;gap:8px;flex-wrap:wrap;padding:14px 18px}

/* == DOCUMENTS TAB == */
.doc-list{display:flex;flex-direction:column;gap:8px}
.doc-row{
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;border-radius:12px;border:1px solid var(--cb);
  background:var(--bg2);transition:all .18s;
}
.doc-row:hover{border-color:var(--br2);background:var(--as)}
.doc-ico{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.doc-ico.pdf{background:rgba(220,38,38,.07)}
.doc-ico.contract{background:rgba(99,102,241,.07)}
.doc-ico.invoice{background:rgba(22,163,74,.07)}
.doc-meta{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-info{font-size:11px;color:var(--dm);margin-top:2px;display:flex;align-items:center;gap:8px}
.doc-tag{font-size:9px;font-weight:700;padding:1px 7px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase}
.doc-tag.contract{background:rgba(99,102,241,.1);color:var(--a)}
.doc-tag.invoice{background:rgba(22,163,74,.1);color:var(--gn)}
.doc-tag.budget{background:rgba(217,119,6,.1);color:var(--am)}
.doc-tag.receipt{background:rgba(37,99,235,.1);color:var(--bl)}
.doc-actions{
  display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:auto;
}

/* Ghost base — transparent by default */
.doc-btn{
  width:34px;height:34px;border-radius:9px;
  border:1.5px solid transparent;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;color:var(--mu);
  position:relative;
}
.doc-btn svg{transition:color .18s}

/* Eye (preview) — indigo ghost */
.doc-btn.preview:hover{
  border-color:rgba(99,102,241,.35);
  background:rgba(99,102,241,.07);
  color:var(--a);
}
/* Download — green ghost */
.doc-btn.dl:hover{
  border-color:rgba(22,163,74,.35);
  background:rgba(22,163,74,.07);
  color:var(--gn);
}
/* Replace/upload — neutral ghost */
.doc-btn.replace:hover{
  border-color:var(--br2);
  background:var(--as);
  color:var(--tx);
}

/* Tooltip on each button */
.doc-btn::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%);
  background:#1c1a2e;color:#fff;
  font-size:10px;font-weight:500;padding:3px 8px;
  border-radius:6px;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .15s;z-index:50;
  font-family:'DM Sans',sans-serif;
}
.doc-btn:hover::after{opacity:1}

/* Divider between preview and download */
.doc-btn-sep{
  width:1px;height:18px;background:var(--cb);flex-shrink:0;
}
.doc-upload-area{
  border:2px dashed var(--br);border-radius:12px;
  padding:24px;text-align:center;cursor:pointer;
  transition:all .2s;margin-top:12px;
}
.doc-upload-area:hover{border-color:var(--a);background:var(--as)}

/* == REVIEWS TAB == */
.rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.rev-card{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  overflow:hidden;transition:all .2s;
}
.rev-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07)}
.rev-card.active{border-color:var(--a);box-shadow:0 0 0 3px var(--as)}
.rev-card-head{
  padding:14px 16px;border-bottom:1px solid var(--cb);
  display:flex;align-items:center;gap:10px;
}
.rev-phase-tag{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  display:inline-flex;align-items:center;gap:5px;
}
.rev-phase-tag::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.rev-phase-tag.active{background:#fef9c3;color:#92400e}
.rev-phase-tag.active::before{background:#d97706;animation:pulse 2s infinite}
.rev-phase-tag.completed{background:#dcfce7;color:#15803d}
.rev-phase-tag.completed::before{background:#16a34a}
.rev-phase-tag.pending{background:#f3f4f6;color:#6b7280}
.rev-phase-tag.pending::before{background:#9ca3af}
.rev-card-body{padding:14px 16px}

/* File thumbnail area */
.rev-file-preview{
  width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;
  background:var(--lav2);border:1px solid var(--cb);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;position:relative;cursor:pointer;
  transition:all .2s;
}
.rev-file-preview:hover .rev-preview-overlay{opacity:1}
.rev-preview-overlay{
  position:absolute;inset:0;background:rgba(99,102,241,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
  font-size:12px;font-weight:600;color:#fff;gap:8px;
}
.rev-file-name{font-size:11px;color:var(--mu);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Feedback/comments */
.rev-feedback-area{
  border-top:1px solid var(--cb);padding:12px 16px;
}
.rev-feedback-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.rev-feedback-title{font-size:11px;font-weight:600;color:var(--tx)}
.rev-comment{
  display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;
}
.rev-comment-av{
  width:24px;height:24px;border-radius:50%;background:var(--as);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--a);flex-shrink:0;
}
.rev-comment-bubble{
  background:var(--lav2);border-radius:0 8px 8px 8px;
  padding:7px 10px;flex:1;min-width:0;
}
.rev-comment-meta{font-size:9px;color:var(--dm);margin-bottom:3px}
.rev-comment-text{font-size:11px;color:var(--tx);line-height:1.5}
.rev-comment-bubble.approved{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2)}
.rev-comment-bubble.change-req{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.2)}
.rev-input-row{display:flex;gap:6px;margin-top:8px}
.rev-inp{
  flex:1;border:1px solid var(--cb);border-radius:8px;
  padding:7px 10px;font-size:11px;color:var(--tx);
  background:var(--lav);font-family:'DM Sans',inherit;outline:none;
  transition:border-color .18s;
}
.rev-inp:focus{border-color:var(--a)}
.rev-approve-btn{padding:6px 12px;border-radius:8px;border:none;background:var(--gn);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .17s;white-space:nowrap}
.rev-approve-btn:hover{background:#15803d}
.rev-change-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--am);background:var(--amb);color:var(--am);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .17s;white-space:nowrap}
.rev-change-btn:hover{background:rgba(217,119,6,.18)}

/* Upload trigger card */
.rev-upload-card{
  background:transparent;border:2px dashed var(--br);border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:28px;cursor:pointer;transition:all .2s;min-height:180px;
}
.rev-upload-card:hover{border-color:var(--a);background:var(--as)}

/* ══ REVIEW VIEWER — two-panel layout ══ */
.rv-wrap{
  display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;
}
@media(max-width:860px){.rv-wrap{grid-template-columns:1fr}}

/* Left: image canvas */
.rv-canvas{
  background:var(--lav2);border:1px solid var(--cb);border-radius:14px;
  position:relative;overflow:hidden;aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;cursor:crosshair;
}
.rv-canvas-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:32px;
}
.rv-canvas img{width:100%;height:100%;object-fit:contain;display:block}

/* Pin dot on canvas */
.rv-pin{
  position:absolute;width:26px;height:26px;border-radius:50%;
  transform:translate(-50%,-50%);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);
  transition:all .2s;z-index:10;
}
.rv-pin.pending{background:#6366f1}
.rv-pin.pending:hover{transform:translate(-50%,-50%) scale(1.18);box-shadow:0 4px 14px rgba(99,102,241,.5)}
.rv-pin.resolved{background:#16a34a;opacity:.55}
.rv-pin.resolved:hover{opacity:.85;transform:translate(-50%,-50%) scale(1.1)}
.rv-pin.hidden{display:none}

/* Pin tooltip */
.rv-pin-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:#1c1a2e;color:#fff;font-size:10px;font-weight:500;
  padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:20;
}
.rv-pin:hover .rv-pin-tip{opacity:1}

/* Right: task sidebar */
.rv-sidebar{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column;
}
.rv-sb-head{
  padding:14px 16px;border-bottom:1px solid var(--cb);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.rv-sb-title{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.rv-sb-count{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
  background:var(--as);color:var(--a);
}

/* Hide-resolved toggle */
.rv-toggle-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
.rv-toggle-lbl{font-size:10px;color:var(--dm);white-space:nowrap}
.rv-toggle{
  width:34px;height:19px;border-radius:10px;background:var(--lav2);
  border:1.5px solid var(--br);cursor:pointer;position:relative;
  transition:all .25s;padding:0;flex-shrink:0;
}
.rv-toggle::after{
  content:'';position:absolute;left:2px;top:2px;
  width:13px;height:13px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.rv-toggle.on{background:var(--a);border-color:var(--a)}
.rv-toggle.on::after{transform:translateX(15px)}

/* Comment task cards */
.rv-sb-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;max-height:460px}
.rv-task{
  border-radius:10px;border:1.5px solid var(--cb);padding:10px 12px;
  background:var(--bg2);transition:all .2s;position:relative;
}
.rv-task:hover{border-color:var(--br2);background:var(--as)}
.rv-task.resolved{
  opacity:.48;border-color:rgba(22,163,74,.2);
  background:rgba(22,163,74,.03);
}
.rv-task.resolved:hover{opacity:.72}
.rv-task.hidden{display:none}
.rv-task-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.rv-task-pin{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;margin-top:1px;
}
.rv-task-pin.pending{background:#6366f1}
.rv-task-pin.resolved{background:#16a34a}
.rv-task-meta{flex:1;min-width:0}
.rv-task-author{font-size:11px;font-weight:600;color:var(--tx)}
.rv-task-ts{font-size:9px;color:var(--dm);margin-top:1px}
.rv-task-text{font-size:12px;color:var(--tx);line-height:1.55;margin-bottom:8px}
.rv-task-foot{display:flex;align-items:center;gap:6px}

/* Type badge */
.rv-type-badge{
  font-size:9px;font-weight:700;padding:1px 7px;border-radius:5px;
  letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;
}
.rv-type-badge.change-req{background:rgba(217,119,6,.1);color:#92400e}
.rv-type-badge.approved{background:rgba(22,163,74,.1);color:#15803d}
.rv-type-badge.info{background:var(--as);color:var(--mu)}

/* Resolved badge */
.rv-resolved-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:600;color:#15803d;
  background:rgba(22,163,74,.1);padding:1px 7px;border-radius:5px;
}

/* Resolve / undo button */
.rv-resolve-btn{
  margin-left:auto;display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;
  border:1.5px solid var(--cb);background:transparent;cursor:pointer;
  font-family:'DM Sans',inherit;color:var(--mu);transition:all .17s;white-space:nowrap;
}
.rv-resolve-btn:hover{border-color:var(--gn);color:var(--gn);background:rgba(22,163,74,.05)}
.rv-task.resolved .rv-resolve-btn{
  border-color:var(--cb);color:var(--dm);
}
.rv-task.resolved .rv-resolve-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}

/* Progress bar under header */
.rv-progress-bar{
  height:3px;background:var(--lav2);flex-shrink:0;
}
.rv-progress-fill{height:100%;background:linear-gradient(90deg,var(--gn),#4ade80);transition:width .5s cubic-bezier(.22,.68,0,1.15)}

/* Phase selector tabs */
.rv-phase-tabs{
  display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--cb);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
.rv-phase-tab{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
  border:1.5px solid var(--cb);background:transparent;cursor:pointer;
  font-family:'DM Sans',inherit;color:var(--mu);transition:all .18s;white-space:nowrap;
}
.rv-phase-tab.act{background:var(--a);border-color:var(--a);color:#fff}
.rv-phase-tab:not(.act):hover{border-color:var(--br2);color:var(--tx)}

/* Empty state */
.rv-empty{
  padding:28px 16px;text-align:center;
  font-size:12px;color:var(--dm);
}

/* ══ DOCUMENT TEMPLATE / CHECKLIST ══ */

/* Group section */
.dt-group{margin-bottom:22px}
.dt-group-head{
  display:flex;align-items:center;gap:10px;
  padding:0 0 10px;border-bottom:2px solid var(--cb);
  margin-bottom:10px;
}
.dt-group-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dm);
}
.dt-group-stats{
  display:flex;align-items:center;gap:6px;margin-left:auto;
  font-size:10px;color:var(--dm);
}
.dt-stat-filled{
  font-weight:700;color:var(--gn);
  background:rgba(22,163,74,.08);padding:1px 7px;border-radius:8px;
}
.dt-stat-empty{
  font-weight:700;color:var(--am);
  background:rgba(217,119,6,.07);padding:1px 7px;border-radius:8px;
}

/* Filled slot — reuses .doc-row + adds check mark */
.doc-row.filled{border-left:3px solid var(--gn)}
.doc-row.filled .doc-slot-check{
  width:18px;height:18px;border-radius:50%;
  background:rgba(22,163,74,.12);color:var(--gn);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* Empty slot */
.doc-slot-empty{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;border-radius:12px;
  border:1.5px dashed var(--br);
  background:transparent;
  transition:all .2s;margin-bottom:6px;
}
.doc-slot-empty:hover{border-color:var(--br2);background:var(--as)}
.doc-slot-ico-wrap{
  width:38px;height:38px;border-radius:9px;
  background:var(--lav2);border:1px dashed var(--br);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.doc-slot-label{
  font-size:13px;font-weight:500;color:var(--dm);flex:1;min-width:0;
}
.doc-slot-hint{font-size:10px;color:var(--dm);margin-top:2px}
.doc-slot-upload-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;
  border:1.5px solid var(--cb);background:var(--bg2);
  font-size:11px;font-weight:600;color:var(--mu);
  cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.doc-slot-upload-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}

/* Free upload zone (Outros group) */
.dt-free-zone{
  border:2px dashed var(--br);border-radius:12px;
  padding:22px;text-align:center;transition:all .2s;cursor:pointer;
}
.dt-free-zone:hover{border-color:var(--a);background:var(--as)}

/* Overall checklist progress bar */
.dt-progress-wrap{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;background:var(--bg2);border:1px solid var(--cb);
  border-radius:12px;margin-bottom:20px;
}
.dt-progress-bar-bg{flex:1;height:6px;background:var(--lav2);border-radius:3px;overflow:hidden}
.dt-progress-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gn),#4ade80);transition:width .6s cubic-bezier(.22,.68,0,1.15)}
.dt-progress-label{font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap}
.dt-progress-sub{font-size:10px;color:var(--dm);white-space:nowrap}

/* ══ FINANCE — Phase Cards with Receipt ══ */

/* Phase card outer wrapper */
.ph-card{
  background:var(--bg2);border:1px solid var(--cb);border-radius:13px;
  overflow:hidden;margin-bottom:10px;transition:all .2s;
}
.ph-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ph-card.paid{border-left:3px solid var(--gn)}
.ph-card.pending{border-left:3px solid var(--am)}

/* Main row: info + status + actions */
.ph-card-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;flex-wrap:wrap;
}
.ph-card-info{flex:1;min-width:0}
.ph-card-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px}
.ph-card-sub{font-size:11px;color:var(--mu)}

/* Status + due date column */
.ph-card-status-col{
  display:flex;flex-direction:column;align-items:flex-end;
  gap:4px;flex-shrink:0;min-width:90px;
}
.ph-status-badge{
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.ph-status-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ph-status-badge.paid{background:#dcfce7;color:#15803d}
.ph-status-badge.paid::before{background:#16a34a}
.ph-status-badge.pending{background:#fef9c3;color:#92400e}
.ph-status-badge.pending::before{background:#d97706;animation:pulse 2s infinite}
.ph-status-badge.review{background:rgba(37,99,235,.1);color:#1d4ed8}
.ph-status-badge.review::before{background:#2563eb}
.ph-due{font-size:10px;color:var(--dm)}

/* Actions column */
.ph-card-actions{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}

/* Attach receipt — ghost pill button (pending state) */
.ph-attach-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:8px;
  border:1.5px dashed var(--br);background:transparent;
  font-size:11px;font-weight:600;color:var(--mu);
  cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:'DM Sans',inherit;
}
.ph-attach-btn:hover{
  border-color:var(--a);color:var(--a);
  background:rgba(99,102,241,.06);border-style:solid;
}

/* Receipt row (when file exists) */
.ph-receipt-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;background:rgba(22,163,74,.04);
  border-top:1px solid rgba(22,163,74,.12);
}
.ph-receipt-ico{
  width:30px;height:30px;border-radius:8px;
  background:rgba(22,163,74,.1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ph-receipt-meta{flex:1;min-width:0}
.ph-receipt-name{font-size:12px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-receipt-info{font-size:10px;color:var(--dm);margin-top:2px;display:flex;align-items:center;gap:8px}

/* Admin review area */
.ph-admin-review{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;background:rgba(37,99,235,.05);
  border-top:1px solid rgba(37,99,235,.12);
}

/* ══ PROJECT DETAILS VIEW — SaaS premium grid ══ */

/* Main two-column grid */
.pdv-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  align-items:start;
}
@media(max-width:760px){.pdv-grid{grid-template-columns:1fr}}

/* Full-width slot */
.pdv-full{grid-column:1 / -1}

/* Base card — matte premium */
.pdv-card{
  background:var(--bg2);
  border:1px solid var(--cb);
  border-radius:16px;
  overflow:hidden;
  transition:box-shadow .2s;
}
.pdv-card:hover{box-shadow:0 2px 16px rgba(0,0,0,.06)}

/* Card header */
.pdv-card-head{
  display:flex;align-items:center;gap:9px;
  padding:13px 18px;
  border-bottom:1px solid var(--cb);
}
.pdv-card-head-ico{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pdv-card-title{
  font-size:12px;font-weight:700;color:var(--tx);
  letter-spacing:.02em;flex:1;
}
.pdv-card-badge{
  font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;padding:2px 8px;border-radius:20px;
}

/* Read-only field row */
.pdv-field{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:10px 18px;
  border-bottom:1px solid var(--cb);transition:background .15s;
}
.pdv-field:last-child{border-bottom:none}
.pdv-field:hover{background:var(--as)}
.pdv-label{
  font-size:11px;color:var(--dm);
  font-weight:500;flex-shrink:0;min-width:100px;
}
.pdv-value{
  font-size:12px;color:var(--tx);font-weight:500;
  text-align:right;min-width:0;
}
.pdv-value.muted{color:var(--mu)}

/* Stage value — pill */
.pdv-stage-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:20px;
}

/* Avatar chip (for people) */
.pdv-person{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12px;color:var(--tx);font-weight:500;
}
.pdv-person-av{
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--a),#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#fff;flex-shrink:0;
}

/* ── SERVICE SCOPE TAGS ── */
.scope-body{padding:16px 18px}
.scope-group{margin-bottom:18px}
.scope-group:last-child{margin-bottom:0}
.scope-group-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dm);
  margin-bottom:9px;display:block;
}
.scope-tags{display:flex;flex-wrap:wrap;gap:7px}

/* Tag base */
.scope-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:600;
  cursor:pointer;transition:all .18s;
  border:1.5px solid transparent;
  user-select:none;font-family:'DM Sans',inherit;
  white-space:nowrap;
}
/* OFF state — matte neutral */
.scope-tag.off{
  background:var(--lav2);
  border-color:var(--cb);
  color:var(--mu);
}
.scope-tag.off:hover{
  background:var(--as);
  border-color:var(--br2);
  color:var(--tx);
}
/* ON state — indigo solid (matte, no gradient) */
.scope-tag.on{
  background:#6366f1;
  border-color:#6366f1;
  color:#fff;
  box-shadow:0 1px 6px rgba(99,102,241,.3);
}
.scope-tag.on:hover{
  background:#4f46e5;
  border-color:#4f46e5;
}
/* Tag check dot */
.scope-tag.on::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.7);flex-shrink:0;
}

/* Tag count summary */
.scope-summary{
  font-size:10px;color:var(--dm);padding:0 18px 12px;
  display:flex;align-items:center;gap:6px;
}
.scope-count-active{
  font-weight:700;color:var(--a);
  background:var(--as);padding:1px 7px;border-radius:8px;
}

/* ══ PROJECT LIST VIEW ══ */

/* Filter pill bar */
.pf-bar{
  display:flex;align-items:center;gap:6px;
  padding:4px;background:var(--lav2);
  border-radius:12px;border:1px solid var(--cb);
  flex-wrap:wrap;
}
.pf-pill{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  border:none;background:transparent;cursor:pointer;
  color:var(--mu);transition:all .18s;font-family:'DM Sans',inherit;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.pf-pill:hover{background:var(--bg2);color:var(--tx)}
.pf-pill.act{
  background:var(--bg2);color:var(--tx);
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.pf-pill-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.pf-pill-count{
  font-size:10px;font-weight:700;padding:1px 6px;
  border-radius:8px;background:var(--as);color:var(--dm);
}
.pf-pill.act .pf-pill-count{
  background:var(--a);color:#fff;
}

/* Project list table */
.proj-table{width:100%;border-collapse:collapse;font-size:13px}
.proj-table thead th{
  text-align:left;padding:10px 16px;
  font-size:10px;font-weight:700;color:var(--dm);
  text-transform:uppercase;letter-spacing:.08em;
  border-bottom:2px solid var(--cb);white-space:nowrap;
}
.proj-table tbody tr{
  border-bottom:1px solid var(--cb);
  cursor:pointer;transition:background .15s;
}
.proj-table tbody tr:last-child{border-bottom:none}
.proj-table tbody tr:hover td{background:var(--as)}
.proj-table td{padding:13px 16px;vertical-align:middle}

/* Project code + address cell */
.ptbl-code{
  font-family:monospace;font-size:10px;color:var(--a);
  font-weight:700;margin-bottom:3px;
}
.ptbl-addr{font-size:13px;font-weight:600;color:var(--tx)}
.ptbl-city{font-size:11px;color:var(--mu);margin-top:1px}

/* Progress mini-bar */
.ptbl-prog-wrap{
  display:flex;align-items:center;gap:8px;min-width:100px;
}
.ptbl-prog-bg{
  flex:1;height:5px;background:var(--lav2);
  border-radius:3px;overflow:hidden;
}
.ptbl-prog-fill{height:100%;border-radius:3px}
.ptbl-prog-pct{
  font-size:11px;font-weight:600;color:var(--mu);
  flex-shrink:0;min-width:28px;text-align:right;
}

/* Semantic status badges — strong color coding */
.st-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:700;white-space:nowrap;
  letter-spacing:.02em;
}
.st-badge-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
/* Em Andamento — indigo */
.st-badge.on_track{
  background:rgba(99,102,241,.1);
  color:#4338ca;
}
.st-badge.on_track .st-badge-dot{
  background:#6366f1;
  animation:pulse 2s infinite;
}
/* Aguardando Cliente — amber */
.st-badge.waiting{
  background:rgba(217,119,6,.1);
  color:#92400e;
}
.st-badge.waiting .st-badge-dot{background:#d97706}
/* Atenção / Atrasado — red (max urgency) */
.st-badge.attention{
  background:rgba(220,38,38,.1);
  color:#991b1b;
}
.st-badge.attention .st-badge-dot{
  background:#dc2626;
  animation:pulse 1.5s infinite;
}
/* Concluído — emerald */
.st-badge.completed{
  background:rgba(16,185,129,.1);
  color:#065f46;
}
.st-badge.completed .st-badge-dot{background:#10b981}

/* Pending tag inside row */
.ptbl-pending-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:600;padding:2px 7px;
  border-radius:5px;margin-top:4px;
  background:rgba(217,119,6,.1);color:#92400e;
}

/* Due date pill */
.ptbl-due{
  font-size:11px;color:var(--mu);white-space:nowrap;
}
.ptbl-due.overdue{color:#dc2626;font-weight:600}

/* Empty state */
.proj-list-empty{
  text-align:center;padding:56px 24px;color:var(--dm);
}
.proj-list-empty svg{margin-bottom:12px;opacity:.4}

/* ══ ORÇAMENTO TAB (cliente) ══ */

/* Budget hero card */
.orc-hero{
  background:linear-gradient(135deg,#6366f1 0%,#4f46e5 60%,#4338ca 100%);
  border-radius:16px;padding:24px 28px;color:#fff;
  position:relative;overflow:hidden;margin-bottom:14px;
}
.orc-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.orc-hero::after{
  content:'';position:absolute;bottom:-30px;left:-20px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.orc-hero-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.6);
  margin-bottom:6px;position:relative;
}
.orc-hero-total{
  font-family:'Instrument Serif',serif;font-size:42px;
  font-weight:400;color:#fff;line-height:1;
  position:relative;margin-bottom:20px;
}
.orc-hero-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:rgba(255,255,255,.15);
  border-radius:10px;overflow:hidden;position:relative;
}
.orc-hero-cell{
  background:rgba(255,255,255,.08);padding:12px 14px;
}
.orc-hero-cell-label{
  font-size:9px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:4px;
}
.orc-hero-cell-val{
  font-size:15px;font-weight:600;color:#fff;
}

/* Phase timeline */
.orc-phases{display:flex;flex-direction:column;gap:0}
.orc-phase{
  display:flex;align-items:stretch;gap:0;
}
/* Left: connector line + dot */
.orc-phase-line{
  display:flex;flex-direction:column;align-items:center;
  width:32px;flex-shrink:0;padding-top:2px;
}
.orc-phase-dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid var(--bg2);
  flex-shrink:0;z-index:1;
}
.orc-phase-dot.paid{background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.orc-phase-dot.current{
  background:#6366f1;
  box-shadow:0 0 0 4px rgba(99,102,241,.18);
  animation:pulse 2s infinite;
}
.orc-phase-dot.pending{background:var(--cb);border-color:var(--br)}
.orc-phase-connector{
  width:2px;flex:1;margin:4px 0;
  background:var(--cb);min-height:24px;
}
.orc-phase-connector.paid{background:rgba(16,185,129,.3)}
/* Right: card */
.orc-phase-card{
  flex:1;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--cb);border-radius:12px;
  overflow:hidden;transition:all .2s;
}
.orc-phase-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
.orc-phase-card.paid{border-color:rgba(16,185,129,.25)}
.orc-phase-card.current{border-color:rgba(99,102,241,.4)}
.orc-phase-card-head{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;
}
.orc-phase-num{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.orc-phase-num.paid{background:rgba(16,185,129,.12);color:#059669}
.orc-phase-num.current{background:rgba(99,102,241,.12);color:#6366f1}
.orc-phase-num.pending{background:var(--lav2);color:var(--dm)}
.orc-phase-title{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.orc-phase-pct{font-size:11px;color:var(--mu)}

/* Phase amounts row */
.orc-phase-amounts{
  display:flex;gap:0;border-top:1px solid var(--cb);
}
.orc-amount-cell{
  flex:1;padding:10px 16px;
  border-right:1px solid var(--cb);
}
.orc-amount-cell:last-child{border-right:none}
.orc-amount-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dm);margin-bottom:4px}
.orc-amount-val{font-size:14px;font-weight:600}

/* Receipt / action row */
.orc-receipt-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-top:1px solid var(--cb);
  background:rgba(16,185,129,.04);
}
.orc-upload-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-top:1px solid var(--cb);
}

/* Invoice mini-table */
.orc-inv-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid var(--cb);
  transition:background .15s;
}
.orc-inv-row:last-child{border-bottom:none}
.orc-inv-row:hover{background:var(--as)}

/* ══ UNIT ECONOMICS — Recent Payments ══ */

/* Payment method badge — matte pill */
.pm-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.03em;
  white-space:nowrap;
}
.pm-badge-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
}

/* Stripe — indigo/violet matte */
.pm-badge.stripe{
  background:rgba(99,102,241,.13);
  color:#4338ca;
  border:1px solid rgba(99,102,241,.2);
}
[data-theme=dark] .pm-badge.stripe{
  background:rgba(99,102,241,.18);color:#a5b4fc;
}
.pm-badge.stripe .pm-badge-dot{background:#6366f1}

/* PIX — teal matte */
.pm-badge.pix{
  background:rgba(20,184,166,.1);
  color:#0f766e;
  border:1px solid rgba(20,184,166,.2);
}
[data-theme=dark] .pm-badge.pix{
  background:rgba(20,184,166,.15);color:#5eead4;
}
.pm-badge.pix .pm-badge-dot{background:#14b8a6}

/* ACH Transfer — slate matte */
.pm-badge.ach{
  background:rgba(100,116,139,.1);
  color:#334155;
  border:1px solid rgba(100,116,139,.18);
}
[data-theme=dark] .pm-badge.ach{
  background:rgba(100,116,139,.18);color:#94a3b8;
}
.pm-badge.ach .pm-badge-dot{background:#64748b}

/* Gross / Fee / Net amount cells */
.ec-gross{
  font-size:12px;font-weight:500;color:var(--tx);
}
.ec-fee{
  font-size:12px;font-weight:500;color:var(--rd);
}
.ec-fee.zero{color:var(--dm)}
.ec-net{
  font-size:13px;font-weight:700;color:var(--tx);
}
.ec-fee-rate{
  font-size:9px;color:var(--dm);margin-top:2px;
  font-style:italic;
}

/* Unit economics KPI row (summary under table) */
.ec-summary{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--cb);border-top:2px solid var(--cb);
}
.ec-summary-cell{
  background:var(--bg2);padding:12px 16px;
}
.ec-summary-label{
  font-size:9px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dm);margin-bottom:4px;
}
.ec-summary-val{
  font-size:15px;font-weight:700;
}

/* Net amount column highlight */
.fin-table td.net-col{
  background:rgba(22,163,74,.03);
}
.fin-table tr:hover td.net-col{
  background:rgba(22,163,74,.07);
}

/* ══ INTERNAL NOTES TAB ══ */

/* Deadlines grid */
.iln-deadline-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:18px;
}
@media(max-width:800px){.iln-deadline-grid{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.iln-deadline-grid{grid-template-columns:1fr}}

.iln-deadline-field{display:flex;flex-direction:column;gap:5px}
.iln-deadline-label{
  font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dm);
}
.iln-date-inp{
  width:100%;padding:8px 10px;
  border:1.5px solid var(--cb);border-radius:8px;
  background:var(--lav2);
  color:var(--tx);font-size:12px;font-weight:500;
  font-family:'DM Sans',inherit;outline:none;
  transition:border-color .18s, background .18s;
  cursor:pointer;
}
.iln-date-inp:hover{border-color:var(--br2);background:var(--as)}
.iln-date-inp:focus{border-color:var(--a);background:var(--bg2)}
/* status dot next to label */
.iln-deadline-status{
  width:6px;height:6px;border-radius:50%;
  display:inline-block;margin-right:5px;
  vertical-align:middle;flex-shrink:0;
}

/* Activity log */
.iln-log-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--cb);
}
.iln-add-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:8px;
  border:1.5px solid var(--a);background:transparent;
  font-size:11px;font-weight:600;color:var(--a);
  cursor:pointer;transition:all .18s;font-family:'DM Sans',inherit;
}
.iln-add-btn:hover{background:var(--as)}

/* Log rows */
.iln-log-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--cb);
  background:var(--bg2);transition:background .15s;
}
.iln-log-row:last-child{border-bottom:none}
.iln-log-row:hover{background:var(--as)}

.iln-log-date{
  flex-shrink:0;width:120px;
  padding:7px 9px;border:1.5px solid var(--cb);border-radius:7px;
  background:var(--lav2);color:var(--tx);
  font-size:11px;font-family:'DM Sans',inherit;
  outline:none;transition:border-color .18s;
}
.iln-log-date:focus{border-color:var(--a)}

.iln-log-text{
  flex:1;min-width:0;
  padding:7px 10px;border:1.5px solid var(--cb);border-radius:7px;
  background:var(--lav2);color:var(--tx);
  font-size:12px;font-family:'DM Sans',inherit;
  outline:none;resize:none;height:36px;
  transition:border-color .18s,height .2s;
  overflow:hidden;
}
.iln-log-text:focus{border-color:var(--a);height:64px;background:var(--bg2)}

/* Visibility select */
.iln-vis-select{
  flex-shrink:0;padding:6px 8px;
  border:1.5px solid var(--cb);border-radius:7px;
  background:var(--lav2);color:var(--tx);
  font-size:11px;font-weight:600;
  font-family:'DM Sans',inherit;outline:none;cursor:pointer;
  transition:border-color .18s;min-width:110px;
}
.iln-vis-select:focus{border-color:var(--a)}
.iln-vis-select.private{
  color:#7c3aed;background:rgba(124,58,237,.07);
  border-color:rgba(124,58,237,.2);
}
.iln-vis-select.public{
  color:#0f766e;background:rgba(20,184,166,.07);
  border-color:rgba(20,184,166,.2);
}

/* Visibility badge (read-only rows) */
.iln-vis-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;
  flex-shrink:0;white-space:nowrap;
}
.iln-vis-badge.private{background:rgba(124,58,237,.1);color:#7c3aed}
.iln-vis-badge.public{background:rgba(20,184,166,.1);color:#0f766e}

/* Delete button */
.iln-del-btn{
  flex-shrink:0;width:30px;height:30px;border-radius:7px;
  border:1.5px solid transparent;background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--dm);transition:all .17s;
}
.iln-del-btn:hover{
  border-color:rgba(220,38,38,.3);
  background:rgba(220,38,38,.06);color:#dc2626;
}

/* Save bar */
.iln-save-bar{
  display:flex;justify-content:flex-end;gap:8px;
  padding:12px 18px;border-top:1px solid var(--cb);
  background:var(--lav2);
}

/* Empty state */
.iln-empty{
  padding:40px 18px;text-align:center;color:var(--dm);
}

/* ══ GLOBAL INVOICES VIEW ══ */

/* Alert KPI cards */
.giv-alert-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;
}
@media(max-width:640px){.giv-alert-grid{grid-template-columns:1fr}}
.giv-alert{
  border-radius:14px;padding:18px 20px;border:1px solid transparent;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;
}
.giv-alert:hover{transform:translateY(-2px)}
.giv-alert.overdue{
  background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.18);
}
.giv-alert.pending{
  background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.18);
}
.giv-alert.draft{
  background:rgba(100,116,139,.06);border-color:rgba(100,116,139,.18);
}
.giv-alert-ico{
  width:40px;height:40px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.giv-alert.overdue .giv-alert-ico{background:rgba(220,38,38,.12)}
.giv-alert.pending .giv-alert-ico{background:rgba(217,119,6,.12)}
.giv-alert.draft   .giv-alert-ico{background:rgba(100,116,139,.12)}
.giv-alert-count{
  font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;line-height:1;
}
.giv-alert.overdue .giv-alert-count{color:#dc2626}
.giv-alert.pending .giv-alert-count{color:#d97706}
.giv-alert.draft   .giv-alert-count{color:#64748b}
.giv-alert-label{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:2px}
.giv-alert-sub{font-size:10px;color:var(--dm)}

/* Status badges */
.giv-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;white-space:nowrap;
}
.giv-badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.giv-badge.paid    {background:#dcfce7;color:#15803d}
.giv-badge.paid    .giv-badge-dot{background:#16a34a}
.giv-badge.pending {background:#fef9c3;color:#92400e}
.giv-badge.pending .giv-badge-dot{background:#d97706;animation:pulse 2s infinite}
.giv-badge.overdue {background:#fee2e2;color:#991b1b}
.giv-badge.overdue .giv-badge-dot{background:#dc2626;animation:pulse 1.5s infinite}
.giv-badge.draft   {background:#f1f5f9;color:#475569}
.giv-badge.draft   .giv-badge-dot{background:#94a3b8}

/* Master table */
.giv-table{width:100%;border-collapse:collapse;font-size:12px}
.giv-table thead th{
  text-align:left;padding:10px 16px;
  font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--dm);border-bottom:2px solid var(--cb);white-space:nowrap;
}
.giv-table tbody tr{
  border-bottom:1px solid var(--cb);cursor:pointer;
  transition:background .14s;
}
.giv-table tbody tr:last-child{border-bottom:none}
.giv-table tbody tr:hover td{background:var(--as)}
.giv-table tbody tr.expanded td{background:var(--as)}
.giv-table td{padding:13px 16px;vertical-align:middle}

/* Action icon buttons */
.giv-action-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--cb);background:transparent;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .16s;color:var(--mu);
}
.giv-action-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}
.giv-action-btn.send:hover{border-color:#6366f1;color:#6366f1;background:rgba(99,102,241,.06)}
.giv-action-btn.pdf:hover{border-color:#16a34a;color:#16a34a;background:rgba(22,163,74,.06)}
.giv-action-btn.edit:hover{border-color:#d97706;color:#d97706;background:rgba(217,119,6,.06)}

/* ── Expandable Unit Economics panel ── */
.giv-expand-row{
  border-bottom:1px solid var(--cb);
  background:var(--lav);
}
.giv-expand-inner{padding:0 16px 16px}
.giv-ue-head{
  display:flex;align-items:center;gap:8px;
  padding:12px 0 10px;border-bottom:1px solid var(--cb);margin-bottom:12px;
}
.giv-ue-title{
  font-size:11px;font-weight:700;color:var(--a);
  letter-spacing:.06em;text-transform:uppercase;
}
.giv-ue-admin-badge{
  font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;
  background:rgba(220,38,38,.1);color:#991b1b;letter-spacing:.05em;
}
.giv-ue-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
}
@media(max-width:700px){.giv-ue-grid{grid-template-columns:repeat(3,1fr)}}
.giv-ue-cell{
  background:var(--bg2);border:1px solid var(--cb);
  border-radius:10px;padding:12px 14px;
}
.giv-ue-cell.net{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.05)}
.giv-ue-cell.fee{border-color:rgba(220,38,38,.2);background:rgba(220,38,38,.04)}
.giv-ue-cell.rep{border-color:rgba(217,119,6,.2);background:rgba(217,119,6,.04)}
.giv-ue-label{
  font-size:9px;font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--dm);margin-bottom:6px;
}
.giv-ue-val{font-size:15px;font-weight:700;color:var(--tx)}
.giv-ue-cell.net .giv-ue-val{color:#059669}
.giv-ue-cell.fee .giv-ue-val{color:#dc2626}
.giv-ue-cell.rep .giv-ue-val{color:#d97706}
.giv-ue-sub{font-size:9px;color:var(--dm);margin-top:3px}

/* Currency pill */
.giv-currency{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  background:var(--lav2);border:1px solid var(--cb);color:var(--mu);
}

/* Filter chip row */
.giv-filter-row{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.giv-filter-chip{
  padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;
  border:1.5px solid var(--cb);background:transparent;
  color:var(--mu);cursor:pointer;transition:all .17s;font-family:'DM Sans',inherit;
}
.giv-filter-chip:hover{border-color:var(--br2);color:var(--tx)}
.giv-filter-chip.act{
  background:var(--a);border-color:var(--a);color:#fff;
}

/* ══ CLIENT ACCESS MANAGER ══ */

/* Access status badges */
.acc-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.02em;
}
.acc-badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.acc-badge.active  {background:#dcfce7;color:#15803d}
.acc-badge.active  .acc-badge-dot{background:#16a34a;animation:pulse 2.5s infinite}
.acc-badge.pending {background:#fef9c3;color:#92400e}
.acc-badge.pending .acc-badge-dot{background:#d97706}
.acc-badge.blocked {background:#fee2e2;color:#991b1b}
.acc-badge.blocked .acc-badge-dot{background:#dc2626}
.acc-badge.invited {background:rgba(99,102,241,.1);color:#4338ca}
.acc-badge.invited .acc-badge-dot{background:#6366f1;animation:pulse 2s infinite}
[data-theme=dark] .acc-badge.active{background:rgba(22,163,74,.15);color:#4ade80}
[data-theme=dark] .acc-badge.pending{background:rgba(217,119,6,.15);color:#fbbf24}
[data-theme=dark] .acc-badge.blocked{background:rgba(220,38,38,.15);color:#f87171}
[data-theme=dark] .acc-badge.invited{background:rgba(99,102,241,.18);color:#a5b4fc}

/* User table */
.acc-table{width:100%;border-collapse:collapse;font-size:12px}
.acc-table thead th{
  text-align:left;padding:10px 18px;
  font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--dm);border-bottom:2px solid var(--cb);white-space:nowrap;
}
.acc-table tbody tr{border-bottom:1px solid var(--cb);transition:background .14s}
