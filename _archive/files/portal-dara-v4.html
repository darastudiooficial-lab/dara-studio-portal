  const extraCard = isAdmin?
    '<div class="rm-add-card" data-a="road-add-extra" data-pid="'+pid+'">'+
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--am)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>'+
      '<div style="text-align:center">'+
        '<p style="font-size:12px;font-weight:600;color:var(--am)">Adicionar Revisão Extra</p>'+
        '<p style="font-size:10px;color:var(--mu)">REV04+ · Gera fatura automática</p>'+
        (hasExtra?'<p style="font-size:9px;color:var(--am);margin-top:4px">⚠ Já existem revisões extras neste projeto</p>':'')+
      '</div>'+
    '</div>' : '';

  /* ══ MAIN RENDER ══ */
  const statusLabel = activeNode
    ? '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:#16a34a;display:inline-block"></span> On Track</span>'
    : (nodes.every(n=>n.status==='completed')
        ? '<span style="color:var(--gn);font-weight:600">Concluído</span>'
        : '<span style="color:var(--dm)">Não iniciado</span>');

  return (
    '<div class="page-anim">'+

    /* ── Top progress bar ── */
    '<div class="card fa1" style="margin-bottom:16px;padding:16px 20px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
        '<div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--tx)">'+statusLabel+' Timeline Progress</div>'+
        '<span style="font-size:14px;font-weight:700;color:var(--tx)">'+pct+'%</span>'+
      '</div>'+
      '<div class="rm-progress-bar-wrap">'+
        '<div class="rm-progress-bar" style="width:'+pct+'%"></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dm);margin-top:4px">'+
        '<span>'+doneSteps+' de '+allSteps.length+' sub-etapas concluídas</span>'+
        (hasExtra?'<span style="color:var(--am)">'+nodes.filter(n=>n.isBillable).length+' revisão(ões) extra</span>':'')+
      '</div>'+
    '</div>'+

    /* ── Grid de cards ── */
    '<div class="rm-grid">'+
      nodes.map(function(n,i){ return renderCard(n,i); }).join('')+
      extraCard+
    '</div>'+

    '</div>'
  );
}

    if(proofSt==='approved'){

    out += '</div>'; /* end orc-phase-card */
    out += '</div>'; /* end orc-phase */

  out += '</div>'; /* end orc-phases */

  if(invList.length){
    out += divider('FATURAS EMITIDAS');
    out += '<div class="card fa4" style="padding:0;overflow:hidden;margin-bottom:14px">';
    invList.forEach(function(inv){

      out += '<div style="flex:1;padding:0 12px">';
      out += '<p style="font-size:12px;font-weight:600;color:var(--tx)">'+fmt(inv.amount)+'</p>';
      out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">Entrada: '+fmt(inv.entry||0)+' ('+( inv.entryPct||'—')+'%) · Venc: '+inv.due+'</p>';
      out += '</div>';
      /* Paid / balance */
      out += '<div style="text-align:right;flex-shrink:0;margin-right:12px">';
      out += '<p style="font-size:11px;font-weight:600;color:'+(isPaidInv?'var(--gn)':'var(--am)')+'">'+fmt(inv.paid||0)+' pago</p>';
      if(!isPaidInv) out += '<p style="font-size:10px;color:var(--rd);margin-top:1px">Saldo: '+fmt(inv.amount-(inv.paid||0))+'</p>';
      out += '</div>';
      /* Badge */
      out += '<span class="st-badge '+(isPaidInv?'completed':'waiting')+'"><span class="st-badge-dot"></span>'+(isPaidInv?'Pago':'Pendente')+'</span>';
      /* Download */
      out += '<button class="doc-btn dl" data-tip="Baixar PDF" data-a="dfile-dl" data-pid="'+pid+'" data-fid="'+inv.id+'" style="margin-left:8px">'+dlIco+'</button>';
      out += '</div>';
    });
    out += '</div>';
  }

  /* ══ 5. INFO NOTE ══ */
  out += '<div class="card fa5" style="padding:16px 20px;background:var(--lav);border-color:rgba(99,102,241,.2)">';
  out += '<div style="display:flex;gap:10px;align-items:flex-start">';
  out += infoIco;
  out += '<div>';
  out += '<p style="font-size:12px;font-weight:600;color:var(--a);margin-bottom:4px">Como funciona o pagamento</p>';
  out += '<p style="font-size:11px;color:var(--mu);line-height:1.6">Cada fase é dividida em entrada e saldo. Após o pagamento, anexe o comprovante aqui para que a DARA Studio confirme e avance seu projeto. Dúvidas? Use a aba <strong>Tickets / Chat</strong>.</p>';
  out += '</div></div></div>';

  out += '</div>';
  return out;
}

  var dlIco  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  var pdfIco = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8"/></svg>';

  var out = '<div class="page-anim">';

  /* ── Hero card ── */
  out += '<div class="orc-hero fa1">';
  out += '<p class="orc-hero-label">Orçamento Total do Projeto</p>';
  out += '<p class="orc-hero-total">'+fmt(total)+'</p>';
  out += '<div class="orc-hero-grid">';
  out += '<div class="orc-hero-cell"><p class="orc-hero-cell-label">Pago</p><p class="orc-hero-cell-val" style="color:#86efac">'+fmt(paidAmt)+'</p></div>';
  out += '<div class="orc-hero-cell"><p class="orc-hero-cell-label">Saldo</p><p class="orc-hero-cell-val" style="color:#fbbf24">'+fmt(balance)+'</p></div>';
  out += '<div class="orc-hero-cell"><p class="orc-hero-cell-label">Progresso</p>';
  out += '<p class="orc-hero-cell-val">'+pct+'%</p>';
  out += '<div style="margin-top:6px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden">';
  out += '<div style="height:100%;width:'+pct+'%;background:#fff;border-radius:2px;transition:width .8s"></div></div>';
  out += '</div></div></div>';

  /* ── Phase breakdown heading ── */
  out += '<div class="sec-header fa2" style="margin-bottom:12px">';
  out += '<div><h2 style="font-family:\'Instrument Serif\',serif;font-size:16px;font-weight:400;color:var(--tx)">Fases de Pagamento</h2>';
  out += '<p style="font-size:11px;color:var(--mu);margin-top:2px">Acompanhe cada parcela e anexe os comprovantes</p></div>';
  out += '</div>';

  /* ── Phase timeline ── */
  out += '<div class="orc-phases">';
  phases.forEach(function(ph, i){
    var receipt = S.projReceipts&&S.projReceipts[pid+'_'+ph.id] || ph.receiptFile;
    var isPaid  = ph.isPaid || !!receipt;
    var isCurrent = !isPaid && i===phases.findIndex(function(x){return !x.isPaid&&!S.projReceipts[pid+'_'+x.id]&&!x.receiptFile;});
    var phClass = isPaid?'paid':isCurrent?'current':'pending';
    var dotClass= isPaid?'paid':isCurrent?'current':'pending';

    out += '<div class="orc-phase">';

    /* Connector column */
    out += '<div class="orc-phase-line">';
    out += '<div class="orc-phase-dot '+dotClass+'"></div>';
    if(i<phases.length-1){
      out += '<div class="orc-phase-connector'+(isPaid?' paid':'')+'"></div>';
    }
    out += '</div>';

    /* Card */
    out += '<div class="orc-phase-card '+phClass+'">';

    /* Head */
    out += '<div class="orc-phase-card-head">';
    out += '<div class="orc-phase-num '+phClass+'">'+(i+1)+'</div>';
    out += '<div style="flex:1"><p class="orc-phase-title">'+ph.l+'</p>';
    if(ph.due) out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">Vencimento: '+ph.due+'</p>';
    out += '</div>';
    /* Status badge */
    if(isPaid){
      out += '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(16,185,129,.1);color:#059669">'+chkIco+' Pago</span>';
    } else if(isCurrent){
      out += '<span style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(99,102,241,.1);color:#6366f1"><span style="width:5px;height:5px;border-radius:50%;background:#6366f1;animation:pulse 2s infinite"></span>Aguardando</span>';
    } else {
      out += '<span style="font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--lav2);color:var(--dm)">Futuro</span>';
    }
    out += '</div>'; /* end head */

    /* Amounts */
    var entry = ph.entry||Math.round(ph.amt*0.5);
    var entryPct = ph.entryPct||50;
    out += '<div class="orc-phase-amounts">';
    out += '<div class="orc-amount-cell">';
    out += '<p class="orc-amount-lbl">Valor Total</p>';
    out += '<p class="orc-amount-val" style="color:var(--tx)">'+fmt(ph.amt)+'</p>';
    out += '<p style="font-size:10px;color:var(--dm);margin-top:2px">'+ph.pct+'% do contrato</p>';
    out += '</div>';
    out += '<div class="orc-amount-cell">';
    out += '<p class="orc-amount-lbl">Entrada ('+entryPct+'%)</p>';
    out += '<p class="orc-amount-val" style="color:var(--a)">'+fmt(entry)+'</p>';
    out += '</div>';
    out += '<div class="orc-amount-cell">';
    out += '<p class="orc-amount-lbl">Saldo</p>';
    var saldo = isPaid ? 0 : ph.amt-entry;
    out += '<p class="orc-amount-val" style="color:'+(isPaid?'var(--gn)':'var(--am)')+'">'+fmt(saldo)+'</p>';
    out += '</div>';
    out += '</div>'; /* end amounts */

    /* Receipt row */
    if(receipt){
      out += '<div class="orc-receipt-row">';
      out += '<div style="width:28px;height:28px;border-radius:7px;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+pdfIco+'</div>';
      out += '<div style="flex:1;min-width:0"><p style="font-size:12px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+receipt.name+'</p>';
      out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">Enviado em: '+receipt.uploadedAt+' · '+receipt.size+'</p></div>';
      out += '<button class="doc-btn preview" data-tip="Visualizar" data-a="receipt-preview" data-pid="'+pid+'" data-phid="'+ph.id+'">'+eyeIco+'</button>';
      out += '<div class="doc-btn-sep"></div>';
      out += '<button class="doc-btn dl" data-tip="Baixar" data-a="receipt-download" data-pid="'+pid+'" data-phid="'+ph.id+'">'+dlIco+'</button>';
      out += '</div>';
    } else if(isCurrent){
      /* Upload area for current phase */
      out += '<div class="orc-upload-row">';
      out += '<label style="display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;border:1.5px dashed var(--br);background:transparent;font-size:11px;font-weight:600;color:var(--a);cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor=\'var(--a)\';this.style.background=\'var(--as)\'" onmouseout="this.style.borderColor=\'var(--br)\';this.style.background=\'transparent\'">';
      out += clpIco+' Anexar Comprovante de Pagamento';
      out += '<input type="file" accept="image/*,.pdf" style="display:none" data-a="receipt-upload" data-pid="'+pid+'" data-phid="'+ph.id+'">';
      out += '</label>';
      out += '<p style="font-size:10px;color:var(--dm);margin-left:8px">PDF, JPG ou PNG</p>';
      out += '</div>';
    }

    out += '</div>'; /* end card */
    out += '</div>'; /* end orc-phase */
  });
  out += '</div>'; /* end orc-phases */

  /* ── Invoices section ── */
  if(invList.length>0){
    out += '<div class="fa3" style="margin-top:20px">';
    out += '<div class="sec-header" style="margin-bottom:12px">';
    out += '<h2 style="font-family:\'Instrument Serif\',serif;font-size:16px;font-weight:400;color:var(--tx)">Faturas Emitidas</h2>';
    out += '</div>';
    out += '<div class="card" style="padding:0;overflow:hidden">';
    invList.forEach(function(inv){
      var isPaidInv = inv.status==='paid';
      out += '<div class="orc-inv-row">';
      /* ID */
      out += '<div style="flex-shrink:0">';
      out += '<p style="font-family:monospace;font-size:11px;color:var(--a);font-weight:700">'+inv.id+'</p>';
      out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">'+inv.phase+'</p>';
      out += '</div>';
      /* Amounts */
      out += '<div style="flex:1;padding:0 12px">';
      out += '<p style="font-size:12px;font-weight:600;color:var(--tx)">'+fmt(inv.amount)+'</p>';
      out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">Entrada: '+fmt(inv.entry||0)+' ('+( inv.entryPct||'—')+'%) · Venc: '+inv.due+'</p>';
      out += '</div>';
      /* Paid / balance */
      out += '<div style="text-align:right;flex-shrink:0;margin-right:12px">';
      out += '<p style="font-size:11px;font-weight:600;color:'+(isPaidInv?'var(--gn)':'var(--am)')+'">'+fmt(inv.paid||0)+' pago</p>';
      if(!isPaidInv){
        var bal = inv.amount-(inv.paid||0);
        out += '<p style="font-size:10px;color:var(--rd);margin-top:1px">Saldo: '+fmt(bal)+'</p>';
      }
      out += '</div>';
      /* Status badge */
      out += '<span class="st-badge '+(isPaidInv?'completed':'waiting')+'">';
      out += '<span class="st-badge-dot"></span>';
      out += isPaidInv?'Pago':'Pendente';
      out += '</span>';
      /* Download */
      out += '<button class="doc-btn dl" data-tip="Baixar PDF" data-a="dfile-dl" data-pid="'+pid+'" data-fid="'+inv.id+'" style="margin-left:8px">'+dlIco+'</button>';
      out += '</div>'; /* end orc-inv-row */
    });
    out += '</div></div>';
  }

  /* ── Note for client ── */
  out += '<div class="card fa4" style="margin-top:14px;padding:16px 20px;background:var(--lav);border-color:rgba(99,102,241,.2)">';
  out += '<div style="display:flex;gap:10px;align-items:flex-start">';
  out += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
  out += '<div>';
  out += '<p style="font-size:12px;font-weight:600;color:var(--a);margin-bottom:4px">Como funciona o pagamento</p>';
  out += '<p style="font-size:11px;color:var(--mu);line-height:1.6">Cada fase é dividida em entrada e saldo. Após o pagamento, anexe o comprovante aqui para que a DARA Studio confirme e avance seu projeto. Dúvidas? Use a aba <strong>Tickets / Chat</strong>.</p>';
  out += '</div></div></div>';

  out += '</div>';
  return out;
}


function detailDocuments(p){
  const pid     = String(p.id);
  const isAdmin = S.role==='admin';
  const code    = p.code.split('-')[1]||'0000';
  const addr    = p.address;

  /* ══ DOCUMENT TEMPLATE — slot structure ══
     Each slot: {id, group, label, hint, tag, required, file, size, postedAt, viewedAt}
     file===null  → empty state (dashed placeholder)
     file!==null  → filled state (premium card)
  ═══════════════════════════════════════════ */
  if(!S.projDocs[pid]){
    S.projDocs[pid]=[

      /* ── INÍCIO ── */
      {id:'ds01',group:'Início',     label:'Formulário de Briefing',            hint:'Preenchido via site pelo cliente',
       tag:'form',    required:true,
       file:'Briefing - '+addr+'.pdf', size:'180 KB',
       postedAt:'20/01/2026', viewedAt:'20/01/2026 16:42'},

      {id:'ds02',group:'Início',     label:'Estimate / Orçamento',              hint:'Proposta de valores enviada ao cliente',
       tag:'budget',  required:true,
       file:'Estimate - '+addr+'.pdf', size:'890 KB',
       postedAt:'22/01/2026', viewedAt:'22/01/2026 09:15'},

      {id:'ds03',group:'Início',     label:'Contrato de Prestação de Serviços', hint:'Contrato assinado por ambas as partes',
       tag:'contract',required:true,
       file:'Contrato - '+addr+'.pdf', size:'340 KB',
       postedAt:'23/01/2026', viewedAt:'23/01/2026 18:45'},

      {id:'ds04',group:'Início',     label:'Invoice — Initial Payment',          hint:'Fatura da entrada (50% do projeto)',
       tag:'invoice', required:true,
       file:null, size:null, postedAt:null, viewedAt:null},     /* ← VAZIO */

      /* ── REV 00 ── */
      {id:'ds05',group:'REV 00',     label:'Invoice — REV 00 (Entrada 30%)',    hint:'Fatura parcial da revisão 00',
       tag:'invoice', required:true,
       file:null, size:null, postedAt:null, viewedAt:null},     /* ← VAZIO */

      /* ── REV 01 ── */
      {id:'ds06',group:'REV 01',     label:'Invoice — REV 01',                  hint:'Fatura da revisão 01',
       tag:'invoice', required:false,
       file:null, size:null, postedAt:null, viewedAt:null},     /* ← VAZIO */

      /* ── FINALIZAÇÃO ── */
      {id:'ds07',group:'Finalização',label:'Invoice — Final Payment',            hint:'Fatura do saldo restante',
       tag:'invoice', required:true,
       file:null, size:null, postedAt:null, viewedAt:null},     /* ← VAZIO */

      {id:'ds08',group:'Finalização',label:'Documentação Final',                 hint:'Alvarás, ZBA, AsBuild e aprovações municipais',
       tag:'docs',    required:true,
       file:null, size:null, postedAt:null, viewedAt:null},     /* ← VAZIO */

    ];
  }
  const slots = S.projDocs[pid];

  /* ── Compute overall progress ── */
  var requiredSlots = slots.filter(function(s){return s.required;});
  var filledRequired = requiredSlots.filter(function(s){return s.file;});
  var totalSlots     = slots.length;
  var filledSlots    = slots.filter(function(s){return s.file;}).length;
  var pct = requiredSlots.length>0 ? Math.round(filledRequired.length/requiredSlots.length*100) : 0;

  /* ── Group slots by group label ── */
  var groups = {};
  var groupOrder = [];
  slots.forEach(function(s){
    if(!groups[s.group]){ groups[s.group]=[]; groupOrder.push(s.group); }
    groups[s.group].push(s);
  });
  /* Add free 'Outros' group at the end */
  groupOrder.push('Outros');

  /* ── Free uploads (extras outside template) ── */
  if(!S.projDocsExtra) S.projDocsExtra={};
  var extras = S.projDocsExtra[pid]||[];

  /* ── SVG icons ── */
  var upIco  = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>';
  var dlIco  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
  var eyeIco = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  var chkIco = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var pdfIco = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8"/></svg>';
  var docIco = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z M8 8h8 M8 12h8 M8 16h5"/></svg>';

  /* ── Tag config ── */
  var tagColor = {invoice:'#16a34a',contract:'#6366f1',budget:'#d97706',form:'#2563eb',docs:'#7c3aed'};
  var tagLabel = {invoice:'Fatura',contract:'Contrato',budget:'Orçamento',form:'Briefing',docs:'Documentação'};
  var tagBg    = {invoice:'rgba(22,163,74,.08)',contract:'rgba(99,102,241,.08)',budget:'rgba(217,119,6,.08)',form:'rgba(37,99,235,.08)',docs:'rgba(124,58,237,.08)'};

  /* ── RENDER FILLED slot card ── */
  function filledCard(slot){
    var tc = tagColor[slot.tag]||'#6366f1';
    var tb = tagBg[slot.tag]||'var(--as)';
    var ico = (slot.tag==='docs'||slot.tag==='form') ? docIco.replace('currentColor',tc) : pdfIco.replace('currentColor',tc);
    var html2='<div class="doc-row filled" style="margin-bottom:6px">';
    html2 += '<div class="doc-slot-check">'+chkIco+'</div>';
    html2 += '<div class="doc-ico" style="background:'+tb+'">'+ico+'</div>';
    html2 += '<div class="doc-meta">';
    html2 += '<div class="doc-name">'+slot.file+'</div>';
    html2 += '<div class="doc-info">';
    html2 += '<span style="font-size:10px;color:var(--dm)">'+slot.label+'</span>';
    if(slot.size) html2 += '<span class="dfile-date-pill">'+slot.size+'</span>';
    if(slot.postedAt) html2 += '<span class="dfile-date-pill">'+slot.postedAt+'</span>';
    html2 += '<span class="doc-tag '+slot.tag+'" style="background:'+tb+';color:'+tc+'">'+tagLabel[slot.tag]+'</span>';
    if(isAdmin){
      if(slot.viewedAt){
        html2 += '<span class="dfile-viewed">'+eyeIco+' '+slot.viewedAt+'</span>';
      } else {
        html2 += '<span style="font-size:10px;color:var(--am)">⏳ Não visualizado</span>';
      }
    }
    html2 += '</div></div>';
    /* ── Two ghost action buttons: Preview + Download ── */
    var eyeSvg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    var dlSvg ='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    var upSvg ='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';

    html2 += '<div class="doc-actions">';
    /* Preview button — eye icon, indigo ghost */
    html2 += '<button class="doc-btn preview" data-tip="Visualizar"'+
      ' data-a="doc-preview" data-pid="'+pid+'" data-slotid="'+slot.id+'"'+
      ' aria-label="Visualizar '+slot.label+'">'+eyeSvg+'</button>';
    /* Separator */
    html2 += '<div class="doc-btn-sep"></div>';
    /* Download button — arrow-down icon, green ghost */
    html2 += '<button class="doc-btn dl" data-tip="Baixar"'+
      ' data-a="doc-download" data-pid="'+pid+'" data-slotid="'+slot.id+'"'+
      ' aria-label="Baixar '+slot.label+'">'+dlSvg+'</button>';
    /* Admin: replace button */
    if(isAdmin){
      html2 += '<div class="doc-btn-sep"></div>';
      html2 += '<label class="doc-btn replace" data-tip="Substituir" aria-label="Substituir arquivo" style="cursor:pointer">'+upSvg+
        '<input type="file" accept=".pdf,.doc,.docx,.zip" style="display:none" data-a="doc-slot-upload" data-pid="'+pid+'" data-slotid="'+slot.id+'">'+
      '</label>';
    }
    html2 += '</div></div>';
    return html2;
  }

  /* ── RENDER EMPTY slot card ── */
  function emptyCard(slot){
    var tc = tagColor[slot.tag]||'var(--dm)';
    var ico = (slot.tag==='docs'||slot.tag==='form') ? docIco.replace('currentColor','var(--dm)') : pdfIco.replace('currentColor','var(--dm)');
    var html3='<div class="doc-slot-empty">';
    html3 += '<div class="doc-slot-ico-wrap">'+ico+'</div>';
    html3 += '<div class="doc-meta" style="gap:2px">';
    html3 += '<div class="doc-slot-label">'+slot.label+'</div>';
    html3 += '<div class="doc-slot-hint">'+slot.hint+(slot.required?' · <span style="color:var(--rd);font-weight:600">Obrigatório</span>':'')+'</div>';
    html3 += '</div>';
    if(isAdmin){
      html3 += '<label class="doc-slot-upload-btn">'+upIco+' Upload'+
        '<input type="file" accept=".pdf,.doc,.docx,.zip" style="display:none" data-a="doc-slot-upload" data-pid="'+pid+'" data-slotid="'+slot.id+'">'+
      '</label>';
    } else {
      html3 += '<span style="font-size:10px;color:var(--dm);padding:4px 10px;border-radius:6px;background:var(--lav2)">Aguardando</span>';
    }
    html3 += '</div>';
    return html3;
  }

  /* ══ BUILD HTML ══ */
  var html = '<div class="page-anim">';

  /* ── Page header ── */
  html += '<div class="sec-header" style="margin-bottom:16px">';
  html += '<div>';
  html += '<h2 style="font-family:\'Instrument Serif\',serif;font-size:17px;font-weight:400;color:var(--tx)">Documentos do Projeto</h2>';
  html += '<p style="font-size:11px;color:var(--mu);margin-top:3px">Checklist de documentos — '+filledSlots+' de '+totalSlots+' arquivos enviados</p>';
  html += '</div>';
  html += '</div>';

  /* ── Overall progress bar ── */
  html += '<div class="dt-progress-wrap fa1">';
  html += '<div>';
  html += '<p class="dt-progress-label">'+pct+'% completo</p>';
  html += '<p class="dt-progress-sub">'+filledRequired.length+'/'+requiredSlots.length+' obrigatórios</p>';
  html += '</div>';
  html += '<div class="dt-progress-bar-bg"><div class="dt-progress-bar-fill" style="width:'+pct+'%"></div></div>';
  html += '<div style="width:38px;height:38px;border-radius:50%;border:2.5px solid '+(pct===100?'var(--gn)':'var(--cb)')+
    ';display:flex;align-items:center;justify-content:center;flex-shrink:0;'+
    'background:'+(pct===100?'rgba(22,163,74,.1)':'var(--lav2)')+'">'+
    '<span style="font-size:11px;font-weight:700;color:'+(pct===100?'var(--gn)':'var(--dm)')+'">'+pct+'%</span>'+
  '</div>';
  html += '</div>';

  /* ── Groups ── */
  groupOrder.forEach(function(groupName){
    if(groupName==='Outros'){
      /* Free upload zone */
      html += '<div class="dt-group fa">';
      html += '<div class="dt-group-head">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--dm)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';
      html += '<span class="dt-group-label">Outros</span>';
      html += '<span class="dt-group-stats">';
      html += '<span class="dt-stat-filled">'+extras.length+' arquivo'+(extras.length!==1?'s':'')+'</span>';
      html += '</span>';
      html += '</div>';
      /* Extras list */
      extras.forEach(function(ex){
        var ico2 = pdfIco.replace('currentColor','#6366f1');
        html += '<div class="doc-row" style="margin-bottom:6px">';
        html += '<div class="doc-ico contract">'+ico2+'</div>';
        html += '<div class="doc-meta"><div class="doc-name">'+ex.name+'</div>';
        html += '<div class="doc-info"><span>'+ex.size+'</span><span class="dfile-date-pill">'+ex.postedAt+'</span></div>';
        html += '</div>';
        html += '<div class="doc-actions">';
        html += '<button class="doc-btn" title="Visualizar">'+eyeIco+'</button>';
        html += '<button class="doc-btn" title="Baixar">'+dlIco+'</button>';
        html += '</div></div>';
      });
      /* Free upload button */
      if(isAdmin){
        html += '<label class="dt-free-zone">';
        html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>';
        html += '<p style="font-size:12px;font-weight:600;color:var(--a);margin-top:8px">Enviar arquivo extra</p>';
        html += '<p style="font-size:10px;color:var(--mu);margin-top:3px">Qualquer documento fora do roteiro padrão</p>';
        html += '<input type="file" accept=".pdf,.doc,.docx,.zip,.jpg" multiple style="display:none" data-a="doc-extra-upload" data-pid="'+pid+'">';
        html += '</label>';
      } else {
        if(extras.length===0){
          html += '<div class="dt-free-zone" style="cursor:default;opacity:.6">';
          html += '<p style="font-size:12px;color:var(--dm)">Nenhum arquivo extra adicionado</p>';
          html += '</div>';
        }
      }
      html += '</div>';
      return;
    }

    var groupSlots = groups[groupName]||[];
    var gFilled = groupSlots.filter(function(s){return s.file;}).length;
    var gTotal  = groupSlots.length;
    var gDone   = gFilled===gTotal;

    /* Group icon */
    var gIco;
    if(groupName==='Início'){
      gIco='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>';
    } else if(groupName==='Finalização'){
      gIco='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--gn)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>';
    } else {
      gIco='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>';
    }

    html += '<div class="dt-group fa">';
    html += '<div class="dt-group-head">';
    html += gIco;
    html += '<span class="dt-group-label">'+groupName+'</span>';
    if(gDone){
      html += '<span style="font-size:10px;font-weight:700;color:var(--gn);background:rgba(22,163,74,.1);padding:2px 9px;border-radius:8px;margin-left:4px">'+chkIco+' Completo</span>';
    }
    html += '<span class="dt-group-stats">';
    html += '<span class="dt-stat-filled">'+gFilled+' enviado'+(gFilled!==1?'s':'')+'</span>';
    if(gTotal-gFilled>0){
      html += '<span class="dt-stat-empty">'+(gTotal-gFilled)+' pendente'+(gTotal-gFilled!==1?'s':'')+'</span>';
    }
    html += '</span>';
    html += '</div>'; /* end group head */

    groupSlots.forEach(function(slot){
      html += slot.file ? filledCard(slot) : emptyCard(slot);
    });

    html += '</div>'; /* end dt-group */
  });

  html += '</div>';
  return html;
}

/* ══════════════════════════════════════════════════════════
   DESIGN REVIEWS TAB
   "Cerebro" da automacao: upload aqui -> atualiza Timeline
   ══════════════════════════════════════════════════════════ */
function detailReviews(p){
  const pid     = String(p.id);
  const isAdmin = S.role==='admin';

  /* ── Init reviews state ── */
  if(!S.projReviews[pid]){
    S.projReviews[pid]=[
      {revId:'rev00',phase:'REV 00',status:'active',  file:null,uploadedAt:null,
       comments:[
         {id:'c1',author:'DARA Studio',role:'admin',type:'info',resolved:false,
          text:'Aguardando upload das plantas REV 00.',ts:'18/03/2026 10:00',px:null,py:null},
       ]},
      {revId:'rev01',phase:'REV 01',status:'pending',file:null,uploadedAt:null,comments:[]},
      {revId:'rev02',phase:'REV 02',status:'pending',file:null,uploadedAt:null,comments:[]},
      {revId:'rev03',phase:'REV 03',status:'pending',file:null,uploadedAt:null,comments:[]},
    ];
  }
  const reviews = S.projReviews[pid];

  /* ── Active phase ── */
  if(!S.revActivePhase) S.revActivePhase={};
  var activeRevId = S.revActivePhase[pid]||'rev00';
  var rev = reviews.find(function(r){return r.revId===activeRevId;})||reviews[0];
  if(!rev) return '<div class="page-anim"><p style="color:var(--dm);padding:24px">Sem revisoes.</p></div>';

  /* ── Toggle state ── */
  if(!S.revHideResolved) S.revHideResolved={};
  var hideResolved = !!S.revHideResolved[pid];

  /* ── Ensure every comment has resolved field ── */
  rev.comments.forEach(function(c){ if(c.resolved===undefined) c.resolved=false; });

  /* ── Comment stats ── */
  var allComments     = rev.comments.filter(function(c){return c.type==='change-req'||c.type==='approved';});
  var resolvedCount   = allComments.filter(function(c){return c.resolved;}).length;
  var pendingCount    = allComments.length - resolvedCount;
  var pct             = allComments.length>0 ? Math.round(resolvedCount/allComments.length*100) : 0;

  /* ── SVG icons ── */
  var checkIco  = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var undoIco   = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>';
  var upIco     = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>';
  var editIco   = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>';
  var pinIco    = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

  /* ── Phase badge ── */
  function revBadge(rv){
    if(rv.status==='completed') return '<span class="rev-phase-tag completed">'+checkIco+' Entregue</span>';
    if(rv.status==='active')    return '<span class="rev-phase-tag active">Em Andamento</span>';
    return '<span class="rev-phase-tag pending">Not Started</span>';
  }

  /* ── Build type badge ── */
  function typeBadge(type){
    var label={approved:'Aprovado','change-req':'Ajuste',info:'Info'}[type]||type;
    return '<span class="rv-type-badge '+type+'">'+label+'</span>';
  }

  var html = '<div class="page-anim">';

  /* ── Page header ── */
  html += '<div class="sec-header" style="margin-bottom:16px">';
  html += '<div>';
  html += '<h2 style="font-family:\'Instrument Serif\',serif;font-size:17px;font-weight:400;color:var(--tx)">Design Reviews</h2>';
  html += '<p style="font-size:11px;color:var(--mu);margin-top:3px">Feedback e gestao de tarefas por revisao</p>';
  html += '</div>';
  /* Stats chip */
  if(allComments.length>0){
    html += '<div style="display:flex;align-items:center;gap:8px">';
    html += '<div style="text-align:right">';
    html += '<p style="font-size:11px;font-weight:600;color:var(--tx)">'+resolvedCount+'/'+allComments.length+' resolvidos</p>';
    html += '<p style="font-size:10px;color:var(--dm)">'+pct+'% concluido</p>';
    html += '</div>';
    html += '<div style="width:36px;height:36px;border-radius:50%;background:'+
      (pct===100?'rgba(22,163,74,.1)':'var(--as)')+
      ';border:2px solid '+(pct===100?'var(--gn)':'var(--cb)')+
      ';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+(pct===100?'var(--gn)':'var(--mu)')+'">'+pct+'%</div>';
    html += '</div>';
  }
  html += '</div>';

  /* ── Phase selector tabs ── */
  html += '<div class="rv-phase-tabs" style="background:var(--bg2);border:1px solid var(--cb);border-radius:12px;margin-bottom:14px">';
  reviews.forEach(function(rv){
    var isAct = rv.revId===activeRevId;
    var pendC = rv.comments.filter(function(c){return c.type==='change-req'&&!c.resolved;}).length;
    html += '<button class="rv-phase-tab'+(isAct?' act':'')+'" data-a="rev-phase" data-pid="'+pid+'" data-revid="'+rv.revId+'">'+
      rv.phase+(pendC>0&&!isAct?' <span style="font-size:9px;background:var(--rd);color:#fff;border-radius:8px;padding:0 5px">'+pendC+'</span>':'')+
    '</button>';
  });
  html += '</div>';

  /* ══ Two-panel layout ══ */
  html += '<div class="rv-wrap">';

  /* ────────────────────────────────────────────────
     LEFT: Image canvas with pins
  ──────────────────────────────────────────────── */
  html += '<div>';

  /* Canvas */
  html += '<div class="rv-canvas" id="rv-canvas-'+pid+'" data-a="rv-canvas-click" data-pid="'+pid+'" data-revid="'+rev.revId+'">';

  if(rev.file){
    /* Show file representation */
    html += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--lav2)">';
    html += '<div style="text-align:center">';
    html += '<svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
    html += '<p style="font-size:12px;font-weight:600;color:var(--a);margin-top:10px">'+rev.file+'</p>';
    html += '<p style="font-size:10px;color:var(--mu);margin-top:4px">Clique no canvas para adicionar pinos de feedback</p>';
    html += '</div></div>';

    /* Render pins */
    var pinNum=0;
    rev.comments.forEach(function(c,ci){
      if(c.px===null||c.py===null) return;
      pinNum++;
      var isResolved = !!c.resolved;
      var hide = hideResolved && isResolved;
      html += '<div class="rv-pin '+(isResolved?'resolved':'pending')+(hide?' hidden':'')+'" '+
        'style="left:'+c.px+'%;top:'+c.py+'%" '+
        'data-a="rv-pin-click" data-pid="'+pid+'" data-revid="'+rev.revId+'" data-cid="'+c.id+'">'+
        pinNum+
        '<span class="rv-pin-tip">'+c.author+': '+c.text.slice(0,30)+(c.text.length>30?'...':'')+'</span>'+
      '</div>';
    });
  } else {
    /* Empty state — show upload area for admin */
    html += '<div class="rv-canvas-empty">';
    if(isAdmin && (rev.status==='active'||rev.status==='completed')){
      html += '<label style="display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer">'+
        upIco.replace('currentColor','var(--a)')+
        '<div style="text-align:center">'+
          '<p style="font-size:13px;font-weight:600;color:var(--a)">Upload do arquivo de revisao</p>'+
          '<p style="font-size:11px;color:var(--mu);margin-top:4px">PDF, DWG, ZIP, JPG · max 100MB</p>'+
        '</div>'+
        '<input type="file" accept=".pdf,.dwg,.zip,.jpg,.jpeg,.png" style="display:none" data-a="rev-upload" data-pid="'+pid+'" data-revid="'+rev.revId+'">'+
      '</label>';
    } else {
      html += '<div style="text-align:center">';
      html += '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--dm)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>';
      html += '<p style="font-size:12px;color:var(--dm);margin-top:12px">Arquivo ainda nao disponivel</p>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>'; /* end canvas */

  /* Canvas help text */
  if(rev.file){
    html += '<p style="font-size:10px;color:var(--dm);margin-top:8px;display:flex;align-items:center;gap:5px">'+
      pinIco+' Clique na imagem para fixar um comentario · Os pinos aparecem na lista ao lado</p>';
  }

  /* Add comment form (shown when file exists) */
  if(rev.file){
    var fbKey = pid+'_'+rev.revId;
    var fbText = S.revFeedbackText&&S.revFeedbackText[fbKey]||'';
    html += '<div class="card" style="padding:12px;margin-top:12px">';
    html += '<p style="font-size:11px;font-weight:600;color:var(--tx);margin-bottom:8px">Adicionar comentario</p>';
    html += '<div class="rev-input-row">';
    html += '<input class="rev-inp" placeholder="Descreva o feedback ou ajuste solicitado..." value="'+fbText+'" '+
      'data-a="rev-fb-input" data-pid="'+pid+'" data-revid="'+rev.revId+'">';
    html += '</div>';
    html += '<div style="display:flex;gap:6px;margin-top:8px">';
    html += '<button class="rev-approve-btn" data-a="rev-approve" data-pid="'+pid+'" data-revid="'+rev.revId+'">'+checkIco+' Aprovar</button>';
    html += '<button class="rev-change-btn" data-a="rev-change-req" data-pid="'+pid+'" data-revid="'+rev.revId+'">'+editIco+' Solicitar Ajuste</button>';
    html += '</div></div>';
  }

  html += '</div>'; /* end left col */

  /* ────────────────────────────────────────────────
     RIGHT: Task sidebar
  ──────────────────────────────────────────────── */
  html += '<div class="rv-sidebar">';

  /* Sidebar header */
  html += '<div class="rv-sb-head">';
  html += '<span class="rv-sb-title">Comentarios</span>';
  html += '<span class="rv-sb-count">'+pendingCount+' pendente'+(pendingCount!==1?'s':'')+'</span>';
  /* Hide-resolved toggle */
  html += '<div class="rv-toggle-wrap" title="Ocultar comentarios resolvidos">';
  html += '<span class="rv-toggle-lbl">Ocultar resolvidos</span>';
  html += '<button class="rv-toggle'+(hideResolved?' on':'')+'" data-a="rev-hide-toggle" data-pid="'+pid+'"></button>';
  html += '</div>';
  html += '</div>';

  /* Progress bar */
  html += '<div class="rv-progress-bar"><div class="rv-progress-fill" style="width:'+pct+'%"></div></div>';

  /* Comment task list */
  html += '<div class="rv-sb-body">';

  var visibleComments = rev.comments.filter(function(c){
    return c.type==='change-req'||c.type==='approved'||c.type==='info';
  });

  if(visibleComments.length===0){
    html += '<div class="rv-empty">';
    html += '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--dm)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    html += '<p>Nenhum comentario ainda.</p>';
    if(rev.file) html += '<p style="margin-top:4px;font-size:10px">Clique na imagem para adicionar pinos.</p>';
    html += '</div>';
  } else {
    var pinCount=0;
    visibleComments.forEach(function(c,ci){
      var isResolved = !!c.resolved;
      var hasPinIndex = c.px!==null&&c.py!==null;
      if(hasPinIndex) pinCount++;
      var thisPin = hasPinIndex ? pinCount : null;
      /* Hide if toggle on and resolved */
      var hidden = hideResolved && isResolved;

      html += '<div class="rv-task'+(isResolved?' resolved':'')+(hidden?' hidden':'')+'" data-cid="'+c.id+'">';

      /* Task head: pin dot + author + timestamp */
      html += '<div class="rv-task-head">';
      if(thisPin!==null){
        html += '<div class="rv-task-pin '+(isResolved?'resolved':'pending')+'">'+thisPin+'</div>';
      } else {
        html += '<div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:var(--as);display:flex;align-items:center;justify-content:center">'+
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+
        '</div>';
      }
      html += '<div class="rv-task-meta">';
      html += '<div class="rv-task-author">'+c.author+'</div>';
      html += '<div class="rv-task-ts">'+c.ts+'</div>';
      html += '</div>';
      html += '</div>';

      /* Text */
      html += '<div class="rv-task-text">'+c.text+'</div>';

      /* Footer: type badge + resolved badge + resolve button */
      html += '<div class="rv-task-foot">';
      html += typeBadge(c.type);
      if(isResolved){
        html += '<span class="rv-resolved-badge">'+checkIco+' Resolvido</span>';
      }
      /* Only show resolve btn for change-req and approved (not info) */
      if(c.type==='change-req'||c.type==='approved'){
        if(isResolved){
          html += '<button class="rv-resolve-btn" data-a="rev-unresolve" data-pid="'+pid+'" data-revid="'+rev.revId+'" data-cid="'+c.id+'">'+undoIco+' Desfazer</button>';
        } else {
          html += '<button class="rv-resolve-btn" style="border-color:var(--gn);color:var(--gn)" data-a="rev-resolve" data-pid="'+pid+'" data-revid="'+rev.revId+'" data-cid="'+c.id+'">'+checkIco+' Resolver</button>';
        }
      }
      html += '</div>';

      html += '</div>'; /* end rv-task */
    });
  }

  html += '</div>'; /* end sb-body */

  /* Sidebar footer — resolve all */
  if(pendingCount>0&&isAdmin){
    html += '<div style="padding:10px 16px;border-top:1px solid var(--cb);flex-shrink:0">';
    html += '<button style="width:100%;padding:8px;border-radius:9px;border:1.5px solid var(--cb);background:transparent;font-size:11px;font-weight:600;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px" '+
      'data-a="rev-resolve-all" data-pid="'+pid+'" data-revid="'+rev.revId+'" '+
      'onmouseover="this.style.borderColor=\'var(--gn)\';this.style.color=\'var(--gn)\'" '+
      'onmouseout="this.style.borderColor=\'var(--cb)\';this.style.color=\'var(--mu)\'">';
    html += checkIco+' Marcar todos como resolvidos';
    html += '</button></div>';
  }

  html += '</div>'; /* end sidebar */
  html += '</div>'; /* end rv-wrap */
  html += '</div>';
  return html;
}

    html += '</div>';

  } else {
    S.updates.forEach(function(u){
      const attCount = (u.attachments&&u.attachments.length)||0;
      html += '<div class="su-update-item">';
      html += '<div class="su-update-meta">';
      html += '<span class="su-update-date">'+clockIco+' '+u.date+'</span>';
      if(attCount>0) html += '<span class="su-update-fotos">'+attCount+' foto'+(attCount!==1?'s':'')+'</span>';
      html += '</div>';
      html += '<p class="su-update-text">'+u.text+'</p>';
      /* Show thumbnails if any */
      if(u.attachments&&u.attachments.length>0){
        html += '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:10px">';
        u.attachments.forEach(function(a){
          if(a.type==='image'){
            html += '<img src="'+(a.url||'https://placehold.co/60x60/6366f1/fff?text=IMG')+'" style="width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--cb)" alt="'+a.name+'">';
          } else {
            html += '<div style="width:56px;height:56px;border-radius:8px;background:var(--lav2);border:1px solid var(--cb);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dm);text-align:center;padding:4px">'+a.name.split('.').pop().toUpperCase()+'</div>';
          }
        });
        html += '</div>';
      }
      html += '</div>';
    });
  }

  html += '</div>';
  return html;
}


function isBRT_BusinessHours(){
  /* Returns true if current time is Mon-Fri 08:00-16:00 BRT (UTC-3) */
  const nowBRT  = new Date(Date.now() - 3*3600*1000);
  const dayBRT  = nowBRT.getUTCDay();   /* 0=Sun, 6=Sat */
  const hrBRT   = nowBRT.getUTCHours();
  const minBRT  = nowBRT.getUTCMinutes();
  const isWeekday = dayBRT>=1 && dayBRT<=5;
  const isHours   = (hrBRT>8 || (hrBRT===8 && minBRT>=0)) && hrBRT<16;
  return isWeekday && isHours;
}

function chatTimestamp(){
  /* Returns current time as HH:MM in BRT */
  const nowBRT = new Date(Date.now() - 3*3600*1000);
  const hh = String(nowBRT.getUTCHours()).padStart(2,'0');
  const mm = String(nowBRT.getUTCMinutes()).padStart(2,'0');
  return hh+':'+mm;
}

function detailChat(){
  const online   = isBRT_BusinessHours();
  const nowBRT   = new Date(Date.now() - 3*3600*1000);
  const hrBRT    = nowBRT.getUTCHours();
  const dayBRT   = nowBRT.getUTCDay();
  const isWeekend= dayBRT===0||dayBRT===6;

  /* Status derivation */
  const status = online?'online':(hrBRT>=16&&hrBRT<19&&!isWeekend?'away':'offline');
  const statusLbl   = {online:t('online'),away:t('away'),offline:t('offline')}[status];
  const statusColor = {online:'#16a34a',away:'#d97706',offline:'#9b99b0'}[status];

  /* Checkmarks */
  const checkmark = (readAt) => readAt
    ? '<span class="wa-check read">&#10003;&#10003;</span>'
    : '<span class="wa-check">&#10003;</span>';

  /* Render each message bubble */
  function msgBubble(m,i){
    const isMe  = m.from==='client';
    const isBot = m.from==='bot';
    const sentAt = m.time||chatTimestamp();
    const readAt = isMe&&i<2?sentAt:null;
    return('<div class="wa-bubble '+(isMe?'me':isBot?'bot':'them')+'">'+
      (isBot?'<span class="wa-bot-label">Sistema</span>':'')+
      '<p class="wa-msg-txt">'+m.text+'</p>'+
      '<div class="wa-msg-meta">'+
        '<span>'+sentAt+'</span>'+
        (isMe?checkmark(readAt):'')+
      '</div>'+
    '</div>');
  }

  return('<div class="wa-chat-wrap">'+

    /* Header */
    '<div class="wa-header">'+
      '<div class="wa-av">DA</div>'+
      '<div>'+
        '<p class="wa-name">DARA Studio</p>'+
        '<p class="wa-status '+status+'">'+statusLbl+'</p>'+
      '</div>'+
      '<div style="margin-left:auto;display:flex;align-items:center;gap:6px">'+
        '<div style="width:8px;height:8px;border-radius:50%;background:'+statusColor+'"></div>'+
        '<span style="font-size:10px;color:var(--dm)">'+(online?'Online':'Offline')+'</span>'+
      '</div>'+
    '</div>'+

    /* Business hours banner */
    '<div class="wa-hours-banner">'+
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'+
      ' Seg a Sex, 08:00 – 16:00 (Horario de Brasilia)'+
      (online?'':' <strong style="margin-left:4px">Fora do expediente</strong>')+
    '</div>'+

    /* Messages */
    '<div class="wa-body" id="cb">'+
      S.msgs.map(msgBubble).join('')+
    '</div>'+

    /* Input footer */
    '<div class="wa-foot">'+
      '<button class="dfile-btn" style="border-radius:50%;width:36px;height:36px;flex-shrink:0" data-a="chat-file" title="Anexar">'+
        ic('up',13,'currentColor')+
        '<input type="file" id="chat-file-input" style="display:none" data-a="chat-file-upload">'+
      '</button>'+
      '<input id="ci" class="wa-inp" placeholder="'+t('writeMsg')+'" value="'+S.cmsg+'">'+
      '<button class="wa-send" data-a="sendc">'+ic('send',14,'#fff')+'</button>'+
    '</div>'+

  '</div>');
}

function detailInternalNotes(p){

  if(!S.projDeadlines) S.projDeadlines={};
  if(!S.projDeadlines[pid]){
    S.projDeadlines[pid]={
      start:        p.due? '' : '2026-01-15',
      preview:      '2026-04-01',
      clientReturn: '2026-04-10',
      hardDeadline: p.due ? p.due.split('/').reverse().join('-') : '2026-08-15',
    };
  }
  const dl = S.projDeadlines[pid];

  /* ── Init notes ── */
  if(!S.projNotes) S.projNotes={};

    S.projNotes[pid]=[

      {id:'n3', date:'2026-03-05', text:'Arquivo DWG enviado para o cliente via portal. Aguardando feedback REV 00.', vis:'public'},

  function dlStatus(dateStr){
    if(!dateStr) return {dot:'var(--dm)', tip:'Não definida'};
    const d = new Date(dateStr), now = new Date();
    const diff = (d-now)/(1000*60*60*24);
    if(diff<0)    return {dot:'#dc2626', tip:'Vencida'};
    if(diff<7)    return {dot:'#d97706', tip:'Urgente (< 7 dias)'};

/* ── computeUnitEconomics: pure fn ── */
function computeUE(inv){
  const cfg    = PAYMENT_METHODS[inv.method]||PAYMENT_METHODS.pix;
  const fee    = +(inv.grossAmount * cfg.feeRate).toFixed(2);
  const rep    = inv.freelancerFee||0;
  const net    = +(inv.grossAmount - fee - rep).toFixed(2);
  const margin = inv.grossAmount>0 ? Math.round(net/inv.grossAmount*100) : 0;
  return {fee, rep, net, margin, cfg};
}

function calcPayment(p){
  const cfg    = PAYMENT_METHODS[p.method] || PAYMENT_METHODS.pix;
  const fee    = +(p.grossAmount * cfg.feeRate).toFixed(2);
  const net    = +(p.grossAmount - fee).toFixed(2);
  return { ...p, cfg, fee, net };
}

          ? `<p style="text-align:center;padding:32px;color:var(--dm);font-size:13px">Nenhuma fatura pendente</p>`
          : `<div style="overflow-x:auto"><table class="fin-table">${tableHeader}<tbody>${outstanding.map(invRow).join('')}</tbody></table></div>`}
      </div>
    </div>

    <!-- Recent Payments — Unit Economics table -->
    <div class="fa4">
      <div class="fin-section-head">
        <span class="fin-section-title">
          ${ic('check',15,'#16a34a')} Pagamentos Recentes
          <span class="fin-section-count">${RECENT_PAYMENTS.length}</span>
        </span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--dm);padding:3px 9px;background:var(--lav2);border-radius:6px;border:1px solid var(--cb)">
            Unit Economics · Taxa calculada automaticamente
          </span>
          <button class="btn-ghost" style="font-size:11px" data-a="export-pdf">${ic('dl',12,'currentColor')} Exportar</button>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        ${(function(){
          /* ── Compute all payments ── */
          const payments = RECENT_PAYMENTS.map(calcPayment);

          /* ── Aggregates for summary row ── */
          const totGross  = payments.reduce((s,p)=>s+p.grossAmount,0);
          const totFee    = payments.reduce((s,p)=>s+p.fee,0);
          const totNet    = payments.reduce((s,p)=>s+p.net,0);
          const effRate   = totGross>0 ? (totFee/totGross*100).toFixed(2) : '0.00';

          /* ── PaymentBadge component ── */
          const payBadge = (p) =>
            '<span class="pm-badge '+p.cfg.cls+'">'+
              '<span class="pm-badge-dot"></span>'+
              p.cfg.label+
            '</span>';

          /* ── Fee cell ── */
          const feeCell = (p) => {
            const isZero = p.fee===0;
            return '<div class="ec-fee'+(isZero?' zero':'')+'">'+
              (isZero ? '—' : '−'+fmt(p.fee))+
            '</div>'+
            '<div class="ec-fee-rate">'+
              (isZero ? p.cfg.label+' · 0%' : (p.cfg.feeRate*100).toFixed(2)+'% fee')+
            '</div>';
          };

          /* ── Table rows ── */
          const rows = payments.map((p,i) => '<tr>'+
            /* Invoice ref */
            '<td>'+
              '<span style="font-family:monospace;font-size:11px;color:var(--a);font-weight:700">'+p.invoiceRef+'</span>'+
              '<p style="font-size:9px;color:var(--dm);margin-top:2px">'+p.id+'</p>'+
            '</td>'+
            /* Project / client */
            '<td>'+
              '<p style="font-size:12px;font-weight:600;color:var(--tx)">'+p.project+'</p>'+
              '<p style="font-size:10px;color:var(--mu);margin-top:1px">'+p.client+'</p>'+
            '</td>'+
            /* Payment method badge */
            '<td>'+payBadge(p)+'</td>'+
            /* Date */
            '<td style="font-size:11px;color:var(--mu);white-space:nowrap">'+p.date+'</td>'+
            /* Gross Amount */
            '<td><span class="ec-gross">'+fmt(p.grossAmount)+'</span></td>'+
            /* Gateway Fee */
            '<td>'+feeCell(p)+'</td>'+
            /* Net Amount — highlighted column */
            '<td class="net-col">'+
              '<span class="ec-net">'+fmt(p.net)+'</span>'+
            '</td>'+
            /* Actions */
            '<td>'+
              '<button class="fin-action-btn" data-a="export-pdf">'+
                '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> PDF'+
              '</button>'+
            '</td>'+
          '</tr>').join('');

          /* ── Table header ── */
          const header = '<thead><tr>'+
            '<th>Fatura</th>'+
            '<th>Projeto / Cliente</th>'+
            '<th>Método</th>'+
            '<th>Data</th>'+
            '<th>Gross</th>'+
            '<th>Fee (Gateway)</th>'+
            '<th style="color:var(--gn)">Net ↓</th>'+
            '<th>Ações</th>'+
          '</tr></thead>';

          /* ── Summary row (unit economics totals) ── */
          const summary =
            '<div class="ec-summary">'+
              '<div class="ec-summary-cell">'+
                '<p class="ec-summary-label">Total Gross</p>'+
                '<p class="ec-summary-val" style="color:var(--tx)">'+fmt(totGross)+'</p>'+
              '</div>'+
              '<div class="ec-summary-cell">'+
                '<p class="ec-summary-label">Total Fees</p>'+
                '<p class="ec-summary-val" style="color:var(--rd)">'+fmt(totFee)+'</p>'+
              '</div>'+
              '<div class="ec-summary-cell">'+
                '<p class="ec-summary-label">Net Revenue</p>'+
                '<p class="ec-summary-val" style="color:var(--gn)">'+fmt(totNet)+'</p>'+
              '</div>'+
              '<div class="ec-summary-cell">'+
                '<p class="ec-summary-label">Effective Rate</p>'+
                '<p class="ec-summary-val" style="color:var(--am)">'+effRate+'%</p>'+
              '</div>'+
            '</div>';

          return '<div style="overflow-x:auto">'+
            '<table class="fin-table">'+header+'<tbody>'+rows+'</tbody></table>'+
          '</div>'+summary;
        })()}
      </div>
    </div>

  </div>`;
}

function usersPage(){

  function freelaCard(u){

    return`<div class="user-card">
      <!-- Avatar com iniciais + dot de status -->
      <div style="flex-shrink:0;position:relative">
        <div class="user-logo-placeholder" style="background:${u.online?'rgba(22,163,74,.12)':'var(--as)'}">

        <span class="online-dot" style="position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border:2px solid var(--bg2);background:${u.online?'#16a34a':'#9b99b0'}"></span>
      </div>
      <div class="user-card-body">
        <div class="user-card-name">
          ${u.name}
          <span class="level-badge level-${lvl}">${lvlLbl}</span>
          <span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--gnb);color:var(--gn)">PRO</span>

        <div class="user-card-company">${ic('bld',10,'var(--mu)')} ${u.companyName}</div>
        <div class="user-card-spec" style="margin-top:3px">${ic('settings',9,'var(--dm)')} ${u.specialty}</div>
        <!-- Barra de nível de atividade -->
        <div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dm);margin-bottom:3px">
            <span>Nível de atividade</span><span style="color:${score>=90?'#16a34a':score>=70?'#d97706':'#9b99b0'};font-weight:600">${score}%</span>
          </div>

  /* ── Card: ADMIN ── */

    const initials = u.name.split(' ').map(n=>n[0]).slice(0,2).join('');
    return`<div class="user-card">
      <div style="flex-shrink:0;position:relative">
        <div class="user-logo-placeholder" style="background:var(--rdb)">
          <span style="font-family:'Instrument Serif',serif;font-size:18px;color:var(--rd)">${initials}</span>
        </div>
        <span class="online-dot" style="position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border:2px solid var(--bg2);background:${u.online?'#16a34a':'#9b99b0'}"></span>
      </div>
      <div class="user-card-body">
        <div class="user-card-name">
          ${u.name}
          <span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--rdb);color:var(--rd)">ADMIN</span>

        <div class="user-card-company">${ic('bld',10,'var(--mu)')} ${u.companyName}</div>

        <div class="user-card-footer" style="margin-top:10px">
          <span class="user-stat">${ic('folder',10,'var(--a)')} ${u.projects} projetos</span>
          <span class="user-stat">${ic('clock',10,'var(--dm)')} ${u.lastActive}</span>
        </div>
      </div>
    </div>`;

  /* decide quais grupos mostrar baseado no filtro */
  const showClients   = f==='all'||f==='client';

    <!-- Seção: Admins -->
    ${showAdmins&&admins.length?`

/* ── ACTIVITY (logs de auditoria — apenas admin) ── */

  const f = S.logFil||'all';
  const CAT={
    finance:{ico:'dollar',bg:'rgba(22,163,74,.12)', c:'#16a34a',lbl:'Financeiro',emoji:'💰'},
    file:   {ico:'up',    bg:'rgba(37,99,235,.10)', c:'#2563eb',lbl:'Arquivo',   emoji:'📄'},
    update: {ico:'bld',   bg:'rgba(99,102,241,.10)',c:'#6366f1',lbl:'Obra',      emoji:'🏗'},
    status: {ico:'zap',   bg:'rgba(217,119,6,.10)', c:'#d97706',lbl:'Status',    emoji:'⚡'},
    ticket: {ico:'tag',   bg:'rgba(220,38,38,.08)', c:'#dc2626',lbl:'Ticket',    emoji:'🎫'},
    auth:   {ico:'usr',   bg:'rgba(99,102,241,.08)',c:'#6366f1',lbl:'Acesso',    emoji:'🔑'},
    message:{ico:'chat',  bg:'rgba(139,92,246,.09)',c:'#7c3aed',lbl:'Mensagem',  emoji:'💬'},
    user:   {ico:'users', bg:'rgba(16,185,129,.09)',c:'#059669',lbl:'Usuário',   emoji:'👤'},
    invoice:{ico:'rcpt',  bg:'rgba(22,163,74,.12)', c:'#16a34a',lbl:'Fatura',   emoji:'🧾'},
  };
  const RS={
    admin:  {bg:'rgba(220,38,38,.1)', c:'#dc2626'},
    freela: {bg:'rgba(22,163,74,.1)',c:'#16a34a'},
    cliente:{bg:'rgba(99,102,241,.1)',c:'#6366f1'},
    client: {bg:'rgba(99,102,241,.1)',c:'#6366f1'},
  };
  const cats  = [...new Set(LOGS.map(l=>l.category))];
  const filt  = f==='all'?LOGS:LOGS.filter(l=>l.category===f);
  const byRole= r=>LOGS.filter(l=>l.role===r||l.role===r+'e').length;

  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  return`<div class="page-anim">
    <div class="sec-header">
      <div>
        <h1 class="page-title">Registro de Atividade</h1>
        <p class="page-sub">${LOGS.length} eventos · últimos 30 dias</p>
      </div>
      <button class="btn-ghost" style="display:flex;align-items:center;gap:6px;font-size:12px">
        ${ic('dl',13,'currentColor')} Exportar CSV
      </button>
    </div>
    <div class="kpi-grid fa1" style="margin-bottom:20px">
      <div class="kpi" style="cursor:default"><div class="kpi-label">${ic('settings',11,'#dc2626')} Admin</div><div class="kpi-val" style="color:#dc2626">${byRole('admin')}</div><div class="kpi-delta" style="color:var(--dm)">ações</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-label">${ic('usr',11,'#16a34a')} Freelancer</div><div class="kpi-val" style="color:#16a34a">${byRole('freela')}</div><div class="kpi-delta" style="color:var(--dm)">ações</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-label">${ic('usr',11,'#6366f1')} Cliente</div><div class="kpi-val" style="color:#6366f1">${LOGS.filter(l=>l.role==='client'||l.role==='cliente').length}</div><div class="kpi-delta" style="color:var(--dm)">ações</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-label">${ic('activity',11,'#2563eb')} Total</div><div class="kpi-val" style="color:#2563eb">${LOGS.length}</div><div class="kpi-delta" style="color:var(--dm)">eventos</div></div>
    </div>
    <div class="chip-row" style="margin-bottom:20px;flex-wrap:wrap">
      <button class="chip ${f==='all'?'act':''}" data-a="lfil" data-v="all">Todos</button>
      ${cats.map(cat=>{const c=CAT[cat]||CAT.file;return`<button class="chip ${f===cat?'act':''}" data-a="lfil" data-v="${cat}">${c.emoji} ${c.lbl}</button>`;}).join('')}
    </div>
    ${filt.length===0?`<div class="card" style="text-align:center;padding:40px 0;color:var(--dm)"><p style="font-size:28px;margin-bottom:10px">📋</p><p>Nenhum evento nesta categoria.</p></div>`:''}
    ${dates.map(date=>`
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap">${relDate(date)}</div>
        <div style="flex:1;height:1px;background:var(--br)"></div>
        <div style="font-size:10px;color:var(--dm)">${byDate[date].length} evento${byDate[date].length!==1?'s':''}</div>
      </div>
      <div class="card" style="padding:6px 16px">
        ${byDate[date].map((log,i)=>{
          const cat=CAT[log.category]||CAT.file;
          const rs=RS[log.role]||RS.cliente;
          const hora=log.ts.split(' ')[1]||'';
          return`<div class="log-row" style="animation:fadeUp .3s ${i*.05}s both">
            <div class="log-icon" style="background:${cat.bg};margin-top:1px">${ic(cat.ico,15,cat.c)}</div>
            <div class="log-line">
              <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px">
                <span class="log-who">${log.user}</span>
                <span class="log-role-pill" style="background:${rs.bg};color:${rs.c}">${log.role}</span>
                <span style="font-size:9px;background:${cat.bg};color:${cat.c};border-radius:4px;padding:1px 6px;font-weight:600">${cat.lbl}</span>
              </div>
              <p class="log-desc">${log.desc}</p>
              <div class="log-meta" style="margin-top:5px">
                ${log.project&&log.project!=='—'?`<span class="log-proj">${ic('folder',9,'currentColor')} ${log.project}</span>`:''}
                <span class="log-ts">${ic('clock',9,'var(--dm)')} ${hora}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

    <div>
      <p style="font-size:15px;font-weight:600;color:var(--tx);font-family:'Instrument Serif',serif">${title}</p>
      <p style="font-size:11px;color:var(--mu)">${sub}</p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    <div><label class="form-lbl">Nome Completo</label><input class="form-inp" id="set-name" value="${u.name}"></div>
    <div><label class="form-lbl">E-mail</label><input class="form-inp" id="set-email" type="email" value="${u.email}"></div>
    <div><label class="form-lbl">Telefone</label><input class="form-inp" id="set-phone" value="${u.phone}"></div>

  ${secHead('lock','Segurança','Gerencie sua senha e acesso')}

  </div>`;

  /* ── EMPRESA (admin only) ── */
  const sCompany=isAdmin?`
  <div id="set-saved-company" class="settings-saved">${ic('check',13,'#16a34a')} Dados da empresa atualizados.</div>
  ${secHead('bld','Configurações da Empresa','Informações globais do portal DARA Studio')}
  <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:20px">
    <!-- Logo upload -->
    <label class="proj-photo-wrap" style="width:80px;height:80px;border-radius:12px" title="Logo da empresa">
      ${cfg.company.logo?`<img src="${cfg.company.logo}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">
        <div class="pph-check">✓</div>`:`
        ${ic('up',18,'var(--dm)')}
        <span class="pph-label" style="font-size:9px">Logo</span>`}
      <input type="file" accept="image/*" style="display:none" data-a="upload-company-logo">
    </label>
    <div style="flex:1">
      <p style="font-size:12px;font-weight:600;color:var(--tx);margin-bottom:3px">Logo Global do Portal</p>
      <p style="font-size:11px;color:var(--mu);line-height:1.55">Esta imagem aparece no topo da sidebar e nos relatórios PDF. Formatos: JPG, PNG, SVG. Tamanho ideal: 200×200px.</p>
      <button class="btn-ghost" style="font-size:11px;padding:5px 12px;margin-top:8px">Remover logo</button>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">

  <div style="padding:14px 18px;background:var(--amb);border:1px solid rgba(217,119,6,.25);border-radius:10px;margin-bottom:18px">
    <p style="font-size:12px;font-weight:600;color:var(--am);margin-bottom:3px">⚠ Zona de perigo</p>
    <p style="font-size:11px;color:var(--mu);margin-bottom:10px">Estas ações são irreversíveis e afetam todos os usuários do portal.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-danger">Redefinir portal para padrões</button>
      <button class="btn-danger">Exportar todos os dados</button>

    <div style="margin-bottom:20px">

    <div class="settings-wrap">

      <!-- Sub-navegação lateral -->
      <div class="settings-nav">

/* ══ LEADS PAGE (admin only) ══ */
function leadsPage(){
  if(S.role!=='admin') return`<div class="page-anim" style="text-align:center;padding:60px 0;color:var(--dm)"><p style="font-size:28px;margin-bottom:10px">🔒</p><p>Acesso restrito a administradores.</p></div>`;

  const f = S.leadFil||'all';
  const ST={
    new:      {lbl:'Novo',       emoji:'New',      c:'#6366f1',bg:'rgba(99,102,241,.1)'},
    contact:  {lbl:'Em Contato', emoji:'Contact',  c:'#2563eb',bg:'rgba(37,99,235,.1)'},
    warm:     {lbl:'Quente',     emoji:'Warm',     c:'#d97706',bg:'rgba(217,119,6,.1)'},
    cold:     {lbl:'Frio',       emoji:'Cold',     c:'#64748b',bg:'rgba(148,163,184,.12)'},
    converted:{lbl:'Convertido', emoji:'Converted',c:'#16a34a',bg:'rgba(22,163,74,.1)'},
  };
  /* emoji map separate so they render reliably */
  const EMOJIS={new:'🆕',contact:'📞',warm:'🔥',cold:'🧊',converted:'✅'};
  const counts={};
  LEADS.forEach(l=>{counts[l.status]=(counts[l.status]||0)+1;});
  const filtered=f==='all'?LEADS:LEADS.filter(l=>l.status===f);
  const waNum=p=>p.replace(/\D/g,'');

  return`<div class="page-anim">
    <div class="sec-header">
      <div>
        <h1 class="page-title">${t('leadsPage')}</h1>
        <p class="page-sub">${LEADS.length} leads · ${LEADS.filter(l=>l.status==='converted').length} convertidos</p>
      </div>
      <button class="btn-primary" style="display:flex;align-items:center;gap:6px">${ic('plus',13,'#fff')} Adicionar Lead</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid fa1" style="margin-bottom:20px">
      ${Object.entries(ST).map(([k,v])=>`
      <div class="kpi" style="cursor:pointer;border-left:3px solid ${f===k?v.c:'transparent'};background:${f===k?'var(--as)':'var(--bg2)'}" data-a="lfil-lead" data-v="${k}">
        <div class="kpi-label" style="color:${v.c}">${EMOJIS[k]||''} ${v.lbl}</div>
        <div class="kpi-val" style="font-size:22px">${counts[k]||0}</div>
      </div>`).join('')}
      <div class="kpi" style="cursor:default;border-left:3px solid var(--br)">
        <div class="kpi-label">📈 Conversão</div>
        <div class="kpi-val" style="color:var(--gn);font-size:22px">${LEADS.length>0?Math.round((counts.converted||0)/LEADS.length*100):0}%</div>
      </div>
    </div>

    <!-- Filter chips -->
    <div class="chip-row" style="margin-bottom:16px;flex-wrap:wrap">
      <button class="chip ${f==='all'?'act':''}" data-a="lfil-lead" data-v="all">Todos (${LEADS.length})</button>
      ${Object.entries(ST).map(([k,v])=>`<button class="chip ${f===k?'act':''}" data-a="lfil-lead" data-v="${k}">${EMOJIS[k]||''} ${v.lbl} (${counts[k]||0})</button>`).join('')}
    </div>

    <!-- TABLE -->
    <div class="card" style="padding:0;overflow:hidden">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Lead</th>
            <th>Empresa</th>
            <th>Interesse</th>
            <th>Budget</th>
            <th>Status</th>
            <th>Contatado</th>
            <th>Entrada</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map((l,i)=>{
            const st=ST[l.status]||ST.new;
            const contacted=S.leadContacted[l.id]||false;
            const initials=l.name.split(' ').map(w=>w[0]).slice(0,2).join('');
            return`<tr>
              <!-- Nome + empresa -->
              <td>
                <div style="display:flex;align-items:center;gap:9px">
                  <div style="width:30px;height:30px;border-radius:50%;background:${st.bg};color:${st.c};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${initials}</div>
                  <div>
                    <p style="font-weight:600;color:var(--tx);font-size:12px">${l.name}</p>
                    <p style="font-size:10px;color:var(--dm)">${l.email}</p>
                  </div>
                </div>
              </td>
              <td style="font-size:12px;color:var(--mu);max-width:140px"><p style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.company}</p></td>
              <td style="font-size:11px;color:var(--tx);max-width:160px"><p style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.projectType}</p></td>
              <td style="font-size:12px;color:var(--gn);font-weight:600;white-space:nowrap">${l.budget}</td>
              <td><span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:${st.bg};color:${st.c};white-space:nowrap">${st.lbl}</span></td>
              <!-- Contacted toggle -->
              <td>
                <div style="display:flex;align-items:center;gap:7px">
                  <button class="lead-tog ${contacted?'on':''}" data-a="toggle-contacted" data-lid="${l.id}" title="${contacted?'Contatado':'Não contatado'}"></button>
                  <span style="font-size:10px;color:${contacted?'var(--gn)':'var(--dm)'}">${contacted?'Sim':'Não'}</span>
                </div>
              </td>
              <td style="font-size:11px;color:var(--dm);white-space:nowrap">${l.entered}</td>
              <td>
                <div style="display:flex;gap:5px">
                  <a href="mailto:${l.email}" title="E-mail" style="width:28px;height:28px;border-radius:7px;border:1px solid var(--cb);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--mu);transition:all .15s" onmouseover="this.style.borderColor='var(--a)';this.style.color='var(--a)'" onmouseout="this.style.borderColor='var(--cb)';this.style.color='var(--mu)'">${ic('mail',12,'currentColor')}</a>

                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM13.025 2C7.496 2 3.024 6.473 3.024 12c0 1.914.509 3.707 1.393 5.256L2 22l4.853-1.387C8.283 21.452 10.102 22 13.025 22c5.525 0 10-4.473 10-9.997C23.025 6.473 18.55 2 13.025 2z"/></svg>
                  </a>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>

  </div>`;

function calendarPage(){
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const m=S.calMonth-1,y=S.calYear;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const isToday=(d)=>today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
  let cells=[];
  for(let i=0;i<firstDay;i++) cells.push(`<div class="cal-day other-month"></div>`);
  for(let d=1;d<=daysInMonth;d++){
    const ev=EVENTS[String(d)];
    const todayCls=isToday(d)?'today':'';
    const evCls=ev?'has-event':'';
    cells.push(`<div class="cal-day ${todayCls} ${evCls}" title="${ev?ev.join(', '):''}">
      <div class="cal-day-num">${d}</div>
      ${ev?`<div class="cal-event-dot ${d>=28?'red':d>=20?'':''}"></div>`:''}
    </div>`);
  }
  /* Analytics data */
  const deliveries=[
    {lbl:'Semana 1',v:1,max:4},{lbl:'Semana 2',v:3,max:4},
    {lbl:'Semana 3',v:2,max:4},{lbl:'Semana 4',v:4,max:4},
  ];
  const meetings={agendadas:6,realizadas:4};

  return`<div class="page-anim">
    <h1 class="page-title">${t('calendarPage')}</h1>
    <p class="page-sub">${t('calendarSub')}</p>

    <!-- Analytics -->
    <div class="cal-analytics fa1">
      <!-- Entregas do mês -->
      <div class="cal-stat-card">
        <p class="cal-stat-label">${ic('folder',10,'var(--dm)')} Entregas de Projetos</p>
        <p class="cal-stat-val">10</p>
        ${deliveries.map(d=>`<div class="cal-bar-row">
          <span class="cal-bar-lbl">${d.lbl}</span>
          <div class="cal-bar-bg"><div class="cal-bar-fill" style="width:${Math.round(d.v/d.max*100)}%;background:linear-gradient(90deg,var(--a),#a78bfa)"></div></div>
          <span style="font-size:10px;color:var(--dm);min-width:14px;text-align:right">${d.v}</span>
        </div>`).join('')}
      </div>

      <!-- Reuniões agendadas vs realizadas -->
      <div class="cal-stat-card">
        <p class="cal-stat-label">${ic('cal',10,'var(--dm)')} Reuniões do Mês</p>
        <div style="display:flex;gap:16px;margin-bottom:14px">
          <div>
            <p style="font-family:'Instrument Serif',serif;font-size:22px;color:var(--a)">${meetings.agendadas}</p>
            <p style="font-size:10px;color:var(--dm)">Agendadas</p>
          </div>
          <div style="width:1px;background:var(--br)"></div>
          <div>
            <p style="font-family:'Instrument Serif',serif;font-size:22px;color:var(--gn)">${meetings.realizadas}</p>
            <p style="font-size:10px;color:var(--dm)">Realizadas</p>
          </div>
        </div>
        <p style="font-size:10px;color:var(--dm);margin-bottom:5px">Taxa de realização</p>
        <div class="cal-prog-bg"><div class="cal-prog-fill" style="width:${Math.round(meetings.realizadas/meetings.agendadas*100)}%;background:linear-gradient(90deg,var(--gn),#4ade80)"></div></div>
        <p style="font-size:11px;color:var(--gn);font-weight:600;margin-top:5px">${Math.round(meetings.realizadas/meetings.agendadas*100)}% concluídas</p>
      </div>

      <!-- Projetos ativos -->
      <div class="cal-stat-card">
        <p class="cal-stat-label">${ic('bld',10,'var(--dm)')} Projetos Ativos</p>
        <p class="cal-stat-val">${ALL_PROJECTS.filter(p=>p.status!=='completed').length}</p>
        ${ALL_PROJECTS.filter(p=>p.status!=='completed').map(p=>`<div class="cal-bar-row">
          <span class="cal-bar-lbl" style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.code}</span>
          <div class="cal-bar-bg"><div class="cal-bar-fill" style="width:${p.progress}%;background:linear-gradient(90deg,${p.status==='attention'?'#d97706,#fbbf24':'var(--a),#a78bfa'})"></div></div>
          <span style="font-size:10px;color:var(--dm);min-width:28px;text-align:right">${p.progress}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start">
      <div class="card fa1">
        <div class="cal-nav" style="margin-bottom:16px">
          <button class="cal-nav-btn" data-a="cal-prev">${ic('chevl',14,'currentColor')}</button>
          <h3 style="font-family:'Instrument Serif',serif;font-size:17px;font-weight:400">${months[m]} ${y}</h3>
