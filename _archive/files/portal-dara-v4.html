.acc-table tbody tr:last-child{border-bottom:none}
.acc-table tbody tr:hover td{background:var(--as)}
.acc-table td{padding:13px 18px;vertical-align:middle}

/* Client avatar cell */
.acc-client-cell{display:flex;align-items:center;gap:11px}
.acc-av{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
  position:relative;
}
.acc-online-dot{
  position:absolute;bottom:-2px;right:-2px;
  width:9px;height:9px;border-radius:50%;
  border:2px solid var(--bg2);
}

/* Action buttons — ghost */
.acc-actions{display:flex;align-items:center;gap:4px}
.acc-btn{
  height:32px;padding:0 10px;border-radius:8px;
  border:1.5px solid var(--cb);background:transparent;
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;cursor:pointer;
  color:var(--mu);transition:all .17s;font-family:'DM Sans',inherit;
  white-space:nowrap;
}
.acc-btn:hover{border-color:var(--br2);color:var(--tx);background:var(--as)}

/* Reset password — indigo */
.acc-btn.reset:hover{
  border-color:rgba(99,102,241,.4);
  color:#6366f1;background:rgba(99,102,241,.07);
}
/* Impersonate — amber, elevated */
.acc-btn.impersonate{
  border-color:rgba(217,119,6,.3);
  color:#d97706;background:rgba(217,119,6,.06);
}
.acc-btn.impersonate:hover{
  border-color:#d97706;
  background:rgba(217,119,6,.12);
}
/* Revoke — red */
.acc-btn.revoke:hover{
  border-color:rgba(220,38,38,.35);
  color:#dc2626;background:rgba(220,38,38,.06);
}
/* Restore — green */
.acc-btn.restore{
  border-color:rgba(22,163,74,.3);
  color:#16a34a;background:rgba(22,163,74,.06);
}
.acc-btn.restore:hover{
  border-color:#16a34a;background:rgba(22,163,74,.12);
}
/* Resend invite */
.acc-btn.resend:hover{
  border-color:rgba(99,102,241,.4);
  color:#6366f1;background:rgba(99,102,241,.06);
}

/* Invite pending row */
.acc-table tbody tr.invited-row td{
  background:rgba(99,102,241,.025);
}
.acc-table tbody tr.blocked-row td{
  background:rgba(220,38,38,.025);
  opacity:.75;
}

/* Toast-style action feedback (handled via toast fn) */

/* Impersonate banner */
.acc-impersonate-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:99999;
  background:linear-gradient(90deg,#d97706,#f59e0b);
  padding:12px 24px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 -4px 24px rgba(0,0,0,.18);
  animation:fadeUp .3s both;
}
.acc-imp-text{
  font-size:13px;font-weight:600;color:#fff;flex:1;
}
.acc-imp-exit{
  padding:7px 18px;border-radius:9px;border:2px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .18s;font-family:'DM Sans',inherit;
}
.acc-imp-exit:hover{background:rgba(255,255,255,.28);border-color:#fff}

/* Last login cell */
.acc-last-login{font-size:12px;color:var(--tx)}
.acc-last-login.never{color:var(--dm);font-style:italic}
.acc-since{font-size:10px;color:var(--dm);margin-top:2px}

/* ══ PROJECT STATUS BAR ══ */
.psb-wrap{
  display:flex;align-items:center;gap:0;
  background:var(--lav2);border:1px solid var(--cb);
  border-radius:14px;padding:5px;
  flex-wrap:wrap;gap:4px;
  margin-bottom:12px;
}
.psb-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:10px;
  font-size:11px;font-weight:600;
  border:1.5px solid transparent;
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',inherit;
  color:var(--dm);background:transparent;
  user-select:none;flex:1;justify-content:center;
  white-space:nowrap;min-width:0;
}
.psb-pill:hover{
  background:var(--bg2);color:var(--tx);
}
.psb-dot{
  width:7px;height:7px;border-radius:50%;
  flex-shrink:0;background:var(--dm);
  transition:background .2s;
}

/* ── Active variants — matte fills ── */

/* Aguardando Cliente — âmbar */
.psb-pill.waiting.act{
  background:#fffbeb;border-color:#fcd34d;color:#92400e;
}
.psb-pill.waiting.act .psb-dot{background:#d97706;animation:pulse 2s infinite}
.psb-pill.waiting:not(.act):hover{background:rgba(217,119,6,.06)}

/* Em Andamento — índigo */
.psb-pill.on_track.act{
  background:#eef2ff;border-color:#a5b4fc;color:#3730a3;
}
.psb-pill.on_track.act .psb-dot{background:#6366f1;animation:pulse 2.5s infinite}
.psb-pill.on_track:not(.act):hover{background:rgba(99,102,241,.06)}

/* Aguardando Revisão — laranja */
.psb-pill.reviewing.act{
  background:#fff7ed;border-color:#fdba74;color:#9a3412;
}
.psb-pill.reviewing.act .psb-dot{background:#ea580c;animation:pulse 2s infinite}
.psb-pill.reviewing:not(.act):hover{background:rgba(234,88,12,.06)}

/* Atenção / Atrasado — vermelho */
.psb-pill.attention.act{
  background:#fef2f2;border-color:#fca5a5;color:#991b1b;
}
.psb-pill.attention.act .psb-dot{background:#dc2626;animation:pulse 1.4s infinite}
.psb-pill.attention:not(.act):hover{background:rgba(220,38,38,.06)}

/* Pausado — cinza azulado */
.psb-pill.paused.act{
  background:#f0f9ff;border-color:#93c5fd;color:#1e3a5f;
}
.psb-pill.paused.act .psb-dot{background:#3b82f6}
.psb-pill.paused:not(.act):hover{background:rgba(59,130,246,.06)}

/* Entregue — esmeralda */
.psb-pill.completed.act{
  background:#ecfdf5;border-color:#6ee7b7;color:#065f46;
}
.psb-pill.completed.act .psb-dot{background:#10b981}
.psb-pill.completed:not(.act):hover{background:rgba(16,185,129,.06)}

/* Status label below pill bar */
.psb-current-label{
  display:flex;align-items:center;gap:6px;
  font-size:10px;color:var(--dm);
  padding:0 2px;margin-bottom:14px;
}

/* ══ PROJECT FINANCIALS VIEW ══ */
.fin-section-divider{
  display:flex;align-items:center;gap:10px;
  margin:20px 0 14px;
}
.fin-section-divider-line{
  flex:1;height:1px;background:var(--cb);
}
.fin-section-divider-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dm);
  padding:0 4px;white-space:nowrap;
}

/* Admin tools grid */
.fin-admin-tools{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;
}
@media(max-width:640px){.fin-admin-tools{grid-template-columns:1fr}}

/* ══ DASHBOARD IMPROVEMENTS ══ */

/* Current date chip */
.dash-date-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--mu);
  padding:3px 10px;border-radius:20px;
  background:var(--lav2);border:1px solid var(--cb);
}

/* KPI card urgency state */
.kpi.urgent .kpi-val{animation:pulse 2s infinite}

/* Deadline pill in table */
.dash-dl-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:2px 8px;
  border-radius:20px;white-space:nowrap;
}
.dash-dl-pill.overdue{background:rgba(220,38,38,.1);color:#991b1b}
.dash-dl-pill.soon   {background:rgba(217,119,6,.1); color:#92400e}
.dash-dl-pill.ok     {background:rgba(16,185,129,.08);color:#065f46}
.dash-dl-pill.none   {color:var(--dm);background:transparent}

/* Attention row highlight */
.data-table tbody tr.row-attention td{background:rgba(220,38,38,.03)}
.data-table tbody tr.row-attention:hover td{background:rgba(220,38,38,.06)}
/* == REDIRECT SCREEN == */
#redirect-screen{
  position:fixed;inset:0;z-index:99999;
  background:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;opacity:0;animation:rdFadeIn .4s cubic-bezier(.22,.68,0,1.15) forwards;
}
@keyframes rdFadeIn{to{opacity:1}}
@keyframes rdFadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
#redirect-screen.exiting{animation:rdFadeOut .45s cubic-bezier(.4,0,.2,1) forwards}

/* Circle ring - indigo palette */
.rd-ring{
  width:88px;height:88px;border-radius:50%;
  border:2px solid #6366f1;
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:32px;
  animation:rdRingPop .5s .15s cubic-bezier(.22,.68,0,1.15) both;
  box-shadow:0 0 0 0 rgba(99,102,241,0);
}
@keyframes rdRingPop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}

/* Outer ping ring */
.rd-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(99,102,241,.25);
  animation:rdPingOuter 2.8s 1.1s ease-out infinite;
}
@keyframes rdPingOuter{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}

/* SVG check icon */
.rd-check-svg{
  animation:rdCheckPop .35s .5s cubic-bezier(.22,.68,0,1.15) both;
  opacity:0;
}
@keyframes rdCheckPop{from{opacity:0;transform:scale(.4) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* Welcome text */
.rd-welcome{
  font-family:'Instrument Serif',serif;font-size:24px;font-weight:400;
  color:#fff;text-align:center;margin-bottom:10px;letter-spacing:.01em;
  animation:rdSlideUp .45s .6s cubic-bezier(.22,.68,0,1.15) both;
}
@keyframes rdSlideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Subtitle */
.rd-subtitle{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.32);
  animation:rdSlideUp .45s .78s cubic-bezier(.22,.68,0,1.15) both;
  display:flex;align-items:center;gap:5px;
}
.rd-subtitle em{
  color:#818cf8;font-style:normal;font-weight:600;font-size:11px;
  animation:rdDotPulse 1.5s .9s ease-in-out infinite;
}
@keyframes rdDotPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* Animated dots */
.rd-dots-row{
  display:flex;gap:5px;margin-top:18px;
  animation:rdSlideUp .45s .9s cubic-bezier(.22,.68,0,1.15) both;
}
.rd-dot-bullet{
  width:5px;height:5px;border-radius:50%;background:#6366f1;
  animation:rdBulletBounce 1.2s infinite ease-in-out;
}
.rd-dot-bullet:nth-child(1){animation-delay:0s}
.rd-dot-bullet:nth-child(2){animation-delay:.18s;background:#818cf8}
.rd-dot-bullet:nth-child(3){animation-delay:.36s;background:#a78bfa}
@keyframes rdBulletBounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
/* ── Lang toggle ── */
.lang-btn{background:none;border:1.5px solid var(--br);border-radius:6px;padding:3px 7px;font-size:10px;font-weight:600;color:var(--mu);cursor:pointer;font-family:'DM Sans',inherit;transition:all .18s;letter-spacing:.04em}
.lang-btn:hover{border-color:var(--a);color:var(--a)}
.lang-btn.act{background:var(--a);border-color:var(--a);color:#fff}




/* ══ SETTINGS PAGE ══ */
.settings-wrap{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start}
@media(max-width:640px){.settings-wrap{grid-template-columns:1fr}}
.settings-nav{background:var(--bg2);border:1px solid var(--cb);border-radius:13px;padding:8px;position:sticky;top:80px}
.settings-nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;
  width:100%;text-align:left;background:none;border:none;cursor:pointer;
  font-family:'DM Sans',inherit;font-size:13px;color:var(--mu);transition:all .18s;
}
.settings-nav-item:hover{background:var(--lav2);color:var(--tx)}
.settings-nav-item.act{background:var(--as);color:var(--a);font-weight:600}
.settings-nav-item.act svg{stroke:var(--a)}
.settings-section{display:none}
.settings-section.active{display:block}

/* Toggle switch */
.tog-wrap{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--cb)}
.tog-wrap:last-of-type{border-bottom:none}
.tog-info p:first-child{font-size:13px;font-weight:500;color:var(--tx)}
.tog-info p:last-child{font-size:11px;color:var(--mu);margin-top:2px}
.tog{width:42px;height:24px;background:var(--lav2);border:1.5px solid var(--br);border-radius:12px;cursor:pointer;position:relative;transition:all .25s;flex-shrink:0;padding:0;display:inline-block}
.tog::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.tog.on{background:var(--a);border-color:var(--a)}
.tog.on::after{transform:translateX(18px)}

/* Password strength bar */
.pw-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s}
.pw-strength.weak  {background:#dc2626;width:33%}
.pw-strength.medium{background:#d97706;width:66%}
.pw-strength.strong{background:#16a34a;width:100%}

/* Saved toast (inline) */
.settings-saved{
  display:none;align-items:center;gap:7px;
  padding:8px 14px;background:var(--gnb);border:1px solid rgba(22,163,74,.2);
  border-radius:8px;font-size:12px;color:var(--gn);font-weight:500;
  animation:fadeUp .3s both;margin-bottom:12px;
}
.settings-saved.show{display:flex}
/* ══ LEADS PAGE ══ */
.lead-card{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  padding:18px 20px;transition:all .22s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;gap:0;
}
.lead-card:hover{border-color:rgba(99,102,241,.28);transform:translateY(-2px);box-shadow:0 6px 22px rgba(99,102,241,.1)}
.lead-status-new      {background:rgba(99,102,241,.12);color:#6366f1}
.lead-status-contact  {background:rgba(37,99,235,.12); color:#2563eb}
.lead-status-cold     {background:rgba(148,163,184,.14);color:#64748b}
.lead-status-warm     {background:rgba(217,119,6,.12); color:#d97706}
.lead-status-converted{background:rgba(22,163,74,.12); color:#16a34a}
.lead-action-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;border:1.5px solid var(--br);
  background:var(--bg2);color:var(--mu);font-size:11px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .18s;
  text-decoration:none;white-space:nowrap;
}
.lead-action-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.lead-action-email:hover{border-color:var(--a);color:var(--a);background:var(--as)}
.lead-action-wa:hover  {border-color:#25d366;color:#25d366;background:rgba(37,211,102,.08)}
.lead-action-sms:hover {border-color:var(--am);color:var(--am);background:var(--amb)}
.lead-score{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid transparent;
}
.leads-kanban{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.leads-col-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-radius:10px;margin-bottom:10px;
}
/* ══ SKELETON ══ */
.skel{background:linear-gradient(90deg,var(--lav2) 25%,var(--lav) 50%,var(--lav2) 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;border-radius:6px}

/* ══ CHAT ══ */
.chat-box{background:var(--bg2);border:1px solid var(--cb);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;height:420px}
.chat-head{padding:12px 17px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px}
.chat-body{flex:1;overflow-y:auto;padding:14px 17px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:9px;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.msg-av{width:27px;height:27px;border-radius:50%;border:1px solid var(--br);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--lav2)}
.msg-bbl{max-width:72%}
.msg-txt{padding:9px 13px;border-radius:11px;font-size:12px;line-height:1.55;color:var(--tx)}
.msg.me .msg-txt{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(167,139,250,.08));border:1px solid rgba(99,102,241,.2);border-radius:11px 11px 3px 11px}
.msg:not(.me) .msg-txt{background:var(--lav);border:1px solid var(--br);border-radius:11px 11px 11px 3px}
.msg-meta{font-size:10px;color:var(--dm);margin-top:3px}
.msg.me .msg-meta{text-align:right}
.chat-foot{border-top:1px solid var(--br);padding:11px 14px;display:flex;gap:8px;align-items:center}
.chat-inp{flex:1;background:var(--lav);border:1.5px solid var(--br);border-radius:9px;padding:8px 13px;font-size:12px;color:var(--tx);font-family:'DM Sans',inherit;outline:none;transition:all .2s}
.chat-inp:focus{border-color:var(--a);background:var(--bg2)}
.send-btn{background:var(--a);border:none;border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.send-btn:hover{background:#4f46e5;transform:scale(1.06)}
.chat-file-btn{background:none;border:1.5px solid var(--br);border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;color:var(--mu)}
.chat-file-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}

/* ══ UPLOAD ══ */
.upload-lbl{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--tx);border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:600;color:var(--bg);cursor:pointer;width:100%;font-family:'DM Sans',inherit;transition:all .2s}
.upload-lbl:hover{opacity:.85}

/* ══ PROFILE ══ */
.profile-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--a),#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:22px;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(99,102,241,.3)}

/* ══ ADMIN TABLE ══ */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;color:var(--dm);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--br);background:var(--lav)}
.data-table td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.04);color:var(--tx);vertical-align:middle}
[data-theme=dark] .data-table td{border-bottom-color:rgba(255,255,255,.05)}
.data-table tr:hover td{background:var(--as)}
.data-table .actions{display:flex;gap:6px}





/* ══ NOTIFICATIONS PAGE ══ */
.notif-list-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 16px;border-radius:12px;border:1px solid var(--cb);
  background:var(--bg2);margin-bottom:8px;cursor:pointer;
  transition:all .18s;
}
.notif-list-item:hover{border-color:var(--br2);background:var(--as)}
.notif-list-item.unread{border-left:3px solid var(--a);background:var(--lav)}
.notif-list-item.unread:hover{background:var(--as)}
.notif-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--a);flex-shrink:0;margin-top:4px}
.notif-read-dot{width:8px;height:8px;border-radius:50%;background:var(--cb);border:1.5px solid var(--br);flex-shrink:0;margin-top:4px}
.notif-list-body{flex:1;min-width:0}
.notif-list-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.notif-list-body-txt{font-size:11px;color:var(--mu);line-height:1.5}
.notif-list-ts{font-size:10px;color:var(--dm);white-space:nowrap;flex-shrink:0;margin-top:2px}

/* ══ LEADS TABLE ══ */
.leads-table{width:100%;border-collapse:collapse;font-size:12px}
.leads-table th{text-align:left;padding:10px 12px;font-size:10px;font-weight:700;
  color:var(--dm);text-transform:uppercase;letter-spacing:.06em;
  border-bottom:2px solid var(--cb);white-space:nowrap}
.leads-table td{padding:11px 12px;border-bottom:1px solid var(--cb);vertical-align:middle}
.leads-table tr:hover td{background:var(--as)}
.leads-table tr:last-child td{border-bottom:none}
.lead-tog{
  width:42px;height:24px;border-radius:12px;background:var(--lav2);
  border:1.5px solid var(--br);cursor:pointer;position:relative;
  transition:all .25s;padding:0;flex-shrink:0;display:inline-block;
}
.lead-tog::after{content:'';position:absolute;left:2px;top:2px;
  width:16px;height:16px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.lead-tog.on{background:var(--a);border-color:var(--a)}
.lead-tog.on::after{transform:translateX(18px)}

/* ══ CALENDAR ANALYTICS ══ */
.cal-analytics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.cal-stat-card{background:var(--bg2);border:1px solid var(--cb);border-radius:13px;padding:16px}
.cal-stat-label{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.cal-stat-val{font-family:'Instrument Serif',serif;font-size:24px;color:var(--tx);margin-bottom:8px}
.cal-prog-bg{height:6px;background:var(--lav2);border-radius:3px;overflow:hidden}
.cal-prog-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,.68,0,1.15)}
.cal-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cal-bar-lbl{font-size:11px;color:var(--mu);min-width:60px}
.cal-bar-bg{flex:1;height:8px;background:var(--lav2);border-radius:4px;overflow:hidden}
.cal-bar-fill{height:100%;border-radius:4px}

/* ══ CHAT WHATSAPP STYLE ══ */
.wa-chat-wrap{display:flex;flex-direction:column;height:480px}
.wa-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--cb);flex-shrink:0;
}
.wa-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--a),#a78bfa);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;flex-shrink:0}
.wa-name{font-size:13px;font-weight:600;color:var(--tx)}
.wa-status{font-size:11px;color:var(--dm)}
.wa-status.online{color:#16a34a}
.wa-status.away{color:#d97706}
.wa-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;background:var(--lav)}
.wa-bubble{max-width:72%;padding:8px 12px;border-radius:12px;position:relative}
.wa-bubble.them{background:var(--bg2);border:1px solid var(--cb);border-top-left-radius:4px;align-self:flex-start}
.wa-bubble.me{background:var(--a);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.wa-bubble.me .wa-msg-txt{color:#fff}
.wa-msg-txt{font-size:13px;color:var(--tx);line-height:1.5}
.wa-msg-meta{font-size:10px;color:rgba(255,255,255,.6);text-align:right;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.wa-bubble.them .wa-msg-meta{color:var(--dm);justify-content:flex-end}
.wa-check{color:rgba(255,255,255,.6)}
.wa-check.read{color:#a5f3fc}
.wa-foot{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--cb);background:var(--bg2);flex-shrink:0}
.wa-inp{flex:1;border:1.5px solid var(--cb);border-radius:22px;padding:8px 16px;font-size:13px;
  color:var(--tx);background:var(--lav);font-family:'DM Sans',inherit;outline:none;transition:border-color .18s}
.wa-inp:focus{border-color:var(--a)}
.wa-send{width:38px;height:38px;border-radius:50%;background:var(--a);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.wa-send:hover{background:#4f46e5}

/* ══ COMPANY PAGE ══ */
.co-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.co-field-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--cb)}
.co-field-row:last-child{border-bottom:none}
.co-field-ico{width:30px;height:30px;border-radius:8px;background:var(--as);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.co-field-lbl{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.co-field-val{font-size:13px;color:var(--tx)}
/* ══ DRAWINGS / FILES TAB ══ */
.dfiles-section{margin-bottom:22px}
.dfiles-rev-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 0 8px;border-bottom:1px solid var(--cb);margin-bottom:2px;
}
.dfiles-rev-tag{font-size:11px;font-weight:700;color:var(--tx)}
.dfile-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:10px;border:1px solid var(--cb);
  background:var(--bg2);margin-bottom:6px;transition:all .18s;
}
.dfile-row:hover{border-color:var(--br2);background:var(--as)}
.dfile-ico{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.dfile-ico.pdf {background:rgba(220,38,38,.08)}
.dfile-ico.img {background:rgba(37,99,235,.08)}
.dfile-ico.dwg {background:rgba(217,119,6,.08)}
.dfile-ico.zip {background:rgba(99,102,241,.08)}
.dfile-meta{flex:1;min-width:0}
.dfile-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dfile-info{font-size:11px;color:var(--dm);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dfile-date-pill{
  font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px;
  background:var(--lav2);color:var(--mu);border:1px solid var(--cb);
}
.dfile-viewed{font-size:10px;color:var(--gn)}
.dfile-actions{display:flex;gap:6px;flex-shrink:0}
.dfile-btn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--cb);
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;
}
.dfile-btn:hover{border-color:var(--a);background:var(--as)}
.dfile-btn.dl:hover{border-color:var(--gn);background:rgba(22,163,74,.06)}
.dfile-upload-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:10px;
  border:1.5px dashed var(--br);background:var(--lav);
  margin-bottom:8px;cursor:pointer;transition:all .18s;
}
.dfile-upload-row:hover{border-color:var(--a);background:var(--as)}

/* ══ SITE UPDATES (redesign) ══ */
.su-compose{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  padding:18px;margin-bottom:16px;
}
.su-compose textarea{
  width:100%;border:1px solid var(--cb);border-radius:10px;
  padding:10px 14px;font-size:13px;color:var(--tx);
  background:var(--lav);font-family:'DM Sans',inherit;
  resize:vertical;min-height:80px;outline:none;
  box-sizing:border-box;transition:border-color .18s;
}
.su-compose textarea:focus{border-color:var(--a)}
.su-compose-foot{display:flex;gap:10px;margin-top:10px;align-items:center}
.su-add-photo-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px;border-radius:10px;border:1.5px dashed var(--br);
  background:var(--bg2);color:var(--mu);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .18s;font-family:'DM Sans',inherit;
}
.su-add-photo-btn:hover{border-color:var(--a);color:var(--a);background:var(--as)}
.su-publish-btn{
  padding:10px 22px;border-radius:10px;border:none;
  background:var(--a);color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .18s;
  display:flex;align-items:center;gap:7px;letter-spacing:.02em;
}
.su-publish-btn:hover{background:var(--a3);transform:translateY(-1px)}
.su-update-item{
  background:var(--bg2);border:1px solid var(--cb);border-radius:12px;
  padding:16px 18px;margin-bottom:10px;transition:border-color .18s;
}
.su-update-item:hover{border-color:var(--br2)}
.su-update-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.su-update-date{font-size:12px;color:var(--mu);display:flex;align-items:center;gap:5px}
.su-update-fotos{font-size:11px;font-weight:600;color:var(--dm);background:var(--lav2);border-radius:5px;padding:1px 7px}
.su-update-text{font-size:13px;color:var(--tx);line-height:1.6}
/* ══ ROADMAP GRID CARDS ══ */
.rm-progress-bar-wrap{height:8px;background:var(--lav2);border-radius:4px;overflow:hidden;margin:10px 0 4px}
.rm-progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a),#a78bfa);transition:width .9s cubic-bezier(.22,.68,0,1.15)}
.rm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.rm-card{
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  overflow:hidden;transition:box-shadow .2s;
}
.rm-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.rm-card-head{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;transition:border-color .2s;
}
.rm-card.open .rm-card-head{border-bottom-color:var(--cb)}
.rm-card-ico{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.rm-card-title{font-size:13px;font-weight:600;color:var(--tx)}
.rm-card-count{font-size:11px;color:var(--dm);margin-left:auto;padding-right:4px}
.rm-chevron{color:var(--dm);transition:transform .22s;flex-shrink:0}
.rm-card.open .rm-chevron{transform:rotate(180deg)}

/* Status badges */
.rm-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;letter-spacing:.02em;white-space:nowrap}
.rm-badge.done    {background:rgba(22,163,74,.1); color:#16a34a}
.rm-badge.active  {background:rgba(217,119,6,.1); color:#d97706}
.rm-badge.pending {background:var(--lav2);         color:var(--dm)}
.rm-badge.final   {background:rgba(99,102,241,.1); color:#6366f1}
.rm-badge.extra   {background:rgba(217,119,6,.12); color:#d97706}

/* Sub-steps */
.rm-steps{padding:0 0 8px}
.rm-step{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;border-bottom:1px solid var(--cb);
  transition:background .15s;
}
.rm-step:last-child{border-bottom:none}
.rm-step:hover{background:var(--as)}
.rm-step-ico{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--lav2);border:1px solid var(--cb);
}
.rm-step-lbl{font-size:12px;color:var(--tx);flex:1}
.rm-step-lbl.dim{color:var(--dm)}
.rm-step-tag{font-size:10px;color:var(--dm)}
.rm-step-check{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;
}
.rm-step-check.done{background:rgba(22,163,74,.12);color:#16a34a}
.rm-step-check.dim {background:var(--lav2);color:var(--dm)}

/* Upload / download row inside step */
.rm-step-action{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px 10px;
  border-top:1px solid var(--cb);background:var(--lav);
}
.rm-step-action label,
.rm-step-action button{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .18s;border:none;
}
.rm-upload-btn{background:var(--a);color:#fff}
.rm-upload-btn:hover{background:#4f46e5}
.rm-dl-btn{background:var(--bg2);color:var(--a);border:1.5px solid var(--br)!important}
.rm-dl-btn:hover{background:var(--as)}
.rm-viewed-pill{
  font-size:10px;color:var(--gn);background:var(--gnb);
  border:1px solid rgba(22,163,74,.2);border-radius:6px;
  padding:3px 8px;display:inline-flex;align-items:center;gap:4px;
  margin-left:auto;
}
.rm-waiting-pill{font-size:10px;color:var(--am);background:var(--amb);border-radius:6px;padding:3px 8px;margin-left:auto}

/* Finalização card (star icon) */
.rm-card.final-card .rm-card-ico{background:rgba(99,102,241,.1)}

/* Extra add card */
.rm-add-card{
  background:transparent;border:2px dashed var(--am);border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:28px 20px;cursor:pointer;transition:all .2s;min-height:100px;
}
.rm-add-card:hover{background:var(--amb);border-style:solid}

/* ══ ROADMAP TIMELINE ══ */
.road-wrap{position:relative;padding-left:52px}
.road-wrap::before{
  content:'';position:absolute;left:19px;top:10px;bottom:10px;
  width:2px;border-radius:2px;
  background:linear-gradient(to bottom,var(--a) 0%,var(--br) 60%,transparent 100%);
}
.road-node{
  position:relative;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--cb);border-radius:14px;
  padding:16px 18px;transition:all .2s;
}
.road-node.active{border-color:var(--a);box-shadow:0 0 0 3px var(--as),0 4px 16px rgba(99,102,241,.12)}
.road-node.completed{border-color:rgba(22,163,74,.25)}
.road-node.pending{opacity:.65}
.road-node:hover{transform:translateX(2px)}
.road-dot{
  position:absolute;left:-41px;top:18px;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--br);background:var(--bg2);z-index:1;
  transition:all .25s;
}
.road-dot.done{background:var(--gn);border-color:var(--gn)}
.road-dot.active-dot{background:var(--a);border-color:var(--a);animation:glowPulse 2s infinite;box-shadow:0 0 0 4px var(--as)}
.road-dot.extra{background:var(--am);border-color:var(--am)}
.road-phase{font-family:monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.05em}
.road-phase.done      {background:rgba(22,163,74,.1);color:var(--gn)}
.road-phase.active    {background:var(--as);color:var(--a)}
.road-phase.pending   {background:var(--lav2);color:var(--dm)}
.road-phase.extra-tag {background:rgba(217,119,6,.12);color:var(--am)}
.road-file-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:9px;border:1.5px solid var(--br);
  background:var(--bg2);color:var(--mu);font-size:11px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .18s;
}
.road-file-btn:hover{border-color:var(--a);color:var(--a);background:var(--as);transform:translateY(-1px)}
.road-file-btn.upload{background:var(--a);border-color:var(--a);color:#fff}
.road-file-btn.upload:hover{background:#4f46e5;transform:translateY(-1px)}
.road-viewed-badge{
  font-size:10px;color:var(--gn);background:var(--gnb);
  border:1px solid rgba(22,163,74,.2);border-radius:6px;
  padding:3px 8px;display:inline-flex;align-items:center;gap:5px;
}
.road-extra-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9px;border:2px dashed var(--am);
  background:var(--amb);color:var(--am);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s;width:100%;justify-content:center;
}
.road-extra-btn:hover{background:rgba(217,119,6,.18);border-style:solid;transform:translateY(-1px)}
/* ══ CALENDAR ══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px}
.cal-day-hdr{text-align:center;font-size:10px;font-weight:600;color:var(--dm);padding:4px 0;letter-spacing:.05em}
.cal-day{min-height:40px;border-radius:8px;padding:4px;font-size:11px;color:var(--mu);transition:background .15s;cursor:default;position:relative}
.cal-day.today{background:var(--as);color:var(--a);font-weight:700}
.cal-day.has-event{background:rgba(99,102,241,.06);cursor:pointer}
.cal-day.has-event:hover{background:var(--as)}
.cal-event-dot{width:5px;height:5px;border-radius:50%;background:var(--a);margin:2px auto 0}
.cal-event-dot.red{background:var(--rd)}
.cal-event-dot.green{background:var(--gn)}

function dashAdmin(){
  /* ── User ── */
  var u     = USERS_MAP[S.role];
  var fname = u&&u.name ? u.name.split(' ')[0] : 'Admin';

  /* ── Dynamic date ── */
  var now   = new Date();
  var weekdays = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  var months   = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var dateStr  = weekdays[now.getDay()]+', '+now.getDate()+' de '+months[now.getMonth()];

  /* ── KPI calculations ── */
  var total   = ALL_PROJECTS.length;
  var active  = ALL_PROJECTS.filter(function(p){return p.status!=='completed';}).length;
  var revenue = INVOICES.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0);
  var pending = INVOICES.filter(function(i){return i.status==='pending';}).reduce(function(s,i){return s+i.amount;},0);

  /* ── NEW: Leads + Tickets KPIs ── */
  var newLeads   = (typeof LEADS!=='undefined') ? LEADS.filter(function(l){return !l.contacted;}).length : 3;
  var openTkts   = 2; /* mock: would come from S.tickets in a real app */
  var urgentKpi  = openTkts + newLeads; /* combined actionable number */

  /* ── Table: active projects (non-completed), max 5, sorted by urgency ── */
  var STATUS_ORDER = {attention:0, waiting:1, reviewing:1, on_track:2, paused:3, completed:99};
  var activeProjs = ALL_PROJECTS
    .filter(function(p){return p.status!=='completed';})
    .sort(function(a,b){
      return (STATUS_ORDER[a.status]||5) - (STATUS_ORDER[b.status]||5);
    })
    .slice(0,5);

  /* ── Deadline urgency helper ── */
  function deadlinePill(due){
    if(!due) return '<span class="dash-dl-pill none">—</span>';
    var parts = due.split('/');
    var dt;
    if(parts.length===3) dt = new Date(parts[2], parts[1]-1, parts[0]);
    else if(due.includes('-')) dt = new Date(due);
    else return '<span class="dash-dl-pill none">'+due+'</span>';
    if(isNaN(dt)) return '<span class="dash-dl-pill none">'+due+'</span>';
    var diff = Math.ceil((dt - now) / (1000*60*60*24));
    var display = parts.length===3 ? due : due.split('-').reverse().join('/');
    if(diff < 0)  return '<span class="dash-dl-pill overdue">⚠ '+display+'</span>';
    if(diff <= 14) return '<span class="dash-dl-pill soon">'+display+'</span>';
    return '<span class="dash-dl-pill ok">'+display+'</span>';
  }

  /* ── Dynamic alerts — based on real data ── */
  var alerts = [];
  /* Attention projects */
  ALL_PROJECTS.filter(function(p){return p.status==='attention';}).forEach(function(p){
    alerts.push({ico:'warn',color:'#dc2626',text:p.address+' requer atenção imediata',sub:'Status: Atenção — '+( p.pending||'verificar etapa atual')});
  });
  /* Waiting projects */
  ALL_PROJECTS.filter(function(p){return p.status==='waiting';}).forEach(function(p){
    alerts.push({ico:'warn',color:'#d97706',text:p.address+' aguardando o cliente',sub:p.pending||'Bola com o cliente'});
  });
  /* Overdue invoices */
  var overdueInv = INVOICES.filter(function(i){return i.status==='pending';});

    alerts.push({ico:'rcpt',color:'#dc2626',text:overdueInv.length+' fatura'+(overdueInv.length>1?'s':'')+' pendente'+(overdueInv.length>1?'s':''),sub:'Total: '+fmt(overdueInv.reduce(function(s,i){return s+i.amount;},0))});
  }
  /* Completed projects */
  ALL_PROJECTS.filter(function(p){return p.status==='completed';}).forEach(function(p){
    alerts.push({ico:'check',color:'#16a34a',text:p.address+' entregue com sucesso',sub:p.progress+'% concluído · '+p.updatedAt});
  });
  /* Cap at 4 */
  alerts = alerts.slice(0,4);

  /* ── Calendar SVG icon ── */
  var calSvg = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  var supIco  = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

  return '<div class="page-anim">'+

    /* ── HEADER ── */
    '<div style="margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">'+
      '<div>'+
        '<h1 class="page-title">Bem-vinda de volta, '+fname+'</h1>'+
        '<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">'+
          '<p class="page-sub" style="margin:0">Visão global · todos os projetos e métricas</p>'+
          '<span class="dash-date-chip">'+calSvg+' '+dateStr+'</span>'+
        '</div>'+
      '</div>'+
    '</div>'+

    /* ── KPI CARDS ── */
    '<div class="kpi-grid fa1">'+
      /* 1 — Total Projetos */
      '<div class="kpi" data-a="nav" data-p="projects">'+
        '<div class="kpi-label">'+ic('folder',12,'#6366f1')+' Total Projetos</div>'+
        '<div class="kpi-val" style="color:#6366f1">'+total+'</div>'+
        '<div class="kpi-delta" style="color:var(--gn)">'+ic('trend',10,'#16a34a')+' '+active+' em andamento</div>'+
      '</div>'+
      /* 2 — Tickets + Leads (replaces Usuários) */
      '<div class="kpi'+(urgentKpi>0?' urgent':'')+'" data-a="nav" data-p="clientTickets">'+
        '<div class="kpi-label">'+supIco+' Ações Pendentes</div>'+
        '<div class="kpi-val" style="color:'+(urgentKpi>0?'#dc2626':'#16a34a')+'">'+urgentKpi+'</div>'+
        '<div class="kpi-delta" style="color:var(--dm)">'+openTkts+' ticket'+(openTkts!==1?'s':'')+' · '+newLeads+' lead'+(newLeads!==1?'s':'')+' novo'+(newLeads!==1?'s':'')+'</div>'+
      '</div>'+
      /* 3 — Receita Total */
      '<div class="kpi" data-a="nav" data-p="invoices">'+
        '<div class="kpi-label">'+ic('trend',12,'#16a34a')+' Receita Total</div>'+
        '<div class="kpi-val" style="color:#16a34a;font-size:16px">'+fmt(revenue)+'</div>'+
        '<div class="kpi-delta" style="color:var(--gn)">Recebido</div>'+
      '</div>'+
      /* 4 — Pendente */
      '<div class="kpi" data-a="nav" data-p="billing">'+
        '<div class="kpi-label">'+ic('rcpt',12,'#d97706')+' Pendente</div>'+
        '<div class="kpi-val" style="color:#d97706;font-size:16px">'+fmt(pending)+'</div>'+
        '<div class="kpi-delta" style="color:var(--am)">A receber</div>'+
      '</div>'+
    '</div>'+

    /* ── CHARTS + ALERTS ── */
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px" class="fa2">'+
      /* Chart */
      '<div class="card">'+
        '<h3 style="font-family:\'Instrument Serif\',serif;font-size:15px;font-weight:400;margin-bottom:12px">Projetos por Status</h3>'+
        '<div class="chart-wrap" style="height:160px"><canvas id="fin-chart"></canvas></div>'+
      '</div>'+
      /* Alerts — dynamic */
      '<div class="card">'+
        '<h3 style="font-family:\'Instrument Serif\',serif;font-size:15px;font-weight:400;margin-bottom:12px">Alertas do Sistema</h3>'+
        alerts.map(function(a){
          return '<div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05)">'+
            '<div style="width:28px;height:28px;border-radius:8px;background:'+a.color+'18;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic(a.ico,13,a.color)+'</div>'+
            '<div><p style="font-size:12px;font-weight:500;color:var(--tx)">'+a.text+'</p><p style="font-size:10px;color:var(--mu)">'+a.sub+'</p></div>'+
          '</div>';
        }).join('')+
        '<button class="btn-primary" style="margin-top:12px;width:100%" data-a="nav" data-p="projects">Ver todos os projetos →</button>'+
      '</div>'+
    '</div>'+

    /* ── ACTIVE PROJECTS TABLE — max 5, urgency-sorted ── */
    '<div class="fa3" style="margin-top:18px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
        '<div>'+
          '<h2 style="font-family:\'Instrument Serif\',serif;font-size:17px;font-weight:400">Próximas Entregas</h2>'+
          '<p style="font-size:11px;color:var(--dm);margin-top:3px">'+activeProjs.length+' projeto'+(activeProjs.length!==1?'s':'')+' ativos · ordenados por urgência</p>'+
        '</div>'+
        '<button class="btn-ghost" style="font-size:11px" data-a="nav" data-p="projects">Ver todos →</button>'+
      '</div>'+
      '<div class="card" style="padding:0;overflow:hidden">'+
        '<table class="data-table">'+
          '<thead><tr>'+
            '<th>Projeto</th>'+
            '<th>Cliente</th>'+
            '<th>Status</th>'+
            '<th>Progresso</th>'+
            '<th>Deadline</th>'+
            '<th>Orçamento</th>'+
          '</tr></thead>'+
          '<tbody>'+
          activeProjs.map(function(p){
            var isAttn = p.status==='attention';
            var progColor = p.status==='attention'?'#dc2626':p.status==='waiting'||p.status==='reviewing'?'#d97706':'#6366f1';
            return '<tr class="'+(isAttn?'row-attention':'')+'" data-a="openp" data-id="'+p.id+'" style="cursor:pointer">'+
              /* Project */
              '<td>'+
                '<p style="font-weight:600;font-size:12px;color:var(--tx)">'+p.address+'</p>'+
                '<p style="font-size:10px;color:var(--mu)">'+p.code+'</p>'+
              '</td>'+
              /* Client */
              '<td>'+
                '<div style="display:flex;align-items:center;gap:6px">'+
                  '<div style="width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--a),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0">'+
                    p.client.split(' ').map(function(w){return w[0];}).slice(0,2).join('')+
                  '</div>'+
                  '<span style="font-size:12px;color:var(--mu)">'+p.client+'</span>'+
                '</div>'+
              '</td>'+
              /* Status badge */
              '<td>'+badge(p.status)+'</td>'+
              /* Progress mini-bar */
              '<td>'+
                '<div style="display:flex;align-items:center;gap:7px">'+
                  '<div style="width:60px;height:4px;background:var(--lav2);border-radius:2px;overflow:hidden">'+
                    '<div style="width:'+p.progress+'%;height:100%;background:'+progColor+';border-radius:2px;transition:width .6s"></div>'+
                  '</div>'+
                  '<span style="font-size:10px;color:var(--dm);font-weight:600">'+p.progress+'%</span>'+
                '</div>'+
              '</td>'+
              /* Deadline — NEW COLUMN */
              '<td>'+deadlinePill(p.due)+'</td>'+
              /* Budget */
              '<td style="font-family:\'Instrument Serif\',serif;font-size:14px">'+fmt(p.budget)+'</td>'+
            '</tr>';
          }).join('')+
          '</tbody>'+
        '</table>'+
      '</div>'+
    '</div>'+

  '</div>';
}

  out += '<div>';

  out += '<p class="giv-alert-label">Drafts</p>';
  out += '<p class="giv-alert-sub">Não enviados ao cliente</p>';
  out += '</div></div>';

  out += '</div>'; /* end alert grid */

  /* ── Filter chips ── */
  var filterChips=[
    {v:'all',     l:'Todas ('+counts.all+')'},
    {v:'overdue', l:'Overdue'},
    {v:'pending', l:'Pending'},
    {v:'paid',    l:'Paid'},
    {v:'draft',   l:'Drafts'},
  ];
  out += '<div class="giv-filter-row fa2">';
  filterChips.forEach(function(fc){
    out += '<button class="giv-filter-chip'+(filter===fc.v?' act':'')+'" data-a="giv-filter" data-v="'+fc.v+'">'+fc.l+'</button>';
  });
  out += '</div>';

  /* ── Master table ── */
  out += '<div class="card fa3" style="padding:0;overflow:hidden">';

  if(list.length===0){
    out += '<div style="text-align:center;padding:48px;color:var(--dm)">';
    out += '<p style="font-size:28px;margin-bottom:10px">🧾</p>';
    out += '<p style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px">Nenhuma fatura neste filtro</p>';
    out += '<p style="font-size:12px">Experimente outro status.</p>';
    out += '</div>';
  } else {
    out += '<div style="overflow-x:auto">';
    out += '<table class="giv-table">';
    out += '<thead><tr>';
    out += '<th>Fatura</th>';
    out += '<th>Cliente / Projeto</th>';
    out += '<th>Emissão</th>';
    out += '<th>Vencimento</th>';
    out += '<th>Valor</th>';
    out += '<th>Status</th>';
    if(isAdmin) out += '<th style="width:36px"></th>';
    out += '<th>Ações</th>';
    out += '</tr></thead>';
    out += '<tbody>';
    list.forEach(function(inv){ out += invRow2(inv); });
    out += '</tbody>';
    out += '</table>';
    out += '</div>';
  }

  out += '</div>'; /* end table card */

  /* ── Admin note ── */
  if(isAdmin){
    out += '<p style="font-size:10px;color:var(--dm);margin-top:10px;display:flex;align-items:center;gap:5px">'+
      lockIco2+
      ' Clique na seta (▼) de qualquer fatura para ver o detalhamento interno de Unit Economics — visível apenas para administradores.'+
    '</p>';
  }

  out += '</div>';
  return out;
}

/* ══ CLIENT ACCESS MANAGER VIEW ══ */
function clientPortalPage(){
  if(S.role!=='admin') return makeStub('portal','Portal do Cliente','Acesso restrito a administradores.');

  /* Merge live status overrides with mock data */
  var users = CLIENT_PORTAL_USERS.map(function(u){
    var override = S.portalUserStatus&&S.portalUserStatus[u.id];
    return Object.assign({},u,override?{portalStatus:override}:{});
  });

  /* ── KPI counts ── */
  var activeCount  = users.filter(function(u){return u.portalStatus==='active';}).length;
  var invitedCount = users.filter(function(u){return u.portalStatus==='invited'||u.portalStatus==='pending';}).length;
  /* Most recent login */
  var lastUser = users
    .filter(function(u){return u.lastLogin;})
    .sort(function(a,b){return new Date(b.lastLogin)-new Date(a.lastLogin);})[0];

  /* ── Impersonate banner (shown if active) ── */
  var imp = S.impersonating;

  /* ── Helpers ── */
  function fmtLogin(iso){
    if(!iso) return null;
    var d=new Date(iso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+
      ' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }

  function initials(name){
    return name.split(' ').map(function(w){return w[0];}).slice(0,2).join('');
  }

  /* Status badge */
  function accBadge(status){
    var labels={active:'Ativo',invited:'Convite Enviado',pending:'Sem Acesso',blocked:'Bloqueado'};
    return '<span class="acc-badge '+status+'">'+
      '<span class="acc-badge-dot"></span>'+
      (labels[status]||status)+
    '</span>';
  }

  /* ── SVG Icons ── */
  var keyIco     = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6M15.5 7.5l3 3"/></svg>';
  var eyeIco2    = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  var blockIco   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>';
  var restoreIco = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>';
  var sendIco2   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>';
  var plusIco3   = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';
  var shieldIco  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
  var mfaIco     = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M9 12l2 2 4-4"/></svg>';
  var exitIco    = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>';

  /* ── Build HTML ── */
  var out = '<div class="page-anim">';

  /* ── Impersonate banner (if active) ── */
  if(imp){
    out += '<div class="acc-impersonate-banner">'+
      eyeIco2+
      '<div class="acc-imp-text">'+
        'Você está visualizando como <strong>'+imp.name+'</strong> ('+imp.email+') — sessão de suporte ativa'+
      '</div>'+
      '<button class="acc-imp-exit" data-a="exit-impersonate">'+exitIco+' Sair da sessão</button>'+
    '</div>';
    /* Add spacer so content isn't hidden */
    out += '<div style="height:56px"></div>';
  }

  /* ── Page header ── */
  out += '<div class="sec-header" style="margin-bottom:20px">';
  out += '<div>';
  out += '<h1 class="page-title">Gestão de Acessos</h1>';
  out += '<p class="page-sub">Portal do Cliente · controle de credenciais e sessões</p>';
  out += '</div>';
  out += '<button class="btn-primary" style="display:flex;align-items:center;gap:6px" data-a="invite-client">'+plusIco3+' Convidar Cliente</button>';
  out += '</div>';

  /* ── KPI Cards ── */
  out += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';

  /* Active */
  out += '<div class="fin-kpi fa1" style="cursor:default">';
  out += '<div class="fin-kpi-label">'+shieldIco+' Acessos Ativos</div>';
  out += '<div class="fin-kpi-val" style="color:var(--gn)">'+activeCount+'</div>';
  out += '<div class="fin-kpi-sub">de '+users.length+' clientes cadastrados</div>';
  out += '</div>';

  /* Invited / pending */
  out += '<div class="fin-kpi fa2" style="cursor:default">';
  out += '<div class="fin-kpi-label">'+sendIco2+' Convites Pendentes</div>';
  out += '<div class="fin-kpi-val" style="color:var(--a)">'+invitedCount+'</div>';
  out += '<div class="fin-kpi-sub">aguardando aceite ou envio</div>';
  out += '</div>';

  /* Last login */
  out += '<div class="fin-kpi fa3" style="cursor:default">';
  out += '<div class="fin-kpi-label">'+eyeIco2+' Último Acesso</div>';
  if(lastUser){
    out += '<div class="fin-kpi-val" style="font-size:16px;color:var(--tx)">'+lastUser.name.split(' ')[0]+'</div>';
    out += '<div class="fin-kpi-sub">'+fmtLogin(lastUser.lastLogin)+'</div>';
  } else {
    out += '<div class="fin-kpi-val" style="color:var(--dm)">—</div>';
  }
  out += '</div>';

  out += '</div>'; /* end KPIs */

  /* ── Security note ── */
  out += '<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:10px;margin-bottom:16px">';
  out += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
  out += '<p style="font-size:11px;color:var(--mu);line-height:1.6"><strong style="color:var(--a)">Segurança:</strong> Senhas nunca são exibidas em texto limpo. O reset envia um link seguro de recuperação por e-mail. A função "Entrar como Cliente" cria uma sessão temporária auditada e pode ser encerrada a qualquer momento.</p>';
  out += '</div>';

  /* ── User access table ── */
  out += '<div class="card fa4" style="padding:0;overflow:hidden">';
  out += '<table class="acc-table">';
  out += '<thead><tr>';
  out += '<th>Cliente / Empresa</th>';
  out += '<th>E-mail de Login</th>';
  out += '<th>Status</th>';
  out += '<th>Último Login</th>';
  out += '<th>Atividade</th>';
  out += '<th style="text-align:right">Ações de Segurança</th>';
  out += '</tr></thead>';
  out += '<tbody>';

  users.forEach(function(u){
    var isBlocked = u.portalStatus==='blocked';
    var isInvited = u.portalStatus==='invited';
    var isPending = u.portalStatus==='pending';
    var isActive  = u.portalStatus==='active';
    var isImp     = imp&&imp.id===u.id;
    var rowClass  = isInvited||isPending?'invited-row':isBlocked?'blocked-row':'';
    var fmtDate   = fmtLogin(u.lastLogin);
    var needsRevoke = S.accConfirmRevoke===u.id;

    out += '<tr class="'+rowClass+(isImp?' impersonating-row':'')+'">';

    /* Avatar + name + company */
    out += '<td>';
    out += '<div class="acc-client-cell">';
    out += '<div class="acc-av" style="background:linear-gradient(135deg,'+u.avatarColor+','+u.avatarColor+'aa)">'+initials(u.name)+
      '<span class="acc-online-dot" style="background:'+(u.online?'#16a34a':'#9ca3af')+'"></span>'+
    '</div>';
    out += '<div>';
    out += '<p style="font-size:12px;font-weight:600;color:var(--tx)">'+u.name+'</p>';
    out += '<p style="font-size:10px;color:var(--mu);margin-top:1px">'+u.company+'</p>';
    out += '</div></div>';
    out += '</td>';

    /* Email */
    out += '<td>';
    out += '<p style="font-size:12px;color:var(--tx);font-family:monospace">'+u.email+'</p>';
    if(u.mfa){
      out += '<p style="font-size:9px;color:var(--gn);margin-top:3px;display:flex;align-items:center;gap:3px">'+mfaIco+' MFA ativo</p>';
    }
    out += '</td>';

    /* Status badge */
    out += '<td>'+accBadge(u.portalStatus)+'</td>';

    /* Last login */
    out += '<td>';
    if(fmtDate){
      out += '<p class="acc-last-login">'+fmtDate+'</p>';
    } else {
      out += '<p class="acc-last-login never">Nunca acessou</p>';
    }
    if(u.inviteSent){
      out += '<p class="acc-since">Convite: '+u.inviteSent+'</p>';
    }
    out += '</td>';

    /* Activity stats */
    out += '<td>';
    out += '<p style="font-size:12px;font-weight:600;color:var(--tx)">'+u.loginCount+' logins</p>';
    out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">'+u.projects+' projeto'+(u.projects!==1?'s':'')+' vinculado'+(u.projects!==1?'s':'')+'</p>';
    out += '</td>';

    /* Actions */
    out += '<td>';
    out += '<div class="acc-actions" style="justify-content:flex-end">';

    if(needsRevoke){
      /* Confirm revoke row */
      out += '<span style="font-size:11px;color:var(--rd);font-weight:600;margin-right:6px">Confirmar revogação?</span>';
      out += '<button class="acc-btn revoke" style="border-color:#dc2626;color:#dc2626;background:rgba(220,38,38,.08)" data-a="confirm-revoke" data-uid="'+u.id+'">Sim, revogar</button>';
      out += '<button class="acc-btn" data-a="cancel-revoke">Cancelar</button>';
    } else {
      /* Reset password */
      if(isActive||isBlocked){
        out += '<button class="acc-btn reset" data-a="acc-reset-pw" data-uid="'+u.id+'" data-name="'+u.name+'" data-email="'+u.email+'" title="Enviar link de recuperação de senha">'+keyIco+' Resetar Senha</button>';
      }

      /* Impersonate (active only) */
      if(isActive){
        out += '<button class="acc-btn impersonate" data-a="acc-impersonate" data-uid="'+u.id+'" data-name="'+u.name+'" data-email="'+u.email+'" title="Visualizar portal como este cliente">'+eyeIco2+' Entrar como</button>';
      }

      /* Resend invite (invited/pending) */
      if(isInvited||isPending){
        out += '<button class="acc-btn resend" data-a="acc-resend-invite" data-uid="'+u.id+'" data-name="'+u.name+'" data-email="'+u.email+'" title="Reenviar convite por e-mail">'+sendIco2+' '+(isPending?'Convidar':'Reenviar')+'</button>';
      }

      /* Revoke / Restore */
      if(isBlocked){
        out += '<button class="acc-btn restore" data-a="acc-restore" data-uid="'+u.id+'" title="Reativar acesso">'+restoreIco+' Reativar</button>';
      } else if(!isPending){
        out += '<button class="acc-btn revoke" data-a="acc-revoke" data-uid="'+u.id+'" title="Revogar acesso ao portal">'+blockIco+' Revogar</button>';
      }
    }

    out += '</div></td>';
    out += '</tr>';
  });

  out += '</tbody></table>';
  out += '</div>'; /* end card */
  out += '</div>';
  return out;
}

/* ── PROJECTS PAGE ── */
function projectsPage(){
  const isAdmin = S.role==='admin';
  const src = isAdmin
    ? ALL_PROJECTS
    : S.role==='freelancer'
      ? ALL_PROJECTS.filter(function(p){return p.freelancer==='Carlos Maia';})
      : ALL_PROJECTS.slice(0,2);

  /* Active filter */
  const f = S.pfil||'all';

  /* Filter logic */
  var list = src.filter(function(p){
    if(f==='all')       return true;
    if(f==='on_track')  return p.status==='on_track';
    if(f==='waiting')   return p.status==='waiting';
    if(f==='attention') return p.status==='attention';
    if(f==='completed') return p.status==='completed';
    return true;
  });

  /* Count per status */
  var counts={
    all:       src.length,
    on_track:  src.filter(function(p){return p.status==='on_track';}).length,
    waiting:   src.filter(function(p){return p.status==='waiting';}).length,
    attention: src.filter(function(p){return p.status==='attention';}).length,
    completed: src.filter(function(p){return p.status==='completed';}).length,
  };

  /* Filter pills config */
  var FILTERS=[
    {id:'all',       label:'Todos',               dot:null,      dotClass:''},
    {id:'on_track',  label:'Em Andamento',         dot:'#6366f1', dotClass:'on_track'},
    {id:'waiting',   label:'Aguardando Cliente',   dot:'#d97706', dotClass:'waiting'},
    {id:'attention', label:'Atenção / Atrasado',   dot:'#dc2626', dotClass:'attention'},
    {id:'completed', label:'Concluídos',            dot:'#10b981', dotClass:'completed'},
  ];

  /* Due date helper */
  function duePill(due, status){
    if(!due) return '<span class="ptbl-due">—</span>';
    /* Parse dd/mm/yyyy */
    var parts=due.split('/');
    if(parts.length<3) return '<span class="ptbl-due">'+due+'</span>';
    var dt=new Date(parts[2],parts[1]-1,parts[0]);
    var now=new Date();
    var overdue=dt<now&&status!=='completed';
    return '<span class="ptbl-due'+(overdue?' overdue':'')+'">'+(overdue?'⚠ ':'')+due+'</span>';
  }

  /* Progress bar color per status */
  function progColor(status){
    if(status==='completed') return '#10b981';
    if(status==='attention') return '#dc2626';
    if(status==='waiting')   return '#d97706';
    return '#6366f1';
  }

  /* Build HTML */
  var out = '<div class="page-anim">';

  /* ── Header ── */
  out += '<div class="sec-header" style="margin-bottom:20px">';
  out += '<div>';
  out += '<h1 class="page-title">'+t('allProjects')+'</h1>';
  out += '<p class="page-sub">'+src.length+' projeto'+(src.length!==1?'s':'')+' · '+counts.attention+' requer'+(counts.attention!==1?'em':'')+' atenção</p>';
  out += '</div>';
  if(isAdmin){
    out += '<button class="btn-primary" style="display:flex;align-items:center;gap:6px">'+ic('plus',13,'#fff')+' Novo Projeto</button>';
  }
  out += '</div>';

  /* ── Filter pill bar ── */
  out += '<div class="pf-bar fa1" style="margin-bottom:18px">';
  FILTERS.forEach(function(fl){
    var isAct = f===fl.id;
    out += '<button class="pf-pill'+(isAct?' act':'')+'" data-a="pfil" data-v="'+fl.id+'">';
    if(fl.dot){
      out += '<span class="pf-pill-dot" style="background:'+fl.dot+'"></span>';
    }
    out += fl.label;
    out += '<span class="pf-pill-count">'+counts[fl.id]+'</span>';
    out += '</button>';
  });
  out += '</div>';

  /* ── Empty state ── */
  if(list.length===0){
    out += '<div class="proj-list-empty">';
    out += '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    out += '<p style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px">Nenhum projeto nesta categoria</p>';
    out += '<p style="font-size:12px">Experimente outro filtro ou crie um novo projeto.</p>';
    out += '</div>';
  } else {
    /* ── Project table ── */
    out += '<div class="card" style="padding:0;overflow:hidden">';
    out += '<table class="proj-table">';
    out += '<thead><tr>';
    out += '<th>Projeto</th>';
    out += '<th>Serviço</th>';
    if(isAdmin) out += '<th>Cliente</th>';
    out += '<th>Stage</th>';
    out += '<th>Progresso</th>';
    out += '<th>Status</th>';
    out += '<th>Vencimento</th>';
    out += '<th style="text-align:right">Orçamento</th>';
    out += '</tr></thead>';
    out += '<tbody>';

    list.forEach(function(p,i){
      var progressColor = progColor(p.status);
      out += '<tr class="fa'+(i+1)+'" data-a="openp" data-id="'+p.id+'">';

      /* Code + address */
      out += '<td>';
      out += '<div class="ptbl-code">'+p.code+'</div>';
      out += '<div class="ptbl-addr">'+p.address+'</div>';
      out += '<div class="ptbl-city">'+p.city+'</div>';
      if(p.pending){
        out += '<div class="ptbl-pending-tag">'+
          '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'+
          p.pending+
        '</div>';
      }
      out += '</td>';

      /* Service */
      out += '<td style="font-size:11px;color:var(--mu);max-width:180px">';
      out += '<p style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.service+'</p>';
      out += '</td>';

      /* Client */
      if(isAdmin){
        out += '<td>';
        var initials2 = p.client.split(' ').map(function(w){return w[0];}).slice(0,2).join('');
        out += '<div style="display:flex;align-items:center;gap:7px">';
        out += '<div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--a),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">'+initials2+'</div>';
        out += '<span style="font-size:12px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px">'+p.client+'</span>';
        out += '</div></td>';
      }

      /* Stage */
      out += '<td style="font-size:11px;color:var(--mu);white-space:nowrap">'+p.stage+'</td>';

      /* Progress */
      out += '<td>';
      out += '<div class="ptbl-prog-wrap">';
      out += '<div class="ptbl-prog-bg"><div class="ptbl-prog-fill" style="width:'+p.progress+'%;background:'+progressColor+'"></div></div>';
      out += '<span class="ptbl-prog-pct">'+p.progress+'%</span>';
      out += '</div>';
      out += '</td>';

      /* Status badge */
      out += '<td>'+badge(p.status)+'</td>';

      /* Due date */
      out += '<td>'+duePill(p.due, p.status)+'</td>';

      /* Budget */
      out += '<td style="text-align:right">';
      out += '<p style="font-family:\'Instrument Serif\',serif;font-size:15px;color:var(--tx)">'+fmt(p.budget)+'</p>';
      out += '<p style="font-size:10px;color:var(--dm);margin-top:1px">'+p.updatedAt+'</p>';
      out += '</td>';

      out += '</tr>';
    });

    out += '</tbody></table></div>';
  }

  out += '</div>';
  return out;
}

          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="'+curCfg.dot+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'+
          'Status atual: <strong style="color:'+curCfg.c+'">'+curCfg.label+'</strong>'+
          (S.role==='admin' ? ' · <span style="color:var(--dm)">Clique para alterar</span>' : '')+
        '</p>';
    })()}
    <div class="tab-bar fa3">${tabs.map(tb=>`<button class="tab-btn ${dtab===tb.id?'act':''}" data-a="dtab" data-v="${tb.id}">${tb.l}</button>`).join('')}</div>
    <div style="padding-top:16px">
      ${dtab==='overview'?detailOverview(p):''}
      ${dtab==='financials'?detailFinancials(p,phases):''}
      ${dtab==='roadmap'?detailRoadmap(p):''}
      ${dtab==='documents'?detailDocuments(p):''}
      ${dtab==='reviews'?detailReviews(p):''}
      ${dtab==='updates'?detailSiteUpdates():''}
      ${dtab==='notes'?detailInternalNotes(p):''}
      ${dtab==='tickets'?detailTickets():''}
    </div>
  </div>`;
}

function detailOverview(p){
  const isAdmin  = S.role==='admin';
  const pid      = String(p.id);
  const editMode = S.projEditMode[pid]||{};

  /* ── Client data ── */
  const cd = S.projClientData[pid]||{
    name:    p.client,
    company: USERS.find(function(u){return u.name===p.client;})||{companyName:'—'},
    email:   USERS_MAP.cliente.email,
    phone:   USERS_MAP.cliente.phone,
    country: 'United States',
    language:'English / Português',
  };
  const cdCompany = typeof cd.company==='object' ? (cd.company.companyName||'—') : cd.company;

  /* ── Tech data ── */
  const td = S.projTechData[pid]||{
    area:      '2,000 sqft',
    lotSize:   '4,500 sqft',
    niveis:    'Ground + 2nd Floor',
    inicio:    '15/01/2026',
    arq:       'Daniela Araújo',
    freelancer:'Carlos Maia',
    revisions: '3 revisões inclusas',
    stage:     p.pending||'Detalhamento',
    zoning:    'R-2 · Residential',
  };

  /* ── Address ── */
  const addr = S.projAddress[pid]||{
    street:  p.address,
    city:    (p.city||'').split(',')[0].trim(),
    state:   (p.city||'').split(',').slice(1).join(',').trim()||'MA',
    zip:     '02122',
    country: 'United States',
  };

  /* ── Timeline-derived status ── */

  /* ── Service scope tags catalogue ── */

    {
      id:'design', label:'DESIGN SERVICES',
      tags:[
        {id:'additions',   l:'Additions & Extensions'},
        {id:'adu',         l:'ADU / Guest House'},
        {id:'single_fam',  l:'Single-Family'},
        {id:'remodeling',  l:'Remodeling'},
        {id:'commercial',  l:'Commercial Renovation'},
        {id:'landscape',   l:'Landscape Design'},
        {id:'interior',    l:'Interior Design'},
      ],
    },
    {
      id:'drafting', label:'DRAFTING & TECHNICAL',
      tags:[
        {id:'pdf_cad',     l:'Drafting Plan PDF-CAD'},
        {id:'tech_draft',  l:'Technical Drafting'},
        {id:'permit',      l:'Permit Drawings'},
        {id:'asbuilt',     l:'As-Built Plans'},
        {id:'structural',  l:'Structural Drawings'},
      ],
    },
    {
      id:'viz', label:'VISUALIZATION',
      tags:[
        {id:'3d_ext',      l:'3D Exterior'},
        {id:'3d_int',      l:'3D Interior'},
        {id:'3d_kitchen',  l:'3D Kitchen'},
        {id:'3d_bath',     l:'3D Bathroom'},
        {id:'3d_land',     l:'3D Landscape'},
        {id:'walkthrough', l:'Walkthrough Video'},
      ],
    },
  ];

  /* Scope state — per project */
  if(!S.projScope) S.projScope={};
  if(!S.projScope[pid]){
    /* Default active tags based on project service type */
    S.projScope[pid]={
      single_fam:true, pdf_cad:true, permit:true, '3d_ext':true,

  const scope = S.projScope[pid];
  const activeTags = Object.keys(scope).filter(function(k){return scope[k];}).length;

  /* ── Helper: read-only field row ── */
  function field(label, value){
    var empty = !value||value==='—';
    return '<div class="pdv-field">'+
      '<span class="pdv-label">'+label+'</span>'+
      '<span class="pdv-value'+(empty?' muted':'')+'">'+
        (value||'—')+
      '</span>'+
    '</div>';
  }

  /* ── Helper: editable field ── */
  function editField(label, id, value, type){
    return '<div class="ov-field">'+
      '<span class="ov-label">'+label+'</span>'+
      '<input id="'+id+'" class="ov-inp" type="'+(type||'text')+'" value="'+(value||'')+'">'+
    '</div>';
  }

  /* ── Helper: person field ── */
  function personField(label, name){
    var initials = name ? name.split(' ').map(function(w){return w[0];}).slice(0,2).join('') : '?';

  /* ── Helper: stage pill ── */
  function stagePill(stage){

      'Entrega Final':         {bg:'rgba(22,163,74,.08)',  c:'#16a34a'},
      'Concluído':             {bg:'rgba(22,163,74,.08)',  c:'#16a34a'},

  /* ── Edit button ── */

  /* Summary bar */
  out += '<div class="scope-summary">'+
    '<span class="scope-count-active">'+activeTags+'</span>'+
    '<span style="color:var(--dm)">serviços selecionados</span>'+
    (isAdmin ? '<span style="margin-left:auto;font-size:10px;color:var(--dm)">Clique para ativar/desativar</span>' : '')+
  '</div>';
  /* Tag groups */
  out += '<div class="scope-body">';
  SCOPE_GROUPS.forEach(function(group){
    out += '<div class="scope-group">';

  /* ══ ROW 2: Technical Specs + Management (side by side) ══ */

    out += field('Levels',        td.niveis);
    out += field('Zoning',        td.zoning||'—');

  out += '</div>'; /* end specs */

  /* ── Management ── */
  out += '<div class="pdv-card">';
  out += cardHead('users','Management & Team','TEAM','rgba(22,163,74,.08)', '');
  out += personField('Lead Architect', td.arq||'—');
  out += personField('Draftsman', td.freelancer||'Carlos Maia');
  out += field('Start Date',         td.inicio||'—');
  out += field('Revisions Included', td.revisions||'3 revisões inclusas');
  out += field('Service Type',       p.service||'—');
  out += '</div>'; /* end management */

  out += '</div>'; /* end pdv-grid */

  /* ══ ROW 3: Project Address (full width) ══ */
  out += '<div class="ov-card fa3">';
  out += '<div class="ov-card-head">';
  out += ic('bld',14,'var(--a)');
  out += '<span class="ov-card-title">Project Address</span>';
  out += '<span class="ov-card-badge" style="background:rgba(37,99,235,.1);color:var(--a)">ADDRESS</span>';
  out += editBtnHtml('addr');
  out += '</div>';
  if(editMode.addr && isAdmin){
    out += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">';
    out += '<div class="ov-field"><span class="ov-label">Street</span><input id="addr-street" class="ov-inp" value="'+(addr.street||'')+'"></div>';

    out += '<div class="ov-field"><span class="ov-label">Zip Code</span><input id="addr-zip" class="ov-inp" value="'+(addr.zip||'')+'"></div>';
    out += '<div class="ov-field"><span class="ov-label">Country</span><input id="addr-country" class="ov-inp" value="'+(addr.country||'')+'"></div>';

    out += '<div style="padding:12px 18px"><button class="btn-primary" style="width:100%" data-a="save-addr-data" data-pid="'+pid+'">Salvar Endereço</button></div>';
  } else {
    out += '<div style="display:grid;grid-template-columns:1fr 1fr">';
    out += '<div class="ov-field"><span class="ov-label">Street</span><span class="ov-value">'+addr.street+'</span></div>';
    out += '<div class="ov-field"><span class="ov-label">City</span><span class="ov-value">'+addr.city+'</span></div>';
    out += '<div class="ov-field"><span class="ov-label">State</span><span class="ov-value">'+addr.state+'</span></div>';
    out += '<div class="ov-field"><span class="ov-label">Zip Code</span><span class="ov-value">'+addr.zip+'</span></div>';
    out += '<div class="ov-field"><span class="ov-label">Country</span><span class="ov-value">'+addr.country+'</span></div>';

  out += '<div class="ov-addr-bar">';

  out += '<span class="ov-addr-text">'+fullAddr+'</span>';
  out += '<a href="https://maps.google.com/?q='+encodeURIComponent(fullAddr)+'" target="_blank" rel="noopener" class="ov-maps-btn">';

    out += '<div class="ov-field"><span class="ov-label">Country</span><input id="cd-country" class="ov-inp" value="'+(cd.country||'')+'"></div>';

    out += '<div class="ov-field"><span class="ov-label">Country</span><span class="ov-value">'+cd.country+'</span></div>';
    out += '<div class="ov-field"><span class="ov-label">Language</span><span class="ov-value">'+cd.language+'</span></div>';
    out += '</div>';
  }

  if(isAdmin){
    out += '<div class="ov-card fa5">';
    out += '<div class="ov-card-head">';
    out += ic('settings',14,'var(--a)');
    out += '<span class="ov-card-title">Project Status</span>';
    out += '<span class="ov-card-badge" style="background:rgba(220,38,38,.08);color:var(--rd)">ADMIN</span>';
    out += '</div>';
    out += '<div class="ov-status-grid">';
    statusOpts.forEach(function(o){
      var active = curStatus===o.v;
      out += '<button data-a="set-proj-status" data-pid="'+pid+'" data-v="'+o.v+'" '+
        'style="padding:9px 20px;border-radius:10px;border:2px solid '+(active?o.c:'var(--cb)')+';'+
        'background:'+(active?o.bg:'var(--bg2)')+';color:'+(active?o.c:'var(--mu)')+';'+
        'font-family:inherit;font-size:12px;font-weight:'+(active?700:500)+';'+
        'cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px">'+
        '<div style="width:7px;height:7px;border-radius:50%;background:'+(active?o.c:'var(--cb)')+'"></div>'+
        o.l+
      '</button>';
    });
    out += '</div></div>';
  }

  out += '</div>'; /* end root */
  return out;
}

      var clipSvg='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';

          /* Admin: approve/reject if pending review */

            card += '<div class="doc-btn-sep"></div>';
            card += '<button class="btn-primary" style="padding:4px 12px;font-size:11px" data-a="approve-proof" data-ph="'+ph.id+'">'+chkSvg+' Aprovar</button>';

              ' data-a="receipt-upload" data-pid="'+pid+'" data-phid="'+ph.id+'">'+
            '</label>';
          }
        }

        card += '</div>'; /* end actions */
        card += '</div>'; /* end main row */

        /* ── Receipt info row (when file exists) ── */
        if(receipt){
          card += '<div class="ph-receipt-row">';
          card += '<div class="ph-receipt-ico">'+pdfSvg.replace('currentColor','#16a34a')+'</div>';
          card += '<div class="ph-receipt-meta">';
          card += '<p class="ph-receipt-name">'+receipt.name+'</p>';
          card += '<div class="ph-receipt-info">';
          card += '<span>'+receipt.size+'</span>';
          card += '<span class="dfile-date-pill">'+receipt.uploadedAt+'</span>';
          card += '<span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:5px;background:rgba(22,163,74,.1);color:#15803d">Comprovante</span>';
          card += '</div></div>';
          card += '</div>'; /* end receipt row */
        }

        /* ── Admin pending review row (legacy proofs) ── */
        if(isAdmin && legacyProof && !proofSt && !receipt){
          card += '<div class="ph-admin-review">';
          card += pdfSvg.replace('currentColor','#2563eb');
          card += '<span style="font-size:11px;color:var(--bl);flex:1">Comprovante enviado: '+legacyProof+'</span>';
          card += '</div>';
        }

        /* ── Confirmation messages ── */
        if(proofSt==='approved'){
          card += '<div style="padding:8px 16px;font-size:11px;color:var(--gn);border-top:1px solid rgba(22,163,74,.12)">'+chkSvg+' Pagamento confirmado pelo Admin</div>';

        }

        card += '</div>'; /* end ph-card */

      }).join('');
    })()}

  /* ── Status badge — refined SaaS style ── */
  function statusBadge(node){

    if(node.isFinal)              return '<span class="rm-badge final">Finalização</span>';

    return '<span class="rm-badge pending">Not Started</span>';

  /* ── Format ISO date as "Mar 18, 2026" ── */
  function fmtDate(iso){

  /* ── Render one card ── */

        /* Left: icon */

      html += '</div>'; /* end steps */

      /* ── File / upload area ── */
      html += '<div class="rm-step-action">';
      if(node.file && node.file.length>0){
        /* File exists → download */
