<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DARA Studio — Portal do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --v1:#0d0a1e;--v2:#130d2e;--v3:#1a1040;--v4:#2a1a6e;
  --accent:#6366f1;--accent2:#818cf8;
  --accent-glow:rgba(99,102,241,0.22);--accent-soft:rgba(99,102,241,0.09);
  --lavender:#f3f2ff;--lavender2:#eceaff;
  --white:#ffffff;--body:#1c1a2e;--muted:#6b6880;--dim:#9b99b0;
  --border:rgba(99,102,241,0.15);--border2:rgba(99,102,241,0.28);
  --card:#ffffff;--card-border:rgba(0,0,0,0.07);
  --green:#16a34a;--green-bg:rgba(22,163,74,0.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.07);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,0.08);
  --sidebar-w:224px;--sidebar-c:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--lavender);color:var(--body);min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}

/* ─── KEYFRAMES ─────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes shimmerText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:.6em;transform:translateY(-6px)}60%{opacity:1;letter-spacing:.14em}100%{opacity:1;letter-spacing:.06em}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes navBarDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barFill{from{width:0}}
@keyframes navIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,.35)}50%{box-shadow:0 4px 30px rgba(99,102,241,.6)}}
@keyframes dropDown{from{opacity:0;transform:translateY(-6px) scaleY(.95)}to{opacity:1;transform:translateY(0) scaleY(1)}}
@keyframes notifBounce{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}

.fa {animation:fadeUp .38s cubic-bezier(.22,.68,0,1.15) both}
.fa1{animation:fadeUp .38s .07s cubic-bezier(.22,.68,0,1.15) both}
.fa2{animation:fadeUp .38s .14s cubic-bezier(.22,.68,0,1.15) both}
.fa3{animation:fadeUp .38s .21s cubic-bezier(.22,.68,0,1.15) both}
.fa4{animation:fadeUp .38s .28s cubic-bezier(.22,.68,0,1.15) both}
.fa5{animation:fadeUp .38s .35s cubic-bezier(.22,.68,0,1.15) both}

/* ─── LAYOUT ────────────────────────────────── */
#layout{display:flex;min-height:100vh}

/* ─── SIDEBAR ───────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);background:var(--v1);flex-shrink:0;
  display:flex;flex-direction:column;
  transition:width .26s cubic-bezier(.4,0,.2,1);
  position:sticky;top:0;height:100vh;overflow:hidden;
  border-right:1px solid rgba(99,102,241,.12);
  animation:slideRight .4s cubic-bezier(.22,.68,0,1.15) both;
}
.sidebar.col{width:var(--sidebar-c)}
.sb-head{
  padding:18px 14px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:10px;min-height:64px;
}
.sb-logo{
  width:30px;height:30px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),#818cf8);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:16px;color:#fff;
  animation:glowPulse 3s infinite;
}
.sb-text{overflow:hidden;transition:all .25s;white-space:nowrap}
.sidebar.col .sb-text{opacity:0;width:0}
.sb-name{font-family:'Instrument Serif',serif;font-size:13px;color:#fff;
  animation:logoReveal .9s .3s cubic-bezier(.22,.68,0,1.15) both}
.sb-tag{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.08em;animation:fadeIn .6s .8s both}
.sb-toggle{
  margin-left:auto;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.3);padding:4px;display:flex;flex-shrink:0;
  border-radius:6px;transition:all .15s;
}
.sb-toggle:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.06)}

.sb-nav{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:1px}
.sb-sect{
  font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.1em;font-weight:600;
  padding:10px 12px 4px;white-space:nowrap;overflow:hidden;transition:opacity .2s;
}
.sidebar.col .sb-sect{opacity:0}

.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;
  border:none;border-radius:9px;width:100%;text-align:left;cursor:pointer;
  background:none;color:rgba(255,255,255,.38);
  font-family:'DM Sans',inherit;font-size:13px;font-weight:400;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;white-space:nowrap;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;
  border-radius:2px;background:var(--accent2);
  transform:scaleY(0);transition:transform .2s cubic-bezier(.4,0,.2,1);
}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.72)}
.nav-item.act{background:rgba(99,102,241,.14);color:var(--accent2);font-weight:500}
.nav-item.act::before{transform:scaleY(1)}
.nav-lbl{flex:1;overflow:hidden;transition:all .25s}
.sidebar.col .nav-lbl{opacity:0;width:0}
.nav-badge{
  background:var(--accent);color:#fff;border-radius:10px;
  font-size:10px;font-weight:600;min-width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
  transition:all .25s;flex-shrink:0;
}
.sidebar.col .nav-badge{
  position:absolute;top:5px;right:5px;width:7px;height:7px;
  border-radius:50%;min-width:unset;padding:0;font-size:0;
}
.nav-tip{
  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--v2);border:1px solid rgba(99,102,241,.25);color:rgba(255,255,255,.85);
  font-size:12px;padding:5px 11px;border-radius:7px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.sidebar.col .nav-item:hover .nav-tip{opacity:1}
.sb-div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:4px 8px}
.sb-bot{padding:4px 8px 16px}

.nav-item:nth-child(1){animation:navIn .26s .06s both}
.nav-item:nth-child(2){animation:navIn .26s .12s both}
.nav-item:nth-child(3){animation:navIn .26s .18s both}
.nav-item:nth-child(4){animation:navIn .26s .24s both}
.nav-item:nth-child(5){animation:navIn .26s .30s both}
.nav-item:nth-child(6){animation:navIn .26s .36s both}

/* ─── TOPBAR ────────────────────────────────── */
.topbar{
  height:54px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 26px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  animation:navBarDrop .35s cubic-bezier(.22,.68,0,1.15) both;
}
.tb-brand{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.tb-brand strong{
  font-family:'Instrument Serif',serif;font-size:14px;
  background:linear-gradient(90deg,var(--accent),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tb-right{display:flex;align-items:center;gap:10px;position:relative}
.tb-notif{position:relative;background:none;border:none;cursor:pointer;padding:7px;color:var(--muted);display:flex;border-radius:9px;transition:background .15s}
.tb-notif:hover{background:var(--lavender2)}
.tb-ndot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2.5s infinite}
.tb-avatar{
  width:33px;height:33px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:13px;color:#fff;
  cursor:pointer;box-shadow:0 2px 10px rgba(99,102,241,.3);transition:all .2s;
}
.tb-avatar:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(99,102,241,.4)}

/* ─── NOTIF PANEL ───────────────────────────── */
.notif-panel{
  position:absolute;right:0;top:46px;width:288px;
  background:#fff;border:1px solid var(--border2);border-radius:14px;
  z-index:50;box-shadow:0 12px 40px rgba(99,102,241,.12),0 2px 8px rgba(0,0,0,.08);
  overflow:hidden;animation:dropDown .22s cubic-bezier(.22,.68,0,1.15) both;
}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-head span{font-size:13px;font-weight:600;color:var(--body)}
.notif-close{background:none;border:none;cursor:pointer;color:var(--dim);display:flex;border-radius:6px;padding:3px;transition:background .15s}
.notif-close:hover{background:var(--lavender2)}
.notif-item{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.04);display:flex;gap:10px;align-items:flex-start;transition:background .15s;cursor:default}
.notif-item:hover{background:var(--lavender)}
.notif-ico{width:28px;height:28px;border-radius:8px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--accent);font-weight:700;border:1px solid var(--border)}

/* ─── MAIN ──────────────────────────────────── */
.main{flex:1;overflow:auto;min-width:0;display:flex;flex-direction:column;background:var(--lavender)}
.page{padding:26px 26px 60px;flex:1}
.page-title{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;margin-bottom:4px;color:var(--body)}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:24px}

/* ─── CARDS ─────────────────────────────────── */
.card{background:#fff;border:1px solid var(--card-border);border-radius:13px;padding:18px 22px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card:hover{border-color:rgba(99,102,241,.2);box-shadow:0 4px 16px rgba(99,102,241,.08)}
.card-click{cursor:pointer}
.card-click:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.12)}

/* ─── KPI ───────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid var(--card-border);border-radius:13px;padding:16px 18px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kpi:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.13)}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:500}
.kpi-val{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;line-height:1}

/* ─── BADGE ─────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;border-radius:20px;padding:2px 9px}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ─── PROGRESS ──────────────────────────────── */
.prog{background:var(--lavender2);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;animation:barFill .9s cubic-bezier(.22,.68,0,1.15) both}

/* ─── TABS ──────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:rgba(255,255,255,.7);backdrop-filter:blur(8px);overflow-x:auto;gap:0}
.tab-btn{background:none;border:none;padding:11px 17px;font-size:12px;font-weight:400;cursor:pointer;font-family:'DM Sans',inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;color:var(--dim)}
.tab-btn.act{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.act){color:var(--muted);background:rgba(99,102,241,.05)}

/* ─── CHIPS ─────────────────────────────────── */
.chip-row{display:flex;background:var(--lavender2);border-radius:10px;padding:3px;gap:2px;width:fit-content}
.chip{padding:6px 14px;font-size:11px;font-family:'DM Sans',inherit;border:none;border-radius:8px;cursor:pointer;color:var(--muted);background:none;transition:all .18s;font-weight:500}
.chip.act{background:#fff;color:var(--body);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ─── BUTTONS ───────────────────────────────── */
.btn-primary{background:var(--accent);border:none;border-radius:9px;padding:9px 20px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s;box-shadow:0 2px 10px rgba(99,102,241,.28)}
.btn-primary:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 4px 18px rgba(99,102,241,.38)}
.btn-dark{background:var(--body);border:none;border-radius:9px;padding:9px 20px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s}
.btn-dark:hover{background:#0d0a1e;transform:translateY(-1px)}

/* ─── FORM ──────────────────────────────────── */
.form-lbl{font-size:10px;font-weight:600;color:var(--dim);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.form-inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--body);background:var(--lavender);font-family:'DM Sans',inherit;outline:none;transition:all .2s}
.form-inp:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.form-ta{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--body);background:var(--lavender2);font-family:'DM Sans',inherit;outline:none;resize:vertical;min-height:74px;transition:all .2s;box-sizing:border-box}
.form-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}

/* ─── CHAT ──────────────────────────────────── */
.chat-box{background:#fff;border:1px solid var(--card-border);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;height:420px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chat-head{padding:12px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.9)}
.chat-body{flex:1;overflow-y:auto;padding:14px 17px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:9px;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.msg-av{width:27px;height:27px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-bbl{max-width:72%}
.msg-txt{padding:9px 13px;border-radius:11px;font-size:12px;line-height:1.55;color:var(--body)}
.msg.me .msg-txt{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(167,139,250,.08));border:1px solid rgba(99,102,241,.18);border-radius:11px 11px 3px 11px}
.msg:not(.me) .msg-txt{background:var(--lavender);border:1px solid var(--border);border-radius:11px 11px 11px 3px}
.msg-meta{font-size:10px;color:var(--dim);margin-top:3px}
.msg.me .msg-meta{text-align:right}
.chat-foot{border-top:1px solid var(--border);padding:11px 14px;display:flex;gap:8px;background:rgba(255,255,255,.8)}
.chat-inp{flex:1;background:var(--lavender);border:1.5px solid var(--border);border-radius:9px;padding:8px 13px;font-size:12px;color:var(--body);font-family:'DM Sans',inherit;outline:none;transition:all .2s}
.chat-inp:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.send-btn{background:var(--accent);border:none;border-radius:9px;width:37px;height:37px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(99,102,241,.28)}
.send-btn:hover{background:#4f46e5;transform:scale(1.06)}

/* ─── PROFILE ───────────────────────────────── */
.profile-av{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:22px;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.prow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05)}

/* ─── UPLOAD ────────────────────────────────── */
.upload-lbl{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--body);border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;width:100%;font-family:'DM Sans',inherit;transition:all .2s}
.upload-lbl:hover{background:var(--v4);box-shadow:0 4px 14px rgba(99,102,241,.22)}

/* ─── LOGIN ─────────────────────────────────── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  gap:56px;padding:32px 24px;flex-wrap:wrap;
  background:var(--lavender);position:relative;overflow:hidden;
}
#login-screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 50%,rgba(99,102,241,.07) 0%,transparent 70%),
    radial-gradient(ellipse 45% 55% at 85% 25%,rgba(167,139,250,.05) 0%,transparent 70%);
  pointer-events:none;
}
.login-left{width:330px;min-width:260px}
.login-mark{display:flex;align-items:center;gap:12px;margin-bottom:36px;animation:fadeUp .5s .1s both}
.login-d{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-size:22px;color:#fff;flex-shrink:0;
  animation:glowPulse 3s infinite;
}
.login-wm .lw-name{
  font-family:'Instrument Serif',serif;font-size:15px;color:var(--body);
  animation:logoReveal .9s .3s cubic-bezier(.22,.68,0,1.15) both;
}
.login-wm .lw-tag{font-size:10px;color:var(--muted);letter-spacing:.1em;animation:fadeIn .6s .8s both}
.login-h1{
  font-family:'Instrument Serif',serif;font-size:44px;font-weight:400;line-height:1.08;
  color:var(--body);margin-bottom:14px;animation:fadeUp .5s .25s both;
}
.login-h1 em{
  font-style:italic;
  background:linear-gradient(90deg,var(--accent),#a78bfa,var(--accent));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerText 3s linear infinite;
}
.login-line{
  width:42px;height:2px;background:linear-gradient(90deg,var(--accent),#a78bfa);
  border-radius:2px;margin-bottom:16px;transform-origin:left;
  animation:lineGrow .5s .55s both;
}
.login-sub{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:28px;animation:fadeUp .4s .45s both}
.feat{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px}
.feat-ico{width:29px;height:29px;border-radius:8px;border:1px solid var(--border2);background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.feat-txt{font-size:12px;color:var(--muted);line-height:1.65}
.demo-badge{
  margin-top:24px;padding:8px 14px;border-radius:8px;
  background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.2);
  display:flex;align-items:center;gap:8px;font-size:11px;color:var(--amber);font-weight:500;
  animation:fadeUp .4s .8s both;
}
.demo-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite;flex-shrink:0}

.login-card{
  width:385px;min-width:300px;background:#fff;border-radius:20px;
  border:1px solid var(--border);padding:32px;
  animation:scaleIn .4s .15s cubic-bezier(.22,.68,0,1.15) both;
  position:relative;
  box-shadow:0 8px 40px rgba(99,102,241,.1),0 2px 8px rgba(0,0,0,.05);
}
.login-card::before{
  content:'';position:absolute;top:0;left:20px;right:20px;height:1px;

}
.ltab-row{display:flex;background:var(--lavender);border-radius:10px;padding:3px;margin-bottom:24px;gap:2px}

.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;border:1.5px solid var(--border);border-radius:11px;padding:11px;background:#fff;font-size:13px;color:var(--body);margin-bottom:16px;cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s;font-weight:500}
.google-btn:hover{border-color:rgba(99,102,241,.35);background:var(--lavender);box-shadow:0 2px 10px rgba(99,102,241,.1)}
.or-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.or-line{flex:1;height:1px;background:var(--border)}
.or-txt{font-size:11px;color:var(--dim)}
.lfield{margin-bottom:13px}
.lfield label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.lfield-wrap{position:relative}
.lfield input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--body);background:var(--lavender);font-family:'DM Sans',inherit;outline:none;transition:all .2s;box-sizing:border-box}
.lfield input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.lfield input.pr{padding-right:42px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--dim);padding:4px;display:flex}
.forgot-row{text-align:right;margin-bottom:14px}
.forgot-btn{background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;font-family:'DM Sans',inherit;font-weight:500}
.forgot-btn:hover{color:#4f46e5}
.submit-btn{
  width:100%;background:linear-gradient(135deg,var(--accent),#818cf8);
  border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:600;color:#fff;
  cursor:pointer;font-family:'DM Sans',inherit;transition:all .2s;
  box-shadow:0 4px 18px rgba(99,102,241,.32);position:relative;overflow:hidden;
}
.submit-btn:hover{box-shadow:0 6px 24px rgba(99,102,241,.45);transform:translateY(-1px)}
.submit-btn:active{transform:scale(.99)}
.submit-btn.busy{background:var(--lavender2);color:var(--muted);box-shadow:none;cursor:default}
.err-msg{font-size:12px;color:var(--red);margin-bottom:10px}
.ok-msg{padding:8px 12px;background:var(--green-bg);border:1px solid rgba(22,163,74,.2);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--green)}
.hint-txt{text-align:center;font-size:11px;color:var(--dim);margin-top:14px}

svg.ic{display:inline-block;vertical-align:middle;flex-shrink:0}

<body>
<div id="root"></div>
<script>
(function(){

/* ─── DATA ── */
const DATA={

function ic(k,s=14,c='currentColor'){
  return `<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${PATHS[k]||''}"/></svg>`;

function badge(s){

  return `<span class="badge" style="background:${st.bg};color:${st.c}"><span class="badge-dot" style="background:${st.c}"></span>${st.label}</span>`;

/* ─── STATE ── */
let S={
  loggedIn:false,ltab:'in',showPw:false,
  page:'dashboard',sbCol:false,showNotif:false,notifRead:false,
  proj:null,dtab:'overview',pfil:'active',
  busy:false,err:'',ok:'',em:'',pw:'',

};

/* ─── RENDER ── */

}

/* ─── LAYOUT ── */
function layout(){
  const pend=DATA.invoices.filter(i=>i.status==='pending').length;

    {id:'dashboard',ico:'home',l:'Dashboard'},

  const nb=n=>{

  };
  return `<div id="layout">

    </div>`).join('')}

}

/* ─── PAGES ── */
function page(){
  switch(S.page){
    case 'dashboard': return dashboard();
    case 'projects':  return projects();
    case 'detail':    return S.proj?detail():'';
    case 'invoices':  return invoices();
    case 'messages':  return messages();
    case 'profile':   return profile();
    case 'company':   return company();
    default:          return dashboard();
  }
}

function dashboard(){

  const pend=DATA.invoices.filter(i=>i.status==='pending');

  return `<div class="fa">
    <div style="margin-bottom:22px">

          <button class="forgot-btn" data-a="nav" data-p="projects">Ver todos →</button>

        ${DATA.projects.slice(0,2).map(p=>`
        <div class="card card-click" style="margin-bottom:11px" data-a="openp" data-id="${p.id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px">

        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function projects(){
  const f=S.pfil;
  const list=DATA.projects.filter(p=>f==='all'?true:f==='active'?p.status!=='completed':p.status==='completed');

/* ─── BIND ── */
function bind(){
  document.getElementById('root').addEventListener('click',handleClick);
  const ei=document.getElementById('em-i');
  if(ei){ei.addEventListener('input',e=>{S.em=e.target.value});ei.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})}
  const pi=document.getElementById('pw-i');
  if(pi){pi.addEventListener('input',e=>{S.pw=e.target.value});pi.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})}
  const ci=document.getElementById('ci');
  if(ci){ci.addEventListener('input',e=>{S.cmsg=e.target.value});ci.addEventListener('keydown',e=>{if(e.key==='Enter')doSend()})}
  document.querySelectorAll('[data-a="proof"]').forEach(inp=>{
    inp.addEventListener('change',e=>{const f=e.target.files?.[0];if(f){S.proofs[e.target.dataset.ph]=f.name;render()}});
  });
  const cb=document.getElementById('cb');if(cb)cb.scrollTop=9999;
}

function handleClick(e){
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a;
  if(a==='ltab'){S.ltab=el.dataset.v;S.err='';S.ok='';render()}
  else if(a==='tpw'){S.showPw=!S.showPw;render()}
  else if(a==='google'){S.err='Google OAuth disponível em produção.';render()}
  else if(a==='forgot'){S.ok='Link de recuperação enviado (demo).';render()}
  else if(a==='login')doLogin();
  else if(a==='nav'){S.page=el.dataset.p;S.proj=null;render()}
  else if(a==='logout'){S.loggedIn=false;render()}
  else if(a==='sb'){S.sbCol=!S.sbCol;render()}
  else if(a==='notif'){S.showNotif=!S.showNotif;S.notifRead=true;render()}
  else if(a==='cnotif'){S.showNotif=false;render()}
  else if(a==='openp'){const p=DATA.projects.find(x=>x.id==el.dataset.id);if(p){S.proj=p;S.page='detail';S.dtab='overview';render()}}
  else if(a==='back'){S.page='projects';S.proj=null;render()}
  else if(a==='dtab'){S.dtab=el.dataset.v;render()}
  else if(a==='pfil'){S.pfil=el.dataset.v;render()}
  else if(a==='qa'){S.qa=!S.qa;render()}
  else if(a==='sendc')doSend();
  else if(a==='poupd'){const v=document.getElementById('ut')?.value.trim();if(v){S.updates.unshift({id:Date.now(),date:new Date().toLocaleDateString('pt-BR'),auth:'João (cliente)',text:v});S.utxt='';render()}}
  else if(a==='opntkt'){const v=document.getElementById('tt')?.value.trim();if(v){S.tickets.unshift({id:'TKT-'+String(S.tickets.length+1).padStart(3,'0'),desc:v,date:new Date().toLocaleDateString('pt-BR'),status:'Aberto'});S.ttxt='';render()}}
}

function doLogin(){
  const em=S.em||(document.getElementById('em-i')?.value||'');
  const pw=S.pw||(document.getElementById('pw-i')?.value||'');
  if(!em||!pw){S.err='Preencha todos os campos.';render();return}
  S.err='';S.busy=true;render();
  setTimeout(()=>{
    S.busy=false;
    if(S.ltab==='in'){
      if(em==='joao@darastudio.com'&&pw==='teste123'){S.loggedIn=true;render()}
      else{S.err='E-mail ou senha incorretos.';render()}
    }else{
      if(pw.length<6){S.err='Senha: mínimo 6 caracteres.';render();return}
      S.ok='Conta criada! Verifique seu e-mail.';S.ltab='in';render();
    }
  },700);
}

function doSend(){
  const v=S.cmsg||(document.getElementById('ci')?.value||'');
  if(!v.trim())return;
  S.msgs.push({id:Date.now(),from:'client',name:'João',text:v.trim(),time:'agora'});
  S.cmsg='';render();
}

render();
})();
