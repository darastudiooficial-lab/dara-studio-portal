.prow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04)}

.escope{background:#edeae4;border:1.5px solid #e2ddd6;border-radius:9px;padding:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}

function calcPrice(sqft,service,delivery){
  if(!sqft||!service)return null;
  const base=sqft*BASE_RATE*(SVC_MULT[service]||1);
  const mult=delivery==='rush'?1.40:delivery==='express'?1.60:1;
  return{low:Math.round(base*mult*.82),high:Math.round(base*mult),base:Math.round(base),rushAmt:Math.round(base*.40),exprAmt:Math.round(base*.60)};
}

    Array.from(newFiles).forEach(f=>{
      if(!combined.find(x=>x.name===f.name)){combined.push(f);ns[f.name]='done';}
    });
    set('fileList',combined);set('fileStatus',ns);
  };
  const removeFile=name=>{
    set('fileList',files.filter(f=>f.name!==name));

  const canNext=()=>{
    if(step===0)return!!(data.country&&data.projectName?.trim()&&data.street?.trim()&&data.city?.trim()&&data.state&&data.zip?.trim());
    if(step===1)return!!(data.detailService&&data.area);

  )
);

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
const Layout=({user,onLogout})=>{
  const[page,setPage]=useState('dashboard');
  const[sideOpen,setSideOpen]=useState(true);
  const[proj,setProj]=useState(null);
  const[projects,setProjects]=useState(DEMO_PROJECTS);
  const[showEstimate,setShowEstimate]=useState(false);
  const[notif,setNotif]=useState(true);
  const[showN,setShowN]=useState(false);
  const pend=DEMO_INVOICES.filter(i=>i.status==='pending').length;
  const nav=[{id:'dashboard',ico:'dash',l:'Dashboard'},{id:'projects',ico:'folder',l:'Meus Projetos'},{id:'invoices',ico:'rcpt',l:'Faturas',b:pend},{id:'messages',ico:'chat',l:'Mensagens',b:1}];
  const bot=[{id:'profile',ico:'usr',l:'Perfil'},{id:'company',ico:'bld',l:'Empresa'}];
  const go=p=>{setProj(null);setPage(p);};
  const openProject=p=>{setProj(p);setPage('detail');};
  const newEstimate=()=>setShowEstimate(true);

  const onEstimateSubmit=formData=>{
    const np={
      id:Date.now(),
      code:'DARA-'+String(projects.length+1).padStart(4,'0'),
      address:formData.street||formData.projectName||'Novo Projeto',
      city:(formData.city||'')+', '+(formData.state||''),
      service:(formData.service||'estimate').replace(/_/g,' '),
      stage:'Levantamento',status:'on_track',
      budget:0,paid:0,progress:0,
      updatedAt:new Date().toLocaleDateString('pt-BR'),
      pending:'Aguardando revisão — válido por 30 dias',
    };
    setProjects(prev=>[np,...prev]);
    setShowEstimate(false);
    setPage('projects');
  };

  if(showEstimate)return e(EstimateForm,{onClose:()=>setShowEstimate(false),onSubmit:onEstimateSubmit});

  return e('div',{style:{display:'flex',minHeight:'100vh',background:BG}},
    e('aside',{style:{width:sideOpen?205:52,background:SB,flexShrink:0,display:'flex',flexDirection:'column',transition:'width .2s ease',overflow:'hidden',position:'sticky',top:0,height:'100vh'}},
      e('div',{style:{padding:sideOpen?'14px 12px 10px':'14px 0 10px',display:'flex',alignItems:'center',justifyContent:sideOpen?'space-between':'center',borderBottom:'1px solid rgba(255,255,255,0.06)',marginBottom:6}},
        sideOpen&&e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e('div',{style:{width:27,height:27,background:G,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SR,fontWeight:700,fontSize:13,color:'#fff',flexShrink:0}},'D'),
          e('div',null,e('p',{style:{fontFamily:SR,fontSize:11,fontWeight:700,color:'#fff',lineHeight:1.2}},'DARA Studio'),e('p',{style:{fontSize:10,color:'rgba(255,255,255,0.35)'}},'Portal do Cliente'))
        ),
        e('button',{className:'nb',onClick:()=>setSideOpen(o=>!o),style:{color:'rgba(255,255,255,0.4)',padding:4,flexShrink:0}},e(Ic,{d:I.menu,s:14,c:'rgba(255,255,255,0.4)'}))
      ),
      sideOpen&&e('div',{style:{padding:'6px 8px 2px'}},
        e('button',{className:'nb',onClick:newEstimate,style:{width:'100%',background:G,border:'none',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:8,cursor:'pointer',transition:'opacity .15s'},onMouseEnter:v=>v.currentTarget.style.opacity='.9',onMouseLeave:v=>v.currentTarget.style.opacity='1'},
          e(Ic,{d:I.plus,s:14,c:'#fff'}),'+ Novo Estimate'
        )
      ),
      e('nav',{style:{flex:1,padding:'6px 8px',display:'flex',flexDirection:'column',gap:2}},
        nav.map(n=>e(NavItem,{key:n.id,ico:n.ico,label:n.l,active:page===n.id||(page==='detail'&&n.id==='projects'),badge:n.b||0,collapsed:!sideOpen,onClick:()=>go(n.id)}))
      ),
      e('div',{style:{padding:'4px 8px 12px',borderTop:'1px solid rgba(255,255,255,0.06)'}},
        bot.map(n=>e(NavItem,{key:n.id,ico:n.ico,label:n.l,active:page===n.id,badge:0,collapsed:!sideOpen,onClick:()=>go(n.id)})),
        e(NavItem,{ico:'out',label:'Sair',active:false,badge:0,collapsed:!sideOpen,onClick:onLogout})
      )
    ),
    e('main',{style:{flex:1,overflow:'auto',minWidth:0,display:'flex',flexDirection:'column'}},
      e('div',{style:{background:BG2,borderBottom:'1px solid '+BR,padding:'0 20px',height:50,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:40}},
        e('div',null,e('span',{style:{fontSize:12,color:G,fontWeight:600,letterSpacing:'.08em'}},'DARA Studio'),e('span',{style:{fontSize:12,color:DM,margin:'0 6px'}},'|'),e('span',{style:{fontSize:12,color:MU}},'Drafting & 3D Support')),
        e('div',{style:{display:'flex',alignItems:'center',gap:10}},
          !sideOpen&&e('button',{className:'nb btn',onClick:newEstimate,style:{fontSize:11,padding:'5px 12px',display:'flex',alignItems:'center',gap:5}},e(Ic,{d:I.plus,s:12,c:'#fff'}),'Novo Estimate'),
          e('div',{style:{position:'relative'}},
            e('button',{className:'nb',onClick:()=>{setShowN(o=>!o);setNotif(false);},style:{color:MU,padding:4,position:'relative'}},
              e(Ic,{d:I.bell,s:16,c:MU}),
              notif&&e('span',{style:{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:G}})
            ),
            showN&&e(Fragment,null,
              e('div',{onClick:()=>setShowN(false),style:{position:'fixed',inset:0,zIndex:49}}),
              e('div',{style:{position:'absolute',right:0,top:38,width:270,background:BG2,border:'1px solid '+BR,borderRadius:10,zIndex:50,boxShadow:'0 6px 20px rgba(0,0,0,0.1)',overflow:'hidden'}},
                e('div',{style:{padding:'10px 14px',borderBottom:'1px solid '+BR,display:'flex',justifyContent:'space-between',alignItems:'center'}},
                  e('span',{style:{fontSize:12,fontWeight:700,color:TX}},'Notificações'),
                  e('button',{className:'nb',onClick:()=>setShowN(false)},e(Ic,{d:I.x,s:13,c:DM}))
                ),
                DEMO_ACTIVITY.map(a=>e('div',{key:a.id,style:{padding:'9px 14px',borderBottom:'1px solid rgba(0,0,0,0.04)',display:'flex',gap:8,alignItems:'flex-start'}},
                  e('div',{style:{width:24,height:24,borderRadius:6,background:GD,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},e(Ic,{d:a.type==='file'?I.dload:a.type==='invoice'?I.rcpt:I.chat,s:12,c:G})),
                  e('div',null,e('p',{style:{fontSize:11,color:TX,lineHeight:1.4}},a.text),e('p',{style:{fontSize:10,color:DM,marginTop:1}},a.time))
                ))
              )
            )
          ),
          e('div',{style:{width:30,height:30,borderRadius:'50%',background:GD,border:'2px solid '+G,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SR,fontSize:11,fontWeight:700,color:G,cursor:'pointer'},onClick:()=>go('profile')},user.initials)
        )
      ),
      e('div',{style:{padding:'20px 20px 60px',flex:1}},
        page==='dashboard'&&e(Dashboard,{user,projects,invoices:DEMO_INVOICES,activity:DEMO_ACTIVITY,onNav:go,onOpen:openProject,onNewEstimate:newEstimate}),
        page==='projects'&&e(Projects,{projects,setProjects,onOpen:openProject,onNewEstimate:newEstimate}),
        page==='detail'&&proj&&e(ProjectDetail,{proj,onBack:()=>{setProj(null);setPage('projects');},onNewEstimate:newEstimate}),
        page==='invoices'&&e(Faturas,{invoices:DEMO_INVOICES}),
        page==='messages'&&e('div',{className:'fa',style:{textAlign:'center',padding:'60px 0',color:DM}},
          e('div',{style:{width:56,height:56,borderRadius:'50%',background:GD,border:'2px solid '+G,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}},e(Ic,{d:I.chat,s:24,c:G})),
          e('p',{style:{fontSize:16,fontWeight:700,color:TX,marginBottom:4,fontFamily:SR}},'Mensagens Gerais'),
          e('p',{style:{fontSize:12,color:MU,marginBottom:20}},'Use o Chat dentro de cada projeto para comunicação direta.'),
          e('button',{className:'btn',onClick:()=>go('projects')},'Ver Meus Projetos')
        ),
        page==='profile'&&e(Perfil,{user}),
        page==='company'&&e('div',{className:'fa',style:{maxWidth:520}},
          e('h1',{style:{fontFamily:SR,fontSize:20,fontWeight:700,marginBottom:18}},'Minha Empresa'),
          e('div',{className:'card'},
            e('p',{style:{fontSize:12,color:MU,marginBottom:6}},'Empresa cadastrada:'),
            e('p',{style:{fontSize:14,fontWeight:700,color:TX,marginBottom:16}},user.company),
            ['Tipo','Status','Idioma'].map(l=>e('div',{key:l,style:{marginBottom:12}},
              e('label',{style:{fontSize:11,fontWeight:600,color:DM,display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}},l),
              e('input',{className:'inp',defaultValue:l==='Tipo'?'Client':l==='Status'?'Ativo':'Português BR'})
            )),
            e('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:8}},e('button',{className:'btn'},'Salvar Alterações'))
          )
        )
      )
    )
  );
};

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
const App=()=>{
  const[user,setUser]=useState(null);
  return user
    ?React.createElement(Layout,{user,onLogout:()=>setUser(null)})
    :React.createElement(Login,{onLogin:setUser});
};

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
})();
</script>
</body>
</html>
