  const[showNotif,setShowNotif]=useState(false);

  const pending=invoices.filter(i=>i.status==='pending').length;
  const openProject=p=>{setSelProject(p);setPage('detail');};
  const nav=[
    {id:'dashboard',icon:'dash',label:'Dashboard'},
    {id:'projects',icon:'folder',label:'Meus Projetos'},
    {id:'invoices',icon:'receipt',label:'Faturas',badge:pending},
    {id:'messages',icon:'chat',label:'Mensagens',badge:1},
  ];
  const bot=[
    {id:'profile',icon:'user',label:'Perfil'},
    {id:'company',icon:'building',label:'Empresa'},
  ];

  return h('div',{style:{display:'flex',minHeight:'100%',background:BG}},
    // Sidebar
    h('aside',{style:{width:sideOpen?210:52,background:SB,flexShrink:0,display:'flex',flexDirection:'column',transition:'width .22s ease',overflow:'hidden',position:'sticky',top:0,height:'100vh'}},
      h('div',{style:{padding:sideOpen?'16px 14px 12px':'16px 0 12px',display:'flex',alignItems:'center',justifyContent:sideOpen?'space-between':'center',borderBottom:'1px solid rgba(255,255,255,0.06)',marginBottom:6}},
        sideOpen&&h('div',{style:{display:'flex',alignItems:'center',gap:9}},
          h('div',{style:{width:28,height:28,background:G,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SR,fontWeight:700,fontSize:14,color:'#fff',flexShrink:0}},'D'),
          h('div',null,h('p',{style:{fontFamily:SR,fontSize:12,fontWeight:700,color:'#fff',lineHeight:1.2}},'DARA Studio'),h('p',{style:{fontSize:10,color:'rgba(255,255,255,0.35)'}},'Portal do Cliente'))
        ),
        h('button',{onClick:()=>setSideOpen(s=>!s),style:{background:'none',border:'none',color:'rgba(255,255,255,0.4)',padding:4,flexShrink:0}},h(Ic,{n:'menu',size:14,color:'rgba(255,255,255,0.4)'}))
      ),
      h('nav',{style:{flex:1,padding:'6px 8px',display:'flex',flexDirection:'column',gap:2}},
        nav.map(item=>h(NavBtn,{key:item.id,...item,active:page===item.id||(page==='detail'&&item.id==='projects'),collapsed:!sideOpen,onClick:()=>{setSelProject(null);setPage(item.id);}}))
      ),
      h('div',{style:{padding:'6px 8px 10px',borderTop:'1px solid rgba(255,255,255,0.06)'}},
        bot.map(item=>h(NavBtn,{key:item.id,...item,active:page===item.id,collapsed:!sideOpen,onClick:()=>setPage(item.id)})),
        h(NavBtn,{icon:'logout',label:'Sair',collapsed:!sideOpen,onClick:onLogout})
      )
    ),
    // Main
    h('main',{style:{flex:1,overflow:'auto',minWidth:0,display:'flex',flexDirection:'column'}},
      // Topbar
      h('div',{style:{background:BG2,borderBottom:`1px solid ${BR}`,padding:'0 22px',height:50,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:40}},
        h('div',null,h('span',{style:{fontSize:12,color:G,fontWeight:600,letterSpacing:'.08em'}},'DARA Studio'),h('span',{style:{fontSize:12,color:DM,margin:'0 6px'}},'|'),h('span',{style:{fontSize:12,color:MU}},'Drafting & 3D Support')),
        h('div',{style:{display:'flex',alignItems:'center',gap:12}},
          h('div',{style:{position:'relative'}},
            h('button',{onClick:()=>{setShowNotif(o=>!o);setNotif(false);},style:{background:'none',border:'none',color:MU,padding:4,position:'relative'}},
              h(Ic,{n:'bell',size:16,color:MU}),
              notif&&h('span',{style:{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:G}})
            ),
            showNotif&&h(Fragment,null,
              h('div',{onClick:()=>setShowNotif(false),style:{position:'fixed',inset:0,zIndex:49}}),
              h('div',{style:{position:'absolute',right:0,top:36,width:270,background:BG2,border:`1px solid ${BR}`,borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,0.1)',zIndex:50,overflow:'hidden'}},
                h('div',{style:{padding:'11px 14px',borderBottom:`1px solid ${BR}`,display:'flex',justifyContent:'space-between',alignItems:'center'}},
                  h('span',{style:{fontSize:12,fontWeight:700,color:TX}},'Notificações'),
                  h('button',{onClick:()=>setShowNotif(false),style:{background:'none',border:'none',color:DM}},h(Ic,{n:'x',size:13,color:DM}))
                ),
                DEMO_ACTIVITY.map(a=>h('div',{key:a.id,style:{padding:'10px 14px',borderBottom:`1px solid rgba(0,0,0,0.04)`,display:'flex',gap:10,alignItems:'flex-start'}},
                  h('div',{style:{width:26,height:26,borderRadius:6,background:GD,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},h(Ic,{n:a.type==='file'?'download':a.type==='invoice'?'receipt':'chat',size:12,color:G})),
                  h('div',null,h('p',{style:{fontSize:11,color:TX,lineHeight:1.4}},a.text),h('p',{style:{fontSize:10,color:DM,marginTop:1}},a.time))
                ))
              )
            )
          ),
          h('div',{style:{width:30,height:30,borderRadius:'50%',background:GD,border:`2px solid ${G}`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SR,fontSize:12,fontWeight:700,color:G}},profile.initials)
        )
      ),
      // Content
      h('div',{style:{padding:'22px 22px 48px',flex:1}},
        page==='dashboard'&&h(Dashboard,{profile,projects,invoices,activity,onNavigate:p=>setPage(p),onOpenProject:openProject}),
        page==='projects'&&h(Projects,{projects,setProjects,onOpenProject:openProject}),
        page==='detail'&&selProject&&h(ProjectDetail,{project:selProject,onBack:()=>{setSelProject(null);setPage('projects');}}),
        page==='invoices'&&h(Invoices,{invoices}),
        page==='messages'&&h('div',{className:'anim',style:{textAlign:'center',padding:'60px 0',color:DM}},h('p',{style:{fontSize:28,marginBottom:8}},'💬'),h('p',{style:{fontSize:14,color:TX,marginBottom:4}},'Mensagens Gerais'),h('p',{style:{fontSize:12}},'Use a aba Chat dentro de cada projeto para comunicação direta.')),
        page==='profile'&&h(Profile,{profile}),
        page==='company'&&h('div',{className:'anim',style:{maxWidth:520}},h('h1',{style:{fontFamily:SR,fontSize:20,fontWeight:700,marginBottom:18}},'Minha Empresa'),h('div',{style:{background:BG2,border:`1px solid ${BR}`,borderRadius:12,padding:22}},h('p',{style:{fontSize:12,color:MU}},'Dados da empresa em ',h('strong',null,'Jack General Services Inc.'))))
      )
    )
  );
};

// ── APP ROOT ──
const App=()=>{
  const[user,setUser]=useState(null);
  return user?h(Layout,{user,onLogout:()=>setUser(null)}):h(Login,{onLogin:setUser});
};

createRoot(document.getElementById('portal-root')).render(h(App));
</script>
