<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DARA Studio · Estimate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#090910;--bg1:#0f0f1a;--bg2:#14141f;--bg3:#1a1a28;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --a:#6366f1;--a-dim:rgba(99,102,241,.18);--a-glow:rgba(99,102,241,.35);
  --tx:#f0eff8;--mu:#9896b8;--dm:#5c5a7a;
  --gn:#10b981;--am:#f59e0b;--rd:#ef4444;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:14px;--r-sm:8px;
}
html,body,#root{min-height:100vh;background:var(--bg0);font-family:var(--sans);color:var(--tx)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Inputs ── */
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--tx);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .18s,box-shadow .18s}
.inp::placeholder{color:var(--dm)}
.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-dim)}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
textarea.inp{min-height:100px;resize:vertical;line-height:1.6}

/* ── Cards ── */
.card{padding:16px 20px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;user-select:none}
.card:hover{border-color:var(--border2);background:var(--bg2)}
.card.on{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a),0 0 20px var(--a-glow)}
.toggle{flex:1;padding:28px 24px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .22s;text-align:center;user-select:none}
.toggle:hover{border-color:var(--border2);transform:translateY(-2px)}
.toggle.on{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a),0 0 32px var(--a-glow);transform:translateY(-3px)}

/* ── Buttons ── */
.btn{padding:12px 28px;border-radius:var(--r-sm);background:var(--a);border:none;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 8px 24px var(--a-glow)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-o{padding:12px 28px;border-radius:var(--r-sm);background:transparent;border:1.5px solid var(--border2);color:var(--mu);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s}
.btn-o:hover{border-color:var(--a);color:var(--tx)}

/* ── Counter ── */
.ctr{display:flex;align-items:center;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.ctr-btn{width:36px;height:36px;border:none;background:transparent;color:var(--mu);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ctr-btn:hover{background:var(--bg2);color:var(--tx)}
.ctr-val{min-width:42px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--tx);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0 8px}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;width:100%}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--mono);transition:all .25s;flex-shrink:0}
.step-dot.done{background:var(--a);color:#fff}
.step-dot.active{background:var(--a);color:#fff;box-shadow:0 0 0 4px var(--a-dim),0 0 16px var(--a-glow)}
.step-dot.future{background:var(--bg3);border:1.5px solid var(--border);color:var(--dm)}
.step-line{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden}
.step-fill{position:absolute;left:0;top:0;bottom:0;background:var(--a);transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ── Sidebar ── */
.sidebar{position:sticky;top:24px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:20px}
.conf-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,.68,0,1.15)}

/* ── Drop zone ── */
.drop{border:2px dashed var(--border2);border-radius:var(--r);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.drop:hover,.drop.drag{border-color:var(--a);background:var(--a-dim);box-shadow:0 0 0 1px var(--a)}

/* ── Map ── */
.map-box{width:100%;height:180px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.map-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 40%,rgba(99,102,241,.12) 0%,transparent 65%)}

/* ── Review row ── */
.rev-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rev-row:last-child{border-bottom:none}

/* ── Animation ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}

/* ── Landing ── */
.lp-root{min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden}
.lp-root::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(99,102,241,.10) 0%,transparent 55%);pointer-events:none;z-index:0}
.lp-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);pointer-events:none;z-index:0;top:50%;left:50%;transform:translate(-50%,-50%);animation:breathe 8s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
@keyframes lp-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lp-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--a);background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:5px 14px;margin-bottom:28px;animation:lp-up .6s .1s both}
.lp-h1{font-family:var(--serif);font-size:clamp(38px,7vw,76px);font-weight:400;line-height:1.08;letter-spacing:-.02em;color:var(--tx);margin-bottom:22px;max-width:820px;animation:lp-up .6s .2s both}
.lp-h1 em{font-style:italic;color:#a5b4fc}
.lp-sub{font-size:16px;color:var(--mu);line-height:1.65;max-width:460px;margin-bottom:44px;font-weight:300;animation:lp-up .6s .3s both}
.lp-ctas{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;animation:lp-up .6s .4s both}
.lp-btn{display:inline-flex;align-items:center;gap:9px;padding:15px 32px;background:var(--a);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.lp-btn:hover{background:#4f46e5;transform:translateY(-2px);box-shadow:0 12px 36px rgba(99,102,241,.45)}
.lp-btn-o{display:inline-flex;align-items:center;gap:9px;padding:15px 32px;background:transparent;border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#c4c2dc;font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.lp-btn-o:hover{border-color:rgba(99,102,241,.4);color:var(--tx);background:rgba(99,102,241,.07);transform:translateY(-2px)}
.lp-proof{display:flex;align-items:center;justify-content:center;gap:20px;padding:18px 24px 40px;flex-wrap:wrap;animation:lp-up .6s .55s both}
.lp-proof-item{font-size:12px;color:var(--dm);display:flex;align-items:center;gap:6px}
.lp-services{border-top:1px solid rgba(255,255,255,.05);padding:24px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;animation:lp-up .6s .65s both}
.lp-svc{padding:8px 18px;font-size:11px;color:var(--dm);letter-spacing:.04em;text-transform:uppercase;font-weight:500;border-right:1px solid rgba(255,255,255,.06)}
.lp-svc:last-child{border-right:none}

/* ── Portal placeholder ── */
.portal-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg0)}

/* ── Grid helpers ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}
@media(max-width:700px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr}}
.f{display:flex;flex-direction:column;gap:6px}
.row{display:flex;gap:12px;align-items:center}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useCallback,useRef,createElement:h} = React;

/* ═══ CONSTANTS ═══ */
const STEPS=["Location","About You","Project","Scope","Services","Program","Files","Rush","Review"];
const ROLES=[
  {id:"homeowner",label:"Homeowner",icon:"🏠"},
  {id:"builder",label:"Builder",icon:"🔨"},
  {id:"architect",label:"Architect",icon:"📐"},
  {id:"developer",label:"Developer",icon:"🏗️"},
  {id:"investor",label:"Investor",icon:"💼"},
  {id:"agent",label:"Real Estate Agent",icon:"🤝"},
];
const STATUSES=[
  {id:"vacant",label:"Vacant Lot",icon:"🌿"},
  {id:"construction",label:"Under Construction",icon:"🔧"},
  {id:"occupied",label:"Occupied",icon:"🏡"},
];
const ROOM_GROUPS=[
  {label:"Core Rooms",items:[
    {id:"bedrooms",label:"Bedrooms"},{id:"bathrooms",label:"Bathrooms"},
    {id:"halfBaths",label:"Half Baths"},{id:"livingRooms",label:"Living Rooms"},
    {id:"familyRoom",label:"Family Room"},{id:"diningRoom",label:"Dining Room"},
  ]},
  {label:"Kitchen & Utility",items:[
    {id:"kitchen",label:"Kitchen"},{id:"pantry",label:"Pantry"},
    {id:"closet",label:"Walk-in Closet"},{id:"laundry",label:"Laundry"},
    {id:"garageBays",label:"Garage Bays"},
  ]},
  {label:"Outdoor & Special",items:[
    {id:"deck",label:"Covered Deck"},{id:"porch",label:"Screened Porch"},
    {id:"office",label:"Home Office"},{id:"gym",label:"Gym"},
    {id:"fireplace",label:"Fireplace"},{id:"wineCellar",label:"Wine Cellar"},
    {id:"elevator",label:"Elevator"},
  ]},
];
const ROOM_DEF={bedrooms:3,bathrooms:2,halfBaths:0,livingRooms:1,familyRoom:0,diningRoom:1,kitchen:1,pantry:0,closet:1,laundry:1,garageBays:1,deck:0,porch:0,office:0,gym:0,fireplace:0,wineCellar:0,elevator:0};

/* ═══ PRICING ═══ */
function calcEst(d){
  const isUS=d.region!=="BR";
  const w=parseFloat(d.width)||0,l=parseFloat(d.length)||0;
  const area=w*l*(isUS?1:10.764);
  const base=isUS?4.5:48;
  let lo=area*base,hi=lo*1.22;
  if(d.levels&&d.levels.second){lo+=area*4.5;hi+=area*5.5;}
  if(d.levels&&d.levels.basement){lo+=area*0.8;hi+=area*0.9;}
  if(d.levels&&d.levels.attic){lo+=area*0.6;hi+=area*0.72;}
  if(d.rush==="express"){lo*=1.6;hi*=1.6;}
  const conf=Math.min(20+(d.region?10:0)+(area>0?20:0)+(d.role?10:0)+(d.status?10:0)+(d.rooms&&d.rooms.bedrooms?10:0)+(d.rush?10:0),100);
  const sym=isUS?"$":"R$";
  const fmt=n=>sym+Math.round(n).toLocaleString(isUS?"en-US":"pt-BR");
  const bd=[];
  if(area>0)bd.push({l:"Base Area ("+Math.round(area)+" "+(isUS?"sqft":"m²")+")",v:fmt(area*base)});
  if(d.levels&&d.levels.second)bd.push({l:"2nd Floor",v:"+"+fmt(area*4.5)});
  if(d.levels&&d.levels.basement)bd.push({l:"Basement",v:"+"+fmt(area*0.8)});
  if(d.levels&&d.levels.attic)bd.push({l:"Attic",v:"+"+fmt(area*0.6)});
  if(d.rush==="express")bd.push({l:"Rush Express",v:"×1.60"});
  return{lo:fmt(lo),hi:fmt(hi),conf,bd};
}

/* ═══ SVG HELPERS ═══ */
const Chk=()=>h("svg",{width:12,height:12,viewBox:"0 0 24 24",fill:"none",stroke:"#fff",strokeWidth:"2.5",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M20 6L9 17l-5-5"}));
const Arr=()=>h("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M5 12h14M12 5l7 7-7 7"}));
const UpArr=()=>h("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"}));
const Pin=()=>h("svg",{width:28,height:28,viewBox:"0 0 24 24",fill:"none",stroke:"var(--a)",strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"}),h("circle",{cx:"12",cy:"10",r:"3"}));

/* ═══ REUSABLE ═══ */
function Lbl({children}){return h("label",{className:"lbl"},children)}
function Fld({label,children,style}){return h("div",{className:"f",style},label&&h(Lbl,null,label),children)}
function Ctr({value,onChange}){
  return h("div",{className:"ctr"},
    h("button",{className:"ctr-btn",onClick:()=>onChange(Math.max(0,value-1))},"−"),
    h("div",{className:"ctr-val"},value),
    h("button",{className:"ctr-btn",onClick:()=>onChange(Math.min(20,value+1))},"+")
  );
}
function Title({label,sub}){
  return h("div",{style:{marginBottom:24}},
    h("h2",{style:{fontFamily:"var(--serif)",fontSize:24,fontWeight:400,fontStyle:"italic",color:"var(--tx)",marginBottom:6}},label),
    sub&&h("p",{style:{fontSize:13,color:"var(--mu)",lineHeight:1.6}},sub)
  );
}

/* ═══ STEPPER ═══ */
function Stepper({cur}){
  return h("div",{className:"stepper"},
    STEPS.map((lbl,i)=>{
      const st=i<cur?"done":i===cur?"active":"future";
      return h("div",{key:i,style:{display:"flex",alignItems:"center",flex:i<STEPS.length-1?"1":"none"}},
        h("div",{className:"step-dot "+st,title:lbl},
          st==="done"?h(Chk):i+1
        ),
        i<STEPS.length-1&&h("div",{className:"step-line"},
          h("div",{className:"step-fill",style:{width:st==="done"?"100%":"0%"}})
        )
      );
    })
  );
}

/* ═══ SIDEBAR ═══ */
function Sidebar({est}){
  const {lo,hi,conf,bd}=est;
  const col=conf<40?"#ef4444":conf<70?"#f59e0b":"#10b981";
  return h("div",{className:"sidebar"},
    /* Confidence */
    h("div",null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}},
        h("span",{style:{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--mu)"}},"Estimate Confidence"),
        h("span",{style:{fontFamily:"var(--mono)",fontSize:13,color:col,fontWeight:500}},conf+"%")
      ),
      h("div",{className:"conf-track"},
        h("div",{className:"conf-fill",style:{width:conf+"%",background:"linear-gradient(90deg,"+col+" 0%,"+col+"88 100%)"}})
      ),
      h("p",{style:{fontSize:10,color:"var(--dm)",marginTop:6}},
        conf<40?"Add more details to improve accuracy":conf<70?"Getting closer — keep going":"High confidence estimate"
      )
    ),
    /* Live Estimate */
    h("div",{style:{borderTop:"1px solid var(--border)",paddingTop:18}},
      h("p",{style:{fontSize:10,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--mu)",marginBottom:10}},"Live Estimate"),
      h("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
        h("span",{style:{fontFamily:"var(--serif)",fontSize:26,fontStyle:"italic",color:"var(--tx)"}},lo),
        h("span",{style:{color:"var(--dm)",fontSize:12}},"—"),
        h("span",{style:{fontFamily:"var(--serif)",fontSize:22,color:"var(--mu)"}},hi)
      ),
      h("p",{style:{fontSize:10,color:"var(--dm)",marginTop:4}},"Final quote after review call")
    ),
    /* Breakdown */
    bd.length>0&&h("div",{style:{borderTop:"1px solid var(--border)",paddingTop:18}},
      h("p",{style:{fontSize:10,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--mu)",marginBottom:10}},"Cost Breakdown"),
      h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        bd.map((item,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:12}},
          h("span",{style:{color:"var(--mu)"}},item.l),
          h("span",{style:{fontFamily:"var(--mono)",color:"var(--tx)",fontWeight:500}},item.v)
        ))
      )
    ),
    /* Trust */
    h("div",{style:{borderTop:"1px solid var(--border)",paddingTop:14}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("div",{style:{width:28,height:28,borderRadius:"50%",background:"rgba(99,102,241,.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          h("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:"none",stroke:"var(--a)",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"},h("path",{d:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M9 12l2 2 4-4"}))
        ),
        h("div",null,
          h("p",{style:{fontSize:11,fontWeight:600,color:"var(--tx)"}},"No commitment required"),
          h("p",{style:{fontSize:10,color:"var(--dm)"}},"Free estimate · reviewed by DARA")
        )
      )
    )
  );
}

/* ═══ STEP 1: LOCATION ═══ */
function S1({d,up}){
  const [q,setQ]=useState("");
  const sugg=["Massachusetts","California","New York","Texas","Florida","São Paulo","Rio de Janeiro","Minas Gerais"].filter(s=>q.length>1&&s.toLowerCase().includes(q.toLowerCase()));
  const isUS=d.region!=="BR";
  return h("div",{className:"anim"},
    h(Title,{label:"Where is your project located?",sub:"This helps us apply the right codes, rates, and regulations."}),
    h("div",{style:{display:"flex",gap:12,marginBottom:28}},
      [{id:"US",flag:"🇺🇸",title:"US",sub:"USD · sqft"},{id:"BR",flag:"🇧🇷",title:"BR",sub:"BRL · m²"}].map(o=>
        h("div",{key:o.id,className:"toggle "+(d.region===o.id?"on":""),onClick:()=>up("region",o.id)},
          h("div",{style:{fontSize:32,marginBottom:8}},o.flag),
          h("div",{style:{fontSize:18,fontWeight:700,fontFamily:"var(--mono)",color:"var(--tx)"}},o.title),
          h("div",{style:{fontSize:12,color:"var(--mu)",marginTop:4}},o.sub)
        )
      )
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
      h(Fld,{label:"Street Address"},h("input",{className:"inp",placeholder:"123 Main Street",value:d.street||"",onChange:e=>up("street",e.target.value)})),
      h("div",{className:"g2"},
        h(Fld,{label:"City"},h("input",{className:"inp",placeholder:"Boston",value:d.city||"",onChange:e=>up("city",e.target.value)})),
        h("div",{className:"f",style:{position:"relative"}},
          h(Lbl,null,isUS?"State":"State (UF)"),
          h("input",{className:"inp",placeholder:isUS?"Massachusetts":"São Paulo",value:q||d.state||"",onChange:e=>{setQ(e.target.value);up("state",e.target.value)}}),
          sugg.length>0&&h("div",{style:{position:"absolute",top:"100%",left:0,right:0,background:"var(--bg2)",border:"1.5px solid var(--border)",borderRadius:"var(--r-sm)",zIndex:10,marginTop:2,overflow:"hidden"}},
            sugg.map(s=>h("div",{key:s,onClick:()=>{up("state",s);setQ("")},style:{padding:"9px 14px",fontSize:13,cursor:"pointer",color:"var(--mu)"},onMouseEnter:e=>e.currentTarget.style.background="var(--bg3)",onMouseLeave:e=>e.currentTarget.style.background="transparent"},s))
          )
        )
      ),
      h(Fld,{label:isUS?"ZIP Code":"CEP"},
        h("input",{className:"inp",placeholder:isUS?"00000":"00000-000",style:{maxWidth:200},value:d.zip||"",onChange:e=>up("zip",e.target.value)})
      )
    ),

/* ═══ WIZARD WRAPPER ═══ */
function Wizard({setPage}){
  const [step,setStep]=useState(0);
  const [d,setD]=useState({region:"US",levels:{ground:true},rooms:Object.assign({},ROOM_DEF)});
  const topRef=useRef(null);
  const up=useCallback((k,v)=>setD(prev=>Object.assign({},prev,{[k]:v})),[]);
  const est=calcEst(d);
  const showSb=step>=3;
  const canGo=()=>{
    if(step===0)return!!d.region;
    if(step===1)return!!(d.name&&d.email&&d.role);
    return true;
  };
  const go=dir=>{
    const ns=step+dir;
    if(ns>=0&&ns<STEPS.length&&(dir<0||canGo())){
      setStep(ns);
      setTimeout(()=>topRef.current&&topRef.current.scrollIntoView({behavior:"smooth"}),50);
    }
  };
  const stepLabel=["Location","About You","Project","Scope","Services","Program","Files","Rush","Review"][step];

  return h("div",{style:{minHeight:"100vh",background:"var(--bg0)",fontFamily:"var(--sans)"}},
    /* Top bar */
    h("div",{ref:topRef,style:{borderBottom:"1px solid var(--border)",padding:"16px 0",background:"var(--bg1)",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}},
      h("div",{style:{maxWidth:1100,margin:"0 auto",padding:"0 24px"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,cursor:"pointer"},onClick:()=>setPage("landing")},
            h("div",{style:{width:32,height:32,borderRadius:8,background:"var(--a)",display:"flex",alignItems:"center",justifyContent:"center"}},
              h("span",{style:{fontFamily:"var(--serif)",fontSize:14,color:"#fff",fontStyle:"italic"}},"D")
            ),
            h("span",{style:{fontFamily:"var(--serif)",fontSize:15,fontStyle:"italic",color:"var(--tx)"}},"DARA Studio")
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("span",{style:{fontSize:11,color:"var(--dm)"}},"Step "+(step+1)+" of "+STEPS.length),
            h("span",{style:{fontSize:11,fontWeight:600,color:"var(--a)"}},"— "+stepLabel)
          )
        ),
        h(Stepper,{cur:step})
      )
    ),
    /* Content */
    h("div",{style:{maxWidth:1100,margin:"0 auto",padding:"36px 24px 80px"}},
      h("div",{style:{display:showSb?"grid":"block",gridTemplateColumns:showSb?"1fr 320px":"1fr",gap:28,alignItems:"start"}},
        h("div",{style:{maxWidth:showSb?"none":660,margin:showSb?0:"0 auto"}},
          step===0&&h(S1,{d,up}),
          step===1&&h(S2,{d,up}),
          step===2&&h(S3,{d,up}),
          step===3&&h(SPlaceholder,{label:"Scope of Services",n:4}),
          step===4&&h(SPlaceholder,{label:"Service Add-ons",n:5}),
          step===5&&h(S6,{d,up}),
          step===6&&h(S7,{d,up}),
          step===7&&h(S8,{d,up}),
          step===8&&h(S9,{d,est,setPage}),
          step<9&&h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:36,paddingTop:24,borderTop:"1px solid var(--border)"}},
            h("button",{className:"btn-o",onClick:()=>go(-1),style:{visibility:step===0?"hidden":"visible"}},"← Back"),
            step<8&&h("button",{className:"btn",onClick:()=>go(1),disabled:!canGo()},"Continue →")
          )
        ),
        showSb&&h("div",null,h(Sidebar,{est}))
      )
    )
  );
}

/* ═══ CLIENT PORTAL PLACEHOLDER ═══ */

  return h("div",{className:"portal-wrap"},

/* ═══ ROOT APP ═══ */
function App(){
  const [page,setPage]=useState("landing");
  if(page==="landing") return h(Landing,{setPage});
  if(page==="wizard")  return h(Wizard,{setPage});
  if(page==="portal")  return h(Portal,{setPage});
  return h(Landing,{setPage});
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
