          e('div',{style:{width:30,height:30,borderRadius:'50%',background:GD,border:'2px solid '+G,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Georgia,serif',fontSize:11,fontWeight:700,color:G,cursor:'pointer'},onClick:()=>go('profile')},user.initials)
        )
      ),
      e('div',{style:{padding:'20px 20px 60px',flex:1}},
        page==='dashboard'&&e(Dashboard,{user,projects:PROJECTS,invoices:INVOICES,activity:ACTIVITY,onNav:go,onOpen:p=>{setProj(p);setPage('detail');}}),
        page==='projects'&&e(Projects,{projects:PROJECTS,onOpen:p=>{setProj(p);setPage('detail');}}),
        page==='detail'&&proj&&e(ProjectDetail,{proj,onBack:()=>{setProj(null);setPage('projects');}}),
        page==='invoices'&&e(Faturas,{invoices:INVOICES}),
        page==='messages'&&e('div',{className:'fa',style:{textAlign:'center',padding:'60px 0',color:DM}},e('p',{style:{fontSize:32,marginBottom:10}},'💬'),e('p',{style:{fontSize:14,color:TX,marginBottom:4,fontWeight:600}},'Mensagens Gerais'),e('p',{style:{fontSize:12}},'Use o Chat dentro de cada projeto para comunicação direta.')),
        page==='profile'&&e(Perfil,{user}),
        page==='company'&&e('div',{className:'fa',style:{maxWidth:480}},e('h1',{style:{fontFamily:'Georgia,serif',fontSize:20,fontWeight:700,marginBottom:18}},'Minha Empresa'),e('div',{className:'card'},e('p',{style:{fontSize:12,color:MU,marginBottom:4}},'Empresa registrada:'),e('p',{style:{fontSize:14,fontWeight:700,color:TX}},user.company)))
      )
    )
  );
};

const App=()=>{
  const[user,setUser]=useState(null);
  return user
    ?React.createElement(Layout,{user,onLogout:()=>setUser(null)})
    :React.createElement(Login,{onLogin:setUser});
};

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
})();
</script>
</body>
</html>
