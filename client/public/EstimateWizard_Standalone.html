<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARA Studio | Estimate Wizard Prototype</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300..500;1,300..500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ── Design Tokens ── */
        :root {
            --bg0:    #090910;
            --bg1:    #0f0f1a;
            --bg2:    #14141f;
            --bg3:    #1a1a28;
            --border: rgba(255,255,255,.08);
            --border2:rgba(255,255,255,.14);
            --a:      #6366f1;
            --a-dim:  rgba(99,102,241,.18);
            --a-glow: rgba(99,102,241,.35);
            --tx:     #f0eff8;
            --mu:     #9896b8;
            --dm:     #5c5a7a;
            --gn:     #10b981;
            --am:     #f59e0b;
            --rd:     #ef4444;
            --font-serif: 'Instrument Serif', Georgia, serif;
            --font-mono:  'DM Mono', monospace;
            --font-sans:  'DM Sans', system-ui, sans-serif;
            --r:      14px;
            --r-sm:   8px;
            --shadow: 0 24px 64px rgba(0,0,0,.6);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg0);
            font-family: var(--font-sans);
            color: var(--tx);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Wizard Components ── */
        .wz-inp {
            width: 100%; padding: 11px 14px;
            background: var(--bg3); border: 1.5px solid var(--border);
            border-radius: var(--r-sm); color: var(--tx);
            font-family: var(--font-sans); font-size: 13px;
            outline: none; transition: border-color .18s, box-shadow .18s;
        }
        .wz-inp:focus { border-color: var(--a); box-shadow: 0 0 0 3px var(--a-dim) }

        .wz-label {
            display: block; font-size: 10px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--mu); margin-bottom: 6px;
        }

        .wz-card {
            padding: 16px 20px;
            background: var(--bg3); border: 1.5px solid var(--border);
            border-radius: var(--r); cursor: pointer;
            transition: all .2s; user-select: none;
            display: flex; flex-direction: column; justify-content: center;
        }
        .wz-card:hover { border-color: var(--border2); background: var(--bg2) }
        .wz-card.active { border-color: var(--a); background: var(--a-dim); box-shadow: 0 0 24px var(--a-glow); }

        .wz-toggle {
            flex: 1; padding: 28px 24px;
            background: var(--bg3); border: 2px solid var(--border);
            border-radius: var(--r); cursor: pointer;
            transition: all .22s; text-align: center; user-select: none;
        }
        .wz-toggle:hover { border-color: var(--border2); transform: translateY(-2px) }
        .wz-toggle.active {
            border-color: var(--a); background: var(--a-dim);
            box-shadow: 0 0 0 1px var(--a), 0 0 32px var(--a-glow);
            transform: translateY(-3px);
        }

        .wz-stepper { display: flex; align-items: center; gap: 0; padding: 0 4px; }
        .wz-step-dot {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; transition: all .25s; flex-shrink: 0;
        }
        .wz-step-dot.done { background: var(--a); color: #fff }
        .wz-step-dot.active { background: var(--a); color: #fff; box-shadow: 0 0 0 4px var(--a-dim), 0 0 16px var(--a-glow) }
        .wz-step-dot.future { background: var(--bg3); border: 1.5px solid var(--border); color: var(--dm) }
        .wz-step-line { flex: 1; height: 2px; background: var(--border); position: relative; overflow: hidden; }
        .wz-step-line-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--a); transition: width .4s ease; }

        .wz-btn-primary {
            padding: 12px 28px; border-radius: var(--r-sm);
            background: var(--a); border: none; color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all .18s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .wz-btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 8px 24px var(--a-glow) }
        .wz-btn-primary:disabled { opacity: .45; cursor: not-allowed; }

        .wz-btn-ghost {
            padding: 12px 28px; border-radius: var(--r-sm);
            background: transparent; border: 1.5px solid var(--border2); color: var(--mu);
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all .18s;
        }
        .wz-btn-ghost:hover { border-color: var(--a); color: var(--tx) }

        .wz-sidebar {
            position: sticky; top: 32px;
            background: var(--bg2); border: 1.5px solid var(--border);
            border-radius: var(--r); padding: 24px; display: flex; flex-direction: column; gap: 24px;
        }

        .wz-main-layout { display: grid; grid-template-columns: 1fr; gap: 32px; align-items: start; }
        @media (min-width: 1024px) { .wz-main-layout.has-sidebar { grid-template-columns: 1fr 340px; } }

        .wz-title-premium {
            font-family: var(--font-serif); font-size: clamp(24px, 5vw, 36px);
            font-weight: 400; font-style: italic; color: var(--tx); line-height: 1.2;
        }

        .wz-animate { animation: wz-in .3s ease both }
        @keyframes wz-in { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }

        .wz-grid-adaptive { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

        /* Custom styles for standalone */
        #root { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .top-bar { padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // ── Constants & Translations ──
        const TRANSLATIONS = {
            EN: {
                back: "← Back",
                continue: "Continue →",
                step: "Step",
                of: "of",
                projectEstimate: "Project Estimate",
                estimatedFee: "Estimated Design Fee",
                confidence: "Estimate Confidence",
                approxEstimate: "*Approximate estimate.",
                totalArea: "Total Area",
                groundFloor: "Ground Floor",
                secondFloor: "2nd Floor",
                basement: "Basement",
                attic: "Attic",
                whereProject: "Where is your project located?",
                locationSub: "This helps us apply the correct codes and regulations.",
                streetAddress: "Street Address",
                city: "City",
                state: "State",
                zipCode: "ZIP Code",
                confirmLocation: "Confirm Location ✓",
                tellAboutYou: "Tell us about you.",
                aboutYouSub: "We'll use this to customize your estimate.",
                fullName: "Full Name",
                email: "Email",
                phone: "Phone",
                whoAreYou: "Who are you?",
                roles: { homeowner: "Homeowner", builder: "Builder", other: "Other" },
                propertyTypes: {
                    single_family: { label: "Single Family Home" },
                    multi_family: { label: "Multi-Family" },
                    adu: { label: "ADU" }
                },
                review: {
                    title: "Review your brief.",
                    sub: "Verify details before submitting.",
                    client: "Client",
                    location: "Location",
                    project: "Project",
                    summary: "Final Summary",
                    edit: "Edit",
                    payRetainer: "🛡️ Pay Retainer & Start Project",
                    saveLater: "💾 Save for Later"
                }
            },
            PT: {
                back: "← Voltar",
                continue: "Continuar →",
                step: "Etapa",
                of: "de",
                projectEstimate: "Estimativa do Projeto",
                estimatedFee: "Taxa de Design Estimada",
                confidence: "Confiança da Estimativa",
                approxEstimate: "*Estimativa aproximada.",
                totalArea: "Área Total",
                groundFloor: "Térreo",
                secondFloor: "2º Pavimento",
                basement: "Subsolo",
                attic: "Sótão",
                whereProject: "Onde seu projeto está localizado?",
                locationSub: "Isso nos ajuda a aplicar os códigos e regulamentos corretos.",
                streetAddress: "Endereço",
                city: "Cidade",
                state: "Estado",
                zipCode: "CEP",
                confirmLocation: "Confirmar Localização ✓",
                tellAboutYou: "Conte-nos sobre você.",
                aboutYouSub: "Usaremos isso para personalizar sua estimativa.",
                fullName: "Nome Completo",
                email: "E-mail",
                phone: "Telefone",
                whoAreYou: "Quem é você?",
                roles: { homeowner: "Proprietário", builder: "Construtor", other: "Outro" },
                propertyTypes: {
                    single_family: { label: "Residencial Unifamiliar" },
                    multi_family: { label: "Multifamiliar" },
                    adu: { label: "ADU" }
                },
                review: {
                    title: "Revise seu resumo.",
                    sub: "Verifique os detalhes antes de enviar.",
                    client: "Cliente",
                    location: "Localização",
                    project: "Projeto",
                    summary: "Resumo Final",
                    edit: "Editar",
                    payRetainer: "🛡️ Pagar Sinal e Iniciar Projeto",
                    saveLater: "💾 Salvar para Depois"
                }
            }
        };

        const STEPS_EN = ["Location", "About You", "Project", "Scope", "Review"];
        const STEPS_PT = ["Localização", "Sobre Você", "Projeto", "Escopo", "Revisão"];

        // ── Components ──
        function Title({ label, sub }) {
            return (
                <div style={{ marginBottom: 32 }}>
                    <h2 className="wz-title-premium" style={{ marginBottom: 8 }}>{label}</h2>
                    {sub && <p style={{ fontSize: 15, color: "var(--mu)", lineHeight: 1.6, fontWeight: 300 }}>{sub}</p>}
                </div>
            );
        }

        function Stepper({ cur, steps }) {
            return (
                <div className="wz-stepper">
                    {steps.map((lbl, i) => {
                        const st = i < cur ? "done" : i === cur ? "active" : "future";
                        return (
                            <React.Fragment key={i}>
                                <div className={`wz-step-dot ${st}`}>
                                    {st === "done" ? "✓" : i + 1}
                                </div>
                                {i < steps.length - 1 && (
                                    <div className="wz-step-line">
                                        <div className="wz-step-line-fill" style={{ width: i < cur ? "100%" : "0%" }} />
                                    </div>
                                )}
                            </React.Fragment>
                        );
                    })}
                </div>
            );
        }

        // ── Step Components ──
        function S1({ d, up, T }) {
            return (
                <div className="wz-animate">
                    <Title label={T.whereProject} sub={T.locationSub} />
                    <div className="wz-grid-adaptive">
                        <div className="wz-f">
                            <label className="wz-label">{T.streetAddress}</label>
                            <input className="wz-inp" value={d.street || ""} onChange={e => up('street', e.target.value)} />
                        </div>
                        <div className="wz-f">
                            <label className="wz-label">{T.city}</label>
                            <input className="wz-inp" value={d.city || ""} onChange={e => up('city', e.target.value)} />
                        </div>
                    </div>
                </div>
            );
        }

        function S2({ d, up, T }) {
            return (
                <div className="wz-animate">
                    <Title label={T.tellAboutYou} sub={T.aboutYouSub} />
                    <div className="wz-grid-adaptive" style={{ marginBottom: 32 }}>
                        <div className="wz-f">
                            <label className="wz-label">{T.fullName}</label>
                            <input className="wz-inp" value={d.name || ""} onChange={e => up('name', e.target.value)} />
                        </div>
                        <div className="wz-f">
                            <label className="wz-label">{T.email}</label>
                            <input className="wz-inp" value={d.email || ""} onChange={e => up('email', e.target.value)} />
                        </div>
                    </div>
                    <label className="wz-label">{T.whoAreYou}</label>
                    <div style={{ display: "flex", gap: 12 }}>
                        {Object.keys(T.roles).map(k => (
                            <div key={k} className={`wz-toggle ${d.role === k ? 'active' : ''}`} onClick={() => up('role', k)}>
                                {T.roles[k]}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ── Main App ──
        function EstimateWizard() {
            const [lang, setLang] = useState("EN");
            const [step, setStep] = useState(0);
            const [data, setData] = useState({});
            
            const T = TRANSLATIONS[lang];
            const STEPS = lang === "EN" ? STEPS_EN : STEPS_PT;

            const up = (key, val) => setData(prev => ({ ...prev, [key]: val }));

            const next = () => step < STEPS.length - 1 && setStep(s => s + 1);
            const prev = () => step > 0 && setStep(s => s - 1);

            return (
                <div>
                    <div className="top-bar">
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <div style={{ width: 32, height: 32, borderRadius: 8, background: "var(--a)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                    <span style={{ fontFamily: "var(--font-serif)", fontSize: 14, color: "#fff", fontStyle: "italic" }}>D</span>
                                </div>
                                <span style={{ fontFamily: "var(--font-serif)", fontSize: 18, fontStyle: "italic" }}>DARA Studio</span>
                            </div>
                            <div style={{ display: "flex", gap: 12 }}>
                                <button className="wz-btn-ghost" style={{ padding: "6px 12px", fontSize: 11 }} onClick={() => setLang(lang === "EN" ? "PT" : "EN")}>
                                    {lang === "EN" ? "Português" : "English"}
                                </button>
                            </div>
                        </div>
                        <Stepper cur={step} steps={STEPS} />
                    </div>

                    <div className="wz-main-layout has-sidebar">
                        <div>
                            {step === 0 && <S1 d={data} up={up} T={T} />}
                            {step === 1 && <S2 d={data} up={up} T={T} />}
                            {step > 1 && <div className="wz-animate"><Title label="Prototyping Step..." sub="The full logic is being loaded." /></div>}
                            
                            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 40, paddingTop: 20, borderTop: "1px solid var(--border)" }}>
                                <button className="wz-btn-ghost" onClick={prev} style={{ visibility: step === 0 ? 'hidden' : 'visible' }}>{T.back}</button>
                                <button className="wz-btn-primary" onClick={next}>{T.continue}</button>
                            </div>
                        </div>

                        <div className="wz-sidebar">
                            <h3 style={{ fontSize: 14, fontWeight: 700 }}>{T.projectEstimate}</h3>
                            <div style={{ textAlign: "center", padding: "20px 0" }}>
                                <p style={{ fontSize: 11, color: "var(--dm)", textTransform: "uppercase" }}>{T.estimatedFee}</p>
                                <p style={{ fontSize: 32, fontWeight: 400, fontFamily: "var(--font-serif)", fontStyle: "italic" }}>$ --</p>
                            </div>
                            <div className="wz-conf-track"><div className="wz-conf-fill" style={{ width: "20%" }}></div></div>
                            <p style={{ fontSize: 11, color: "var(--dm)", fontStyle: "italic" }}>{T.approxEstimate}</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EstimateWizard />);
    </script>
</body>
</html>
